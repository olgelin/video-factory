<!DOCTYPE html>
<html data-composition-id="beat-3" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
</head>
<body style="margin:0;padding:0;overflow:hidden;background:#1a1a2e;font-family:'Noto Sans SC','Inter',sans-serif;">
<div class="scene" style="position:relative;width:1920px;height:1080px;background:#1a1a2e;overflow:hidden;">
  <!-- Background decorative layers -->
  <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(0,212,255,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.08) 1px,transparent 1px);background-size:100px 100px;opacity:0;pointer-events:none;" id="grid-layer"></div>
  <div style="position:absolute;top:50%;left:40%;width:800px;height:800px;background:radial-gradient(circle,rgba(0,212,255,0.12),transparent 70%);transform:translate(-50%,-50%);opacity:0;pointer-events:none;" id="glow-layer"></div>
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:280px;font-weight:bold;color:rgba(255,255,255,0.04);font-family:'JetBrains Mono',monospace;white-space:nowrap;opacity:1;pointer-events:none;" id="ghost-text">DATA IMPACT</div>
  <div style="position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.2),transparent);opacity:0;pointer-events:none;" id="scan-line"></div>
  <!-- Particles -->
  <div style="position:absolute;top:20%;left:15%;width:4px;height:4px;border-radius:50%;background:#1a1a2e;opacity:0;" id="particle1"></div>
  <div style="position:absolute;top:60%;left:80%;width:3px;height:3px;border-radius:50%;background:#00D4FF;opacity:0;" id="particle2"></div>
  <div style="position:absolute;top:40%;left:30%;width:3px;height:3px;border-radius:50%;background:#1a1a2e;opacity:0;" id="particle3"></div>
  <div style="position:absolute;top:75%;left:65%;width:2px;height:2px;border-radius:50%;background:#1a1a2e;opacity:0;" id="particle4"></div>
  <div style="position:absolute;top:85%;left:25%;width:4px;height:4px;border-radius:50%;background:#00D4FF;opacity:0;" id="particle5"></div>
  <!-- Corner decorations -->
  <div style="position:absolute;top:80px;left:80px;width:60px;height:60px;border-left:3px solid rgba(0,212,255,0.3);border-top:3px solid rgba(0,212,255,0.3);opacity:0;" id="corner-tl"></div>
  <div style="position:absolute;top:80px;right:80px;width:60px;height:60px;border-right:3px solid rgba(0,212,255,0.3);border-top:3px solid rgba(0,212,255,0.3);opacity:0;" id="corner-tr"></div>
  <div style="position:absolute;bottom:80px;left:80px;width:60px;height:60px;border-left:3px solid rgba(0,212,255,0.3);border-bottom:3px solid rgba(0,212,255,0.3);opacity:0;" id="corner-bl"></div>
  <div style="position:absolute;bottom:80px;right:80px;width:60px;height:60px;border-right:3px solid rgba(0,212,255,0.3);border-bottom:3px solid rgba(0,212,255,0.3);opacity:0;" id="corner-br"></div>
  <!-- Main title -->
  <div style="position:absolute;top:120px;left:120px;width:1680px;font-size:96px;font-weight:bold;color:#00D4FF;text-shadow:0 0 30px rgba(0,212,255,0.8);opacity:1;" id="main-title">数据冲击力：准确率飙升30%</div>
  <!-- Core content area - left 60% -->
  <div style="position:absolute;top:250px;left:120px;width:960px;height:500px;">
    <!-- Data card 1 -->
    <div style="position:absolute;top:0;left:0;width:420px;height:300px;background:rgba(26,26,46,0.7);backdrop-filter:blur(10px);border:1px solid rgba(0,212,255,0.3);border-radius:24px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:1;" id="data-card-1">
      <div style="position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#00D4FF,transparent);border-radius:24px 24px 0 0;"></div>
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at top,rgba(0,212,255,0.08),transparent 70%);border-radius:24px;pointer-events:none;"></div>
      <div style="font-size:20px;color:#999999;margin-bottom:20px;font-family:'Noto Sans SC',sans-serif;">准确率提升</div>
      <div style="font-size:120px;font-weight:bold;color:#FFD700;font-family:'JetBrains Mono',monospace;line-height:1;">30%</div>
      <div style="font-size:18px;color:#00D4FF;margin-top:20px;font-family:'Noto Sans SC',sans-serif;">↑ 飙升30%</div>
    </div>
    <!-- Data card 2 -->
    <div style="position:absolute;top:0;left:460px;width:420px;height:300px;background:rgba(26,26,46,0.7);backdrop-filter:blur(10px);border:1px solid rgba(0,212,255,0.3);border-radius:24px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:1;" id="data-card-2">
      <div style="position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#FF4081,transparent);border-radius:24px 24px 0 0;"></div>
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at top,rgba(255,64,129,0.08),transparent 70%);border-radius:24px;pointer-events:none;"></div>
      <div style="font-size:20px;color:#999999;margin-bottom:20px;font-family:'Noto Sans SC',sans-serif;">处理速度</div>
      <div style="font-size:100px;font-weight:bold;color:#FF4081;font-family:'JetBrains Mono',monospace;line-height:1;">2x</div>
      <div style="font-size:18px;color:#FF4081;margin-top:20px;font-family:'Noto Sans SC',sans-serif;">翻倍提升</div>
    </div>
    <!-- Progress bar -->
    <div style="position:absolute;top:350px;left:0;width:800px;height:30px;background:rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;opacity:1;" id="progress-bar">
      <div style="width:80%;height:100%;background:linear-gradient(90deg,#00D4FF,#FF4081);border-radius:16px;transform:scaleX(0);transform-origin:left;" id="progress-fill"></div>
    </div>
    <!-- Tags pills -->
    <div style="position:absolute;top:420px;left:0;display:flex;gap:20px;opacity:1;" id="tags-container">
      <div style="padding:10px 20px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:16px;font-size:18px;color:#00D4FF;font-family:'Noto Sans SC',sans-serif;">语言理解</div>
      <div style="padding:10px 20px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:16px;font-size:18px;color:#00D4FF;font-family:'Noto Sans SC',sans-serif;">推理能力</div>
      <div style="padding:10px 20px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:16px;font-size:18px;color:#00D4FF;font-family:'Noto Sans SC',sans-serif;">生成质量</div>
    </div>
  </div>
  <!-- Right 40% - auxiliary info and decorations -->
  <div style="position:absolute;top:250px;left:1200px;width:600px;height:500px;">
    <!-- Subtitle -->
    <div style="font-size:28px;color:rgba(0,212,255,0.5);margin-bottom:40px;opacity:1;font-family:'Noto Sans SC',sans-serif;" id="subtitle">GPT-5 核心数据指标</div>
    <!-- Additional data points -->
    <div style="display:flex;flex-direction:column;gap:30px;">
      <div style="padding:30px;background:rgba(26,26,46,0.5);backdrop-filter:blur(5px);border:1px solid rgba(0,212,255,0.2);border-radius:16px;opacity:1;" id="data-point-1">
        <div style="font-size:18px;color:#999999;margin-bottom:10px;font-family:'Noto Sans SC',sans-serif;">推理延迟降低</div>
        <div style="font-size:48px;font-weight:bold;color:#FFD700;font-family:'JetBrains Mono',monospace;">-40ms</div>
      </div>
      <div style="padding:30px;background:rgba(26,26,46,0.5);backdrop-filter:blur(5px);border:1px solid rgba(0,212,255,0.2);border-radius:16px;opacity:1;" id="data-point-2">
        <div style="font-size:18px;color:#999999;margin-bottom:10px;font-family:'Noto Sans SC',sans-serif;">上下文窗口扩展</div>
        <div style="font-size:48px;font-weight:bold;color:#FFD700;font-family:'JetBrains Mono',monospace;">128K</div>
      </div>
    </div>
  </div>
  <!-- Bottom info area -->
  <div style="position:absolute;bottom:120px;left:120px;width:1680px;display:flex;justify-content:space-between;align-items:flex-end;opacity:1;" id="bottom-info">
    <div style="font-size:20px;color:#999999;font-family:'Noto Sans SC',sans-serif;">数据来源：GPT-5 技术报告 | 2023年基准测试</div>
    <div style="font-size:20px;color:#999999;font-family:'Noto Sans SC',sans-serif;">时间戳：2023-11-15</div>
  </div>
</div>

<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({paused: true});

// Background layers entrance
tl.from("#grid-layer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
tl.from("#glow-layer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15);
tl.from("#ghost-text", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3);
tl.from("#scan-line", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.45);
tl.from("#particle1", {opacity: 0, duration: 0.8, ease: "power2.out"}, 0.6);
tl.from("#particle2", {opacity: 0, duration: 0.8, ease: "power2.out"}, 0.75);
tl.from("#particle3", {opacity: 0, duration: 0.8, ease: "power2.out"}, 0.9);
tl.from("#particle4", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.05);
tl.from("#particle5", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.2);
tl.from("#corner-tl", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.35);
tl.from("#corner-tr", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.5);
tl.from("#corner-bl", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.65);
tl.from("#corner-br", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.8);

// Main title entrance
tl.from("#main-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 1.95);

// Core data cards entrance
tl.from("#data-card-1", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.1);
tl.from("#data-card-2", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.25);

// Progress bar entrance
tl.from("#progress-bar", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 2.4);

// Tags pills entrance
tl.from("#tags-container", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 2.55);

// Subtitle and data points entrance
tl.from("#subtitle", {opacity: 0, duration: 0.6, ease: "power2.out"}, 2.7);
tl.from("#data-point-1", {y: 40, opacity: 0, duration: 0.5, ease: "power2.out"}, 2.85);
tl.from("#data-point-2", {y: 40, opacity: 0, duration: 0.5, ease: "power2.out"}, 3.0);

// Bottom info entrance
tl.from("#bottom-info", {opacity: 0, duration: 0.8, ease: "power2.out"}, 3.15);

// Breathing animations (only 2-3 elements)
// Data card 1 breathing
gsap.to("#data-card-1", {
  scale: 1.015,
  duration: 3,
  repeat: 0,
  yoyo: true,
  ease: "sine.inOut"
});
// Main title text-shadow pulse
gsap.to("#main-title", {
  textShadow: "0 0 40px rgba(0,212,255,1)",
  opacity: 0.8,
  duration: 2.5,
  repeat: 0,
  yoyo: true,
  ease: "sine.inOut"
});
// Background glow slow movement
gsap.to("#glow-layer", {
  x: 50,
  y: 30,
  duration: 10,
  repeat: 0,
  yoyo: true,
  ease: "none"
});

// Scan line movement
gsap.to("#scan-line", {
  y: 1080,
  duration: 5,
  repeat: 0,
  ease: "none"
});

// Particles slow drift
gsap.to("#particle1", {y: -30, x: 20, duration: 8, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle2", {y: 40, x: -30, duration: 10, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle3", {y: -20, x: -25, duration: 12, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle4", {y: 30, x: 15, duration: 6, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle5", {y: -40, x: 40, duration: 9, repeat: 0, yoyo: true, ease: "sine.inOut"});

window.__timelines["beat-3"] = tl;
</script>
</body>
</html>
