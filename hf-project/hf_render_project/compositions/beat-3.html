<!DOCTYPE html>
<html data-composition-id="beat-3" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <title>HyperFrames Scene</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#1a1a2e;overflow:hidden;font-family:'Inter','Noto Sans SC',sans-serif;">
    <div class="scene" style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#0a0a0a;">
        <!-- Decorative Layer 1: Background Grid (Split) -->
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg, rgba(0,212,255,0.05) 0%, rgba(0,212,255,0.05) 50%, rgba(255,64,129,0.05) 50%, rgba(255,64,129,0.05) 100%), linear-gradient(0deg, transparent 95px, rgba(255,255,255,0.08) 95px, rgba(255,255,255,0.08) 96px), linear-gradient(90deg, transparent 95px, rgba(255,255,255,0.08) 95px, rgba(255,255,255,0.08) 96px);background-size:100% 100%, 100px 100px, 100px 100px;opacity:1.6;"></div>

        <!-- Decorative Layer 2: Radial Glow (Left & Right) -->
        <div style="position:absolute;top:50%;left:30%;width:800px;height:800px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);pointer-events:none;"></div>
        <div style="position:absolute;top:50%;left:70%;width:800px;height:800px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(255,64,129,0.15) 0%, transparent 70%);pointer-events:none;"></div>

        <!-- Decorative Layer 3: Ghost Text Watermark -->
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:280px;font-weight:bold;color:rgba(255,255,255,0.04);white-space:nowrap;pointer-events:none;letter-spacing:20px;">STRUCTURAL SHIFT</div>

        <!-- Decorative Layer 4: Central Neon Divider -->
        <div style="position:absolute;top:100px;left:50%;transform:translateX(-50%);width:4px;height:880px;background:linear-gradient(to bottom, transparent, #00D4FF 20%, #FF4081 80%, transparent);box-shadow:0 0 20px #00D4FF, 0 0 40px #FF4081;opacity:1.8;"></div>

        <!-- Decorative Layer 5: Corner Accents -->
        <div style="position:absolute;top:100px;left:100px;width:50px;height:50px;border-left:3px solid rgba(0,212,255,0.3);border-top:3px solid rgba(0,212,255,0.3);"></div>
        <div style="position:absolute;top:100px;right:100px;width:50px;height:50px;border-right:3px solid rgba(255,64,129,0.3);border-top:3px solid rgba(255,64,129,0.3);"></div>
        <div style="position:absolute;bottom:100px;left:100px;width:50px;height:50px;border-left:3px solid rgba(0,212,255,0.3);border-bottom:3px solid rgba(0,212,255,0.3);"></div>
        <div style="position:absolute;bottom:100px;right:100px;width:50px;height:50px;border-right:3px solid rgba(255,64,129,0.3);border-bottom:3px solid rgba(255,64,129,0.3);"></div>

        <!-- Decorative Layer 6: Scanning Line -->
        <div style="position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent);animation: scanLine 4s linear 3;"></div>

        <!-- Ghost Text Overlay (Subtle) -->
        <div style="position:absolute;top:200px;left:150px;font-size:40px;color:rgba(0,212,255,0.06);font-weight:bold;transform:rotate(-15deg);pointer-events:none;">高薪引力</div>
        <div style="position:absolute;top:300px;right:150px;font-size:40px;color:rgba(255,64,129,0.06);font-weight:bold;transform:rotate(15deg);pointer-events:none;">激烈竞争</div>

        <!-- Main Title -->
        <div style="position:absolute;top:130px;left:100px;width:1720px;text-align:center;">
            <h1 style="margin:0;font-size:96px;font-weight:bold;color:#FFFFFF;text-shadow:0 0 30px rgba(0,212,255,0.8), 0 0 60px rgba(0,212,255,0.4);letter-spacing:5px;">
                就业市场<span style="color:#FFD700;">两极分化</span>
            </h1>
        </div>

        <!-- Left Panel: High-Pay Tech Field (Gravitational Field) -->
        <div style="position:absolute;top:280px;left:100px;width:820px;height:500px;">
            <!-- Left Label -->
            <div style="position:absolute;top:0;left:0;background:linear-gradient(90deg, rgba(0,212,255,0.1), transparent);border-left:3px solid #00D4FF;padding:8px 20px;">
                <span style="font-size:24px;color:#00D4FF;font-weight:bold;letter-spacing:2px;">高薪技术岗 · 引力场</span>
            </div>

            <!-- AI Engineer Card -->
            <div style="position:absolute;top:60px;left:50px;width:320px;height:220px;background:rgba(26,26,46,0.7);border:1px solid rgba(0,212,255,0.3);border-radius:20px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg, #00D4FF, transparent);"></div>
                <div style="position:absolute;top:0;left:0;right:0;height:100%;background:radial-gradient(circle at top, rgba(0,212,255,0.08), transparent 70%);"></div>
                <div style="position:absolute;top:30px;left:30px;">
                    <div style="font-size:16px;color:#999999;margin-bottom:8px;">AI 工程师</div>
                    <div style="font-size:100px;font-weight:bold;color:#FFD700;font-family:'JetBrains Mono',monospace;line-height:1;">百万</div>
                    <div style="font-size:20px;color:#FFFFFF;margin-top:5px;">年薪 + 股票期权</div>
                </div>
                <div style="position:absolute;top:30px;right:30px;">
                    <div style="font-size:60px;color:#00D4FF;">&#9650;</div>
                </div>
            </div>

            <!-- Money Symbols & Particles -->
            <div style="position:absolute;top:100px;left:400px;font-size:80px;color:rgba(255,215,0,0.6);animation: floatUp 3s ease-in-out 3;">$</div>
            <div style="position:absolute;top:180px;left:450px;font-size:60px;color:rgba(0,212,255,0.6);animation: floatUp 4s ease-in-out 3 0.5s;">&#9733;</div>
            <div style="position:absolute;top:140px;left:500px;font-size:70px;color:rgba(255,215,0,0.5);animation: floatUp 3.5s ease-in-out 3 1s;">$</div>

            <!-- Upward Arrow Icon -->
            <div style="position:absolute;top:250px;left:200px;width:120px;height:120px;border:2px solid rgba(0,212,255,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,212,255,0.05);">
                <div style="font-size:60px;color:#00D4FF;">&#9650;</div>
            </div>

            <!-- Demand Bar -->
            <div style="position:absolute;top:340px;left:50px;width:720px;height:40px;background:rgba(255,255,255,0.05);border-radius:20px;overflow:hidden;">
                <div style="width:85%;height:100%;background:linear-gradient(90deg, #00D4FF, #FFD700);border-radius:20px;box-shadow:0 0 15px rgba(0,212,255,0.5);"></div>
                <div style="position:absolute;top:50%;left:85%;transform:translate(-50%,-50%);background:#0a0a0a;padding:4px 12px;border-radius:10px;font-size:18px;color:#FFFFFF;font-weight:bold;">需求指数</div>
            </div>
        </div>

        <!-- Right Panel: Basic Admin Arena (Colosseum) -->
        <div style="position:absolute;top:280px;left:1000px;width:820px;height:500px;">
            <!-- Right Label -->
            <div style="position:absolute;top:0;right:0;background:linear-gradient(90deg, transparent, rgba(255,64,129,0.1));border-right:3px solid #FF4081;padding:8px 20px;">
                <span style="font-size:24px;color:#FF4081;font-weight:bold;letter-spacing:2px;">基础行政岗 · 角斗场</span>
            </div>

            <!-- Competition Rate Card -->
            <div style="position:absolute;top:60px;right:50px;width:320px;height:220px;background:rgba(26,26,46,0.7);border:1px solid rgba(255,64,129,0.3);border-radius:20px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden;">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg, transparent, #FF4081);"></div>
                <div style="position:absolute;top:0;left:0;right:0;height:100%;background:radial-gradient(circle at top, rgba(255,64,129,0.08), transparent 70%);"></div>
                <div style="position:absolute;top:30px;right:30px;text-align:right;">
                    <div style="font-size:16px;color:#999999;margin-bottom:8px;">行政综合岗</div>
                    <div style="font-size:100px;font-weight:bold;color:#FF4081;font-family:'JetBrains Mono',monospace;line-height:1;">1:1000</div>
                    <div style="font-size:20px;color:#FFFFFF;margin-top:5px;">竞争比率</div>
                </div>
                <div style="position:absolute;top:30px;left:30px;">
                    <div style="font-size:60px;color:#FF4081;">&#9888;</div>
                </div>
            </div>

            <!-- Crowd Silhouettes -->
            <div style="position:absolute;top:120px;left:100px;font-size:40px;color:rgba(255,64,129,0.5);letter-spacing:10px;">&#9899;&#9899;&#9899;&#9899;&#9899;</div>
            <div style="position:absolute;top:180px;left:80px;font-size:40px;color:rgba(255,64,129,0.4);letter-spacing:10px;">&#9899;&#9899;&#9899;&#9899;&#9899;</div>
            <div style="position:absolute;top:150px;left:120px;font-size:50px;color:rgba(255,64,129,0.3);letter-spacing:15px;">&#9899;&#9899;&#9899;</div>

            <!-- Warning Triangles -->
            <div style="position:absolute;top:240px;left:300px;font-size:48px;color:rgba(255,64,129,0.6);animation: flash 2s ease-in-out 3;">&#9888;</div>
            <div style="position:absolute;top:200px;left:350px;font-size:36px;color:rgba(255,64,129,0.4);animation: flash 2s ease-in-out 3 0.3s;">&#9888;</div>

            <!-- Competition Bar -->
            <div style="position:absolute;top:340px;right:50px;width:720px;height:40px;background:rgba(255,255,255,0.05);border-radius:20px;overflow:hidden;">
                <div style="width:95%;height:100%;background:linear-gradient(90deg, #FF4081, #FFD700);border-radius:20px;box-shadow:0 0 15px rgba(255,64,129,0.5);"></div>
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a0a0a;padding:4px 12px;border-radius:10px;font-size:18px;color:#FFFFFF;font-weight:bold;">竞争强度</div>
            </div>
        </div>

        <!-- Center Metaphor: Balance/See-Saw -->
        <div style="position:absolute;top:600px;left:50%;transform:translateX(-50%);width:400px;height:120px;">
            <div style="position:absolute;top:50px;left:0;width:400px;height:8px;background:linear-gradient(90deg, #00D4FF, #FFFFFF, #FF4081);border-radius:4px;"></div>
            <div style="position:absolute;top:30px;left:50px;width:40px;height:40px;background:#00D4FF;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <span style="font-size:20px;color:#0a0a0a;font-weight:bold;">$</span>
            </div>
            <div style="position:absolute;top:30px;right:50px;width:40px;height:40px;background:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <span style="font-size:20px;color:#FFFFFF;font-weight:bold;">!</span>
            </div>
            <div style="position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:14px;color:#999999;letter-spacing:2px;">结构性失衡</div>
        </div>

        <!-- Bottom Info Area: Narration Text -->
        <div style="position:absolute;bottom:120px;left:100px;width:1720px;height:100px;background:rgba(26,26,46,0.5);border:1px solid rgba(255,255,255,0.05);border-radius:16px;backdrop-filter:blur(5px);display:flex;align-items:center;padding:0 40px;">
            <div style="width:6px;height:50px;background:linear-gradient(to bottom, #00D4FF, #FF4081);border-radius:3px;margin-right:30px;"></div>
            <p style="margin:0;font-size:28px;color:#FFFFFF;line-height:1.5;">
                关键影响？就业市场<span style="color:#FFD700;font-weight:bold;">两极分化</span>更严重。高薪技术岗如AI工程师，<span style="color:#00D4FF;">年薪百万</span>还招不到人；基础行政岗，<span style="color:#FF4081;">竞争比考公还激烈</span>。说白了，不是没工作，是<span style="color:#FFFFFF;text-shadow:0 0 10px rgba(255,255,255,0.5);">机会变了天</span>。
            </p>
        </div>

        <!-- Particle Dots (Decoration) -->
        <div style="position:absolute;top:400px;left:200px;width:4px;height:4px;background:#00D4FF;border-radius:50%;box-shadow:0 0 6px #00D4FF;animation: particleDrift 8s ease-in-out 3;"></div>
        <div style="position:absolute;top:500px;left:400px;width:3px;height:3px;background:#1a1a2e;border-radius:50%;box-shadow:0 0 6px #FFD700;animation: particleDrift 10s ease-in-out 3 1s;"></div>
        <div style="position:absolute;top:350px;right:300px;width:4px;height:4px;background:#1a1a2e;border-radius:50%;box-shadow:0 0 6px #FF4081;animation: particleDrift 9s ease-in-out 3 2s;"></div>
        <div style="position:absolute;top:600px;right:200px;width:3px;height:3px;background:#1a1a2e;border-radius:50%;box-shadow:0 0 6px #FFFFFF;animation: particleDrift 12s ease-in-out 3 0.5s;"></div>
    </div>

    <script>
        // Initialize timeline registry
        window.__timelines = window.__timelines || {};

        // Create the timeline for this beat
        const tl = gsap.timeline({paused: true});

        // Define entry animations with 0.15s stagger
        // 1. Background decorative layers (fade in)
        tl.from("div[style*='background: linear-gradient(90deg, rgba(0,212,255,0.05)']", {opacity:0, duration:1.2, ease:"power1.inOut"}, 0);
        tl.from("div[style*='background:radial-gradient(circle, rgba(0,212,255,0.15)']", {opacity:0, duration:1.2, ease:"power1.inOut"}, 0.15);
        tl.from("div[style*='background:radial-gradient(circle, rgba(255,64,129,0.15)']", {opacity:0, duration:1.2, ease:"power1.inOut"}, 0.3);

        // 2. Ghost text watermark (fade in)
        tl.from("div[style*='STRUCTURAL SHIFT']", {opacity:0, duration:1.5, ease:"power1.inOut"}, 0.45);

        // 3. Main title (slide down)
        tl.from("h1", {y:-50, opacity:0, duration:0.8, ease:"power3.out"}, 0.6);

        // 4. Core data cards (pop in from below)
        tl.from("div[style*='width:320px;height:220px;background:rgba(26,26,46,0.7);']:first-of-type", {y:60, opacity:0, scale:0.9, duration:0.7, ease:"back.out(1.7)"}, 0.75);
        tl.from("div[style*='width:320px;height:220px;background:rgba(26,26,46,0.7);']:last-of-type", {y:60, opacity:0, scale:0.9, duration:0.7, ease:"back.out(1.7)"}, 0.9);

        // 5. Auxiliary elements (slide in from sides)
        tl.from("div[style*='高薪技术岗 · 引力场']", {x:-30, opacity:0, duration:0.5, ease:"power2.out"}, 1.05);
        tl.from("div[style*='基础行政岗 · 角斗场']", {x:30, opacity:0, duration:0.5, ease:"power2.out"}, 1.2);
        tl.from("div[style*='width:720px;height:40px;background:rgba(255,255,255,0.05)']:first-of-type", {scaleX:0, transformOrigin:"left", duration:1, ease:"power2.inOut"}, 1.35);
        tl.from("div[style*='width:720px;height:40px;background:rgba(255,255,255,0.05)']:last-of-type", {scaleX:0, transformOrigin:"right", duration:1, ease:"power2.inOut"}, 1.5);

        // 6. Bottom info area (fade in last)
        tl.from("div[style*='bottom:120px;left:100px;width:1720px']", {opacity:0, y:20, duration:0.8, ease:"power2.out"}, 1.65);

        // Register the timeline
        window.__timelines["beat-3"] = tl;

        // Add breathing animations to specific elements (not all)
        // Card 1: Scale breathing
        gsap.to("div[style*='width:320px;height:220px;background:rgba(26,26,46,0.7);']:first-of-type", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Card 2: Scale breathing
        gsap.to("div[style*='width:320px;height:220px;background:rgba(26,26,46,0.7);']:last-of-type", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Main title text shadow pulse
        gsap.to("h1", {
            textShadow: "0 0 40px rgba(0,212,255,1), 0 0 80px rgba(0,212,255,0.6)",
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Keyframes for decorative elements
        const style = document.createElement('style');
        style.textContent = `
            @keyframes scanLine {
                0% { top: -2px; }
                100% { top: 100%; }
            }
            @keyframes floatUp {
                0%, 100% { transform: translateY(0); opacity: 0.6; }
                50% { transform: translateY(-30px); opacity: 1; }
            }
            @keyframes flash {
                0%, 100% { opacity: 0.6; }
                50% { opacity: 1; }
            }
            @keyframes particleDrift {
                0%, 100% { transform: translate(0, 0); opacity: 0.6; }
                25% { transform: translate(15px, -20px); opacity: 0.8; }
                50% { transform: translate(-10px, -40px); opacity: 1; }
                75% { transform: translate(20px, -15px); opacity: 0.7; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
