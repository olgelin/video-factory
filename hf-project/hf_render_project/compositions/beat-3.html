<body style="width:1920px; height:1080px; overflow:hidden; background:#1a1a2e; position:relative; font-family:'Microsoft YaHei','PingFang SC',sans-serif;"><div class="scene" style="position:relative;width:1920px;height:1080px;background:#1a1a2e;overflow:hidden;">

  <div class="particle" id="p7" style="position:absolute; width:3px; height:3px; border-radius:50%; background:rgba(255,150,50,0.6); top:10%; left:60%; opacity:0;"></div>
  <div class="particle" id="p8" style="position:absolute; width:5px; height:5px; border-radius:50%; background:rgba(0,200,255,0.5); top:50%; left:35%; opacity:0;"></div>

    </p>

      <div style="font-size:14px; color:rgba(255,255,255,0.55); line-height:1.6; margin-bottom:20px;">全球减排目标倒逼产业升级转型</div>
      <div style="display:flex; align-items:baseline; gap:6px;">
        <span style="font-size:36px; font-weight:900; color:#ff6432;">137</span>
        <span style="font-size:14px; color:rgba(255,255,255,0.45);">个国家承诺碳中和</span>
      </div>
      <div id="card1-bar" style="width:0; height:4px; background:linear-gradient(90deg, #ff6432, #ff9900); border-radius:2px; margin-top:16px;"></div>
    </div>

    <!-- Card 2: Tech Explosion -->
    <div id="card2" class="data-card" style="width:340px; background:rgba(255,255,255,0.04); border:1px solid rgba(0,204,255,0.2); border-radius:16px; padding:36px 30px; backdrop-filter:blur(10px); opacity:1; transform:translateY(40px) scale(0.95); position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, #00ccff, #00ff88);"></div>
      <div style="width:50px; height:50px; border-radius:12px; background:rgba(0,204,255,0.15); display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#00ccff" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div style="font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:4px; text-transform:uppercase; margin-bottom:10px; font-weight:600;">ACCELERATION</div>
      <div style="font-size:22px; color:#ffffff; font-weight:700; margin-bottom:8px;">科技爆炸</div>
      <div style="font-size:14px; color:rgba(255,255,255,0.55); line-height:1.6; margin-bottom:20px;">AI·量子计算·新能源技术指数级突破</div>
      <div style="display:flex; align-items:baseline; gap:6px;">
        <span style="font-size:36px; font-weight:900; color:#00ccff;">10x</span>
        <span style="font-size:14px; color:rgba(255,255,255,0.45);">算力增长倍速 / 5年</span>
      </div>
      <div id="card2-bar" style="width:0; height:4px; background:linear-gradient(90deg, #00ccff, #00ff88); border-radius:2px; margin-top:16px;"></div>
    </div>

    <!-- Card 3: Stock Market -->
    <div id="card3" class="data-card" style="width:340px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,204,0,0.2); border-radius:16px; padding:36px 30px; backdrop-filter:blur(10px); opacity:1; transform:translateY(40px) scale(0.95); position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, #ffcc00, #ff6432);"></div>
      <div style="width:50px; height:50px; border-radius:12px; background:rgba(255,204,0,0.15); display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="16 7 22 7 22 13" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:4px; text-transform:uppercase; margin-bottom:10px; font-weight:600;">RESULT</div>
      <div style="font-size:22px; color:#ffffff; font-weight:700; margin-bottom:8px;">市场疯狂</div>
      <div style="font-size:14px; color:rgba(255,255,255,0.55); line-height:1.6; margin-bottom:20px;">多重因素共振推动资本涌入赛道</div>
      <div style="display:flex; align-items:baseline; gap:6px;">
        <span style="font-size:36px; font-weight:900; color:#ffcc00;">+68%</span>
        <span style="font-size:14px; color:rgba(255,255,255,0.45);">新能源板块年涨幅</span>
      </div>
      <div id="card3-bar" style="width:0; height:4px; background:linear-gradient(90deg, #ffcc00, #ff6432); border-radius:2px; margin-top:16px;"></div>
    </div>
  </div>

  <!-- Arrow Flow Indicator -->
  <div id="flow-arrows" style="display:flex; align-items:center; justify-content:center; gap:20px; margin-top:35px; opacity:1;">
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:8px; height:8px; border-radius:50%; background:#1a1a2e;"></div>
      <span style="font-size:13px; color:rgba(255,255,255,0.4);">碳中和</span>
    </div>
    <svg width="30" height="12" viewBox="0 0 30 12"><path d="M0 6h24M18 1l6 5-6 5" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/></svg>
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:8px; height:8px; border-radius:50%; background:#00ccff;"></div>
      <span style="font-size:13px; color:rgba(255,255,255,0.4);">科技突破</span>
    </div>
    <svg width="30" height="12" viewBox="0 0 30 12"><path d="M0 6h24M18 1l6 5-6 5" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/></svg>
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:8px; height:8px; border-radius:50%; background:#1a1a2e;"></div>
      <span style="font-size:13px; color:rgba(255,255,255,0.4);">股市疯狂</span>
    </div>
    <svg width="30" height="12" viewBox="0 0 30 12"><path d="M0 6h24M18 1l6 5-6 5" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/></svg>
    <div style="font-size:13px; color:rgba(255,255,255,0.25); font-style:italic;">不疯狂才怪</div>

</div>

<!-- Decorative: Corner Brackets -->
<div style="position:absolute; top:40px; left:50px; width:30px; height:30px; border-top:2px solid rgba(255,255,255,0.15); border-left:2px solid rgba(255,255,255,0.15); pointer-events:none;" id="corner-tl"></div>
<div style="position:absolute; top:40px; right:50px; width:30px; height:30px; border-top:2px solid rgba(255,255,255,0.15); border-right:2px solid rgba(255,255,255,0.15); pointer-events:none;" id="corner-tr"></div>
<div style="position:absolute; bottom:40px; left:50px; width:30px; height:30px; border-bottom:2px solid rgba(255,255,255,0.15); border-left:2px solid rgba(255,255,255,0.15); pointer-events:none;" id="corner-bl"></div>
<div style="position:absolute; bottom:40px; right:50px; width:30px; height:30px; border-bottom:2px solid rgba(255,255,255,0.15); border-right:2px solid rgba(255,255,255,0.15); pointer-events:none;" id="corner-br"></div>

<!-- Composition ID Tag -->
<div style="position:absolute; bottom:20px; right:60px; font-size:11px; color:rgba(255,255,255,0.15); letter-spacing:2px; font-family:monospace;" id="comp-tag">beat-3</div>

<script>
(function() {
  var tl = gsap.timeline({ paused: true });

  // Background grid fade in
  tl.to('#grid-layer', {
    opacity: 1,
    duration: 1.5,
    ease: 'power2.out'
  }, 0);

  // Glowing orbs
  tl.to('#orb1', { opacity: 1, duration: 2, ease: 'power2.out' }, 0.2);
  tl.to('#orb2', { opacity: 1, duration: 2, ease: 'power2.out' }, 0.4);
  tl.to('#orb3', { opacity: 1, duration: 2, ease: 'power2.out' }, 0.3);

  // Orb subtle float
  tl.to('#orb1', { y: 20, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0.5);
  tl.to('#orb2', { y: -15, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0.5);
  tl.to('#orb3', { scale: 1.1, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0.5);

  // Accent lines
  tl.to('#accent-line-top', { width: '100%', duration: 1.2, ease: 'power3.inOut' }, 0.3);
  tl.to('#accent-line-bottom', { width: '100%', duration: 1.2, ease: 'power3.inOut' }, 0.5);
  tl.to('#accent-line-left', { height: '100%', duration: 1, ease: 'power3.inOut' }, 0.4);

  // Particles fade in and float
  var particles = ['#p1','#p2','#p3','#p4','#p5','#p6','#p7','#p8'];
  particles.forEach(function(p, i) {
    tl.to(p, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.5 + i * 0.1);
    tl.to(p, {
      y: -30 + 0.5 * 60,
      x: -20 + 0.5 * 40,
      duration: 3 + 0.5 * 2,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: 1
    }, 0.8 + i * 0.1);
  });

  // Section label
  tl.to('#section-label', {
    opacity: 1,
    y: 0,
    duration: 0.8,
    ease: 'power3.out'
  }, 0.6);

  // Title entrance
  tl.to('#title-block', {
    opacity: 1,
    y: 0,
    duration: 1,
    ease: 'power3.out'
  }, 0.9);

  // Whip line flash
  tl.to('#whip-line', {
    width: '800px',
    duration: 0.3,
    ease: 'power4.in'
  }, 1.3);
  tl.to('#whip-line', {
    opacity: 0,
    width: '0px',
    duration: 0.5,
    ease: 'power2.out'
  }, 1.6);

  // Description block
  tl.to('#description-block', {
    opacity: 1,
    y: 0,
    duration: 0.8,
    ease: 'power3.out'
  }, 1.4);

  // Data cards stagger
  tl.to('#card1', {
    opacity: 1,
    y: 0,
    scale: 1,
    duration: 0.8,
    ease: 'back.out(1.5)'
  }, 1.8);

  tl.to('#card2', {
    opacity: 1,
    y: 0,
    scale: 1,
    duration: 0.8,
    ease: 'back.out(1.5)'
  }, 2.0);

  tl.to('#card3', {
    opacity: 1,
    y: 0,
    scale: 1,
    duration: 0.8,
    ease: 'back.out(1.5)'
  }, 2.2);

  // Card progress bars
  tl.to('#card1-bar', { width: '100%', duration: 1, ease: 'power2.out' }, 2.5);
  tl.to('#card2-bar', { width: '100%', duration: 1, ease: 'power2.out' }, 2.7);
  tl.to('#card3-bar', { width: '100%', duration: 1, ease: 'power2.out' }, 2.9);

  // Flow arrows
  tl.to('#flow-arrows', {
    opacity: 1,
    duration: 0.8,
    ease: 'power2.out'
  }, 3.0);

  // Corner brackets
  tl.fromTo('#corner-tl', { opacity: 0, x: -10, y: -10 }, { opacity: 1, x: 0, y: 0, duration: 0.6, ease: 'power2.out' }, 0.5);
  tl.fromTo('#corner-tr', { opacity: 0, x: 10, y: -10 }, { opacity: 1, x: 0, y: 0, duration: 0.6, ease: 'power2.out' }, 0.6);
  tl.fromTo('#corner-bl', { opacity: 0, x: -10, y: 10 }, { opacity: 1, x: 0, y: 0, duration: 0.6, ease: 'power2.out' }, 0.7);
  tl.fromTo('#corner-br', { opacity: 0, x: 10, y: 10 }, { opacity: 1, x: 0, y: 0, duration: 0.6, ease: 'power2.out' }, 0.8);

  // Comp tag
  tl.to('#comp-tag', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.0);

  // Register timeline
  window.__timelines = window.__timelines || {};
  window.__timelines['beat-3'] = tl;

  // Auto play
  tl.play();
})();
</script>
</div></body>
</html>
