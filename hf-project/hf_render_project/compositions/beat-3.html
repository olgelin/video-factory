<!DOCTYPE html>
<html data-composition-id="beat-3" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频场景 - 赛博朋克科技风</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;"><div class="scene" style="position:relative;width:1920px;height:1080px;background:#1a1a2e;overflow:hidden;">
    <div id="scene" style="width: 1920px; height: 1080px; position: relative; overflow: hidden;">
        <!-- 装饰层：grid网格 -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,212,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.1) 1px, transparent 1px); background-size: 50px 50px; z-index: 1;"></div>
        <!-- 光晕装饰 -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%); z-index: 2;"></div>
        <!-- ghost text -->
        <div style="position: absolute; top: 20px; left: 20px; font-size: 120px; color: rgba(255,255,255,0.05); z-index: 1; font-weight: bold;">政策组合拳</div>
        <!-- 主要内容容器 -->
        <div id="content" style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 80px;">
            <!-- 标题 -->
            <h1 style="font-size: 96px; color: #FFFFFF; text-shadow: 0 0 20px rgba(0,212,255,0.8), 0 0 40px rgba(0,212,255,0.6); margin-bottom: 50px;">政策组合拳</h1>
            <!-- 流程图容器 -->
            <div style="display: flex; align-items: center; justify-content: center; gap: 100px;">
                <!-- 政府节点 -->
                <div class="node" style="text-align: center;">
                    <div style="width: 150px; height: 150px; background-color: #00D4FF; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,212,255,0.5);">
                        <span style="font-size: 80px;">🏛️</span>
                    </div>
                    <p style="color: #FFFFFF; font-size: 36px; margin-top: 20px;">政府</p>
                </div>
                <!-- 箭头连接线 -->
                <div style="width: 100px; height: 4px; background: linear-gradient(90deg, #00D4FF, #FF4081); position: relative;">
                    <div style="position: absolute; right: 0; top: -8px; width: 0; height: 0; border-left: 20px solid #FF4081; border-top: 12px solid transparent; border-bottom: 12px solid transparent;"></div>
                </div>
                <!-- 政策节点容器 -->
                <div style="display: flex; gap: 80px;">
                    <!-- 减税降费节点 -->
                    <div class="node" style="text-align: center;">
                        <div style="width: 120px; height: 120px; background-color: #FF4081; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,64,129,0.5);">
                            <span style="font-size: 60px;">💰</span>
                        </div>
                        <p style="color: #FFFFFF; font-size: 28px; margin-top: 15px;">减税降费</p>
                    </div>
                    <!-- 优化通关节点 -->
                    <div class="node" style="text-align: center;">
                        <div style="width: 120px; height: 120px; background-color: #FF4081; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,64,129,0.5);">
                            <span style="font-size: 60px;">🚚</span>
                        </div>
                        <p style="color: #FFFFFF; font-size: 28px; margin-top: 15px;">优化通关</p>
                    </div>
                    <!-- 支持新业态节点 -->
                    <div class="node" style="text-align: center;">
                        <div style="width: 120px; height: 120px; background-color: #FF4081; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,64,129,0.5);">
                            <span style="font-size: 60px;">💡</span>
                        </div>
                        <p style="color: #FFFFFF; font-size: 28px; margin-top: 15px;">支持新业态</p>
                    </div>
                </div>
                <!-- 另一个箭头连接线 -->
                <div style="width: 100px; height: 4px; background: linear-gradient(90deg, #FF4081, #FFD700); position: relative;">
                    <div style="position: absolute; right: 0; top: -8px; width: 0; height: 0; border-left: 20px solid #FFD700; border-top: 12px solid transparent; border-bottom: 12px solid transparent;"></div>
                </div>
                <!-- 结果节点：订单爆了 -->
                <div class="node" style="text-align: center;">
                    <div style="width: 150px; height: 150px; background-color: #FFD700; border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,215,0,0.5);">
                        <span style="font-size: 80px;">🏭</span>
                    </div>
                    <p style="color: #FFFFFF; font-size: 36px; margin-top: 20px;">订单爆了</p>
                </div>
            </div>
            <!-- 底部文字：成本降，订单爆 -->
            <div style="margin-top: 60px; text-align: center;">
                <p style="color: #FFD700; font-size: 48px; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.5);">成本降，订单爆</p>
            </div>
            <!-- 数据卡片 -->
            <div style="display: flex; gap: 50px; margin-top: 60px;">
                <div class="data-card" style="background-color: rgba(0,212,255,0.1); border: 2px solid #00D4FF; border-radius: 24px; padding: 30px; text-align: center; width: 200px;">
                    <div style="font-size: 60px; color: #FFD700; font-family: 'JetBrains Mono', monospace; font-weight: bold;">30%</div>
                    <div style="color: #FFFFFF; font-size: 28px; margin-top: 10px;">成本降低</div>
                    <div style="width: 100%; height: 10px; background-color: rgba(0,212,255,0.3); border-radius: 5px; margin-top: 20px;">
                        <div style="width: 30%; height: 100%; background-color: #00D4FF; border-radius: 5px;"></div>
                    </div>
                </div>
                <div class="data-card" style="background-color: rgba(255,64,129,0.1); border: 2px solid #FF4081; border-radius: 24px; padding: 30px; text-align: center; width: 200px;">
                    <div style="font-size: 60px; color: #FFD700; font-family: 'JetBrains Mono', monospace; font-weight: bold;">50%</div>
                    <div style="color: #FFFFFF; font-size: 28px; margin-top: 10px;">订单增长</div>
                    <div style="width: 100%; height: 10px; background-color: rgba(255,64,129,0.3); border-radius: 5px; margin-top: 20px;">
                        <div style="width: 50%; height: 100%; background-color: #FF4081; border-radius: 5px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- GSAP动画脚本 -->
    <script>
        window.__timelines = window.__timelines || {};
        const timeline = gsap.timeline();
        window.__timelines["beat-3"] = timeline;
        const nodes = document.querySelectorAll('.node, .data-card');
        timeline.from(nodes, {
            opacity: 0,
            y: 50,
            duration: 1,
            stagger: 0.15,
            ease: "power2.out"
        });
        gsap.to('.data-card', {
            scale: 1.05,
            duration: 2,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
    </script>
</div></body>
</html>
