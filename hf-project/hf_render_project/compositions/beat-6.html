</div>

<script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({paused: true});
    window.__timelines["beat-6"] = tl;

    // 1. Background decorative layers
    tl.from("body > .scene > div:nth-child(1)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
    tl.from("body > .scene > div:nth-child(2)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15);
    tl.from("body > .scene > div:nth-child(3)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3);

    // 2. Scan line
    tl.from("body > .scene > div:nth-child(4)", {opacity: 0, duration: 0.8, ease: "power1.inOut"}, 0.45);
    tl.to("body > .scene > div:nth-child(4)", {y: 1080, duration: 4, ease: "none", repeat: 0}, 0.45);

    // 3. Corner lines
    const corners = document.querySelectorAll("body > .scene > div:nth-child(n+5):nth-child(-n+12)");
    corners.forEach((corner, i) => {
        tl.from(corner, {opacity: 0, duration: 0.8, ease: "power1.inOut"}, 0.6 + (i * 0.05));
    });

    // 4. Main title
    tl.from("#beat6-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.9);
    tl.from("#beat6-subtitle", {y: -30, opacity: 0, duration: 0.6, ease: "power3.out"}, 1.05);

    // 5. Column titles
    tl.from("#beat6-col-grad-title", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.2);
    tl.from("#beat6-col-invest-title", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.35);

    // 6. List items (staggered)
    tl.from("#beat6-item-1", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.5);
    tl.from("#beat6-item-2", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.65);
    tl.from("#beat6-item-3", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.8);
    tl.from("#beat6-item-4", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.95);
    tl.from("#beat6-item-5", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.1);
    tl.from("#beat6-item-6", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 2.25);

    // 7. Old icon (crossed out)
    tl.from("#beat6-old-icon", {opacity: 0, scale: 0.8, duration: 0.8, ease: "back.out(1.7)"}, 2.4);

    // 8. Bottom info
    tl.from("#beat6-bottom", {opacity: 0, y: 30, duration: 0.6, ease: "power2.out"}, 2.6);

    // 9. Particles
    tl.from(".particle", {opacity: 0, stagger: 0.1, duration: 0.5}, 2.8);

    // 10. Breathing animations (limited to 2-3 elements)
    // Title glow pulse
    gsap.to("#beat6-title", {
        textShadow: "0 0 40px rgba(0,212,255,0.8)",
        duration: 2.5,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut"
    });

    // Data cards breathing (applied to item containers)
    gsap.to("#beat6-item-1, #beat6-item-2, #beat6-item-3, #beat6-item-4, #beat6-item-5", {
        scale: 1.015,
        duration: 3,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut",
        stagger: 0.5
    });

    // Particle drift
    gsap.to(".particle", {
        y: "+=50",
        x: "+=20",
        duration: 8,
        repeat: 0,
        yoyo: true,
        ease: "none",
        stagger: {
            each: 2,
            from: "random"
        }
    });

    // Start the timeline
    tl.play();
</script>
