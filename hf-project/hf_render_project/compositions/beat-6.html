<!DOCTYPE html>
<html lang="zh-CN" data-composition-id="beat-6" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 6 - Alert List</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #0a0a0a; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #FFFFFF; width: 1920px; height: 1080px;">
    <div class="scene" style="background:#1a1a2e;" style="width: 100%; height: 100%; position: relative; overflow: hidden; padding: 100px; box-sizing: border-box;">
        <!-- Background: Vibrating Red Data Grid -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;">
            <svg width="100%" height="100%" style="position: absolute; top: 0; left: 0;">
                <defs>
                    <pattern id="gridPattern" width="80" height="80" patternUnits="userSpaceOnUse">
                        <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255, 64, 129, 0.15)" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#gridPattern)" opacity="0.7"/>
                <line x1="0" y1="50%" x2="100%" y2="50%" stroke="rgba(255, 64, 129, 0.4)" stroke-width="1" opacity="0.5" id="gridCenterLine"/>
            </svg>
        </div>

        <!-- Background: Radial Glow -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(255, 64, 129, 0.1) 0%, rgba(10, 10, 10, 0) 70%); z-index: 1; pointer-events: none;"></div>

        <!-- Ghost Text Watermark -->
        <div style="position: absolute; top: 10%; left: 5%; z-index: 1; opacity: 0.03; font-size: 120px; font-weight: 900; white-space: nowrap; pointer-events: none; color: #FFFFFF;" id="ghostText">WARNING SYSTEM</div>
        <div style="position: absolute; bottom: 15%; right: 8%; z-index: 1; opacity: 0.03; font-size: 100px; font-weight: 900; white-space: nowrap; pointer-events: none; color: #FFFFFF; transform: rotate(-5deg);" id="ghostText2">ALERT LEVEL: CRITICAL</div>

        <!-- Foreground: Red Scan Line -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #FF4081, transparent); z-index: 10; opacity: 0; box-shadow: 0 0 10px #FF4081;" id="scanLine"></div>

        <!-- Floating Warning Symbols (Foreground) -->
        <div style="position: absolute; top: 15%; right: 12%; z-index: 8; font-size: 64px; color: #FF4081; opacity: 0.8; filter: drop-shadow(0 0 8px #FF4081);" id="warningSymbol1">⚠</div>
        <div style="position: absolute; bottom: 20%; left: 8%; z-index: 8; font-size: 48px; color: #FF4081; opacity: 0.6; filter: drop-shadow(0 0 6px #FF4081); transform: rotate(-15deg);" id="warningSymbol2">⚠</div>
        <div style="position: absolute; top: 35%; left: 85%; z-index: 8; font-size: 56px; color: #FFD700; opacity: 0.5; filter: drop-shadow(0 0 8px #FFD700);" id="warningSymbol3">▲</div>

        <!-- Heartbeat Waveform (Decorative) -->
        <svg style="position: absolute; bottom: 10%; right: 10%; z-index: 8; width: 300px; height: 80px; opacity: 0.4;" id="heartbeatSvg" viewBox="0 0 300 80">
            <polyline points="0,40 20,40 30,10 40,70 50,20 60,60 70,30 80,50 90,40 120,40 130,5 140,75 150,15 160,65 170,25 180,55 190,40 300,40" fill="none" stroke="#FF4081" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 4px #FF4081);"/>
        </svg>

        <!-- Main Content Area -->
        <div style="position: relative; z-index: 5; display: flex; flex-direction: column; gap: 40px;">
            <!-- Title: CRACKLES and SHATTERS effect (simulated with layers and animation) -->
            <div style="position: relative; height: 120px;">
                <!-- Title Ghost (faint) -->
                <div style="position: absolute; top: 0; left: 0; font-size: 80px; font-weight: 900; color: rgba(255, 255, 255, 0.05); white-space: nowrap;" id="titleGhost">系统最高级别警告</div>
                <!-- Title Main (will animate) -->
                <div style="position: absolute; top: 0; left: 0; font-size: 80px; font-weight: 900; color: #FFFFFF; white-space: nowrap; text-shadow: 0 0 20px #FF4081, 0 0 40px #FF4081;" id="titleMain">系统最高级别警告</div>
                <!-- Title Fragment (for shatter effect) -->
                <div style="position: absolute; top: 0; left: 0; font-size: 80px; font-weight: 900; color: #FF4081; white-space: nowrap; clip-path: polygon(10% 0%, 20% 0%, 20% 100%, 10% 100%);" id="titleFragment1">系统最高级别警告</div>
                <div style="position: absolute; top: 0; left: 0; font-size: 80px; font-weight: 900; color: #FF4081; white-space: nowrap; clip-path: polygon(50% 0%, 60% 0%, 60% 100%, 50% 100%);" id="titleFragment2">系统最高级别警告</div>
                <div style="position: absolute; top: 0; left: 0; font-size: 80px; font-weight: 900; color: #FF4081; white-space: nowrap; clip-path: polygon(80% 0%, 90% 0%, 90% 100%, 80% 100%);" id="titleFragment3">系统最高级别警告</div>
            </div>

            <!-- Alert List Container -->
            <div style="display: flex; flex-direction: column; gap: 30px; margin-top: 20px;" id="alertList">
                <!-- Alert Item 1 -->
                <div style="background: rgba(255, 64, 129, 0.08); border: 1px solid #FF4081; border-radius: 16px; padding: 30px 40px; display: flex; align-items: center; gap: 30px; box-shadow: 0 0 20px rgba(255, 64, 129, 0.2), inset 0 0 30px rgba(255, 64, 129, 0.05); opacity: 0;" id="alertItem1">
                    <div style="font-size: 48px; color: #FF4081; animation: blink 1s 3;" id="alertIcon1">!</div>
                    <div style="font-size: 36px; font-weight: 700; color: #FFFFFF;">安全不是天上掉下来的</div>
                </div>
                <!-- Alert Item 2 -->
                <div style="background: rgba(255, 64, 129, 0.08); border: 1px solid #FF4081; border-radius: 16px; padding: 30px 40px; display: flex; align-items: center; gap: 30px; box-shadow: 0 0 20px rgba(255, 64, 129, 0.2), inset 0 0 30px rgba(255, 64, 129, 0.05); opacity: 0;" id="alertItem2">
                    <div style="font-size: 48px; color: #FF4081; animation: blink 1s 3; animation-delay: 0.5s;" id="alertIcon2">!</div>
                    <div style="font-size: 36px; font-weight: 700; color: #FFFFFF;">是有人用命换来的</div>
                </div>
                <!-- Alert Item 3 (Key Verb Highlight) -->
                <div style="background: rgba(255, 64, 129, 0.08); border: 1px solid #FF4081; border-radius: 16px; padding: 30px 40px; display: flex; align-items: center; gap: 30px; box-shadow: 0 0 20px rgba(255, 64, 129, 0.2), inset 0 0 30px rgba(255, 64, 129, 0.05); opacity: 0;" id="alertItem3">
                    <div style="font-size: 48px; color: #FF4081; animation: blink 1s 3; animation-delay: 1s;" id="alertIcon3">!</div>
                    <div style="font-size: 36px; font-weight: 700; color: #FFFFFF;">要珍惜，更要<span style="color: #FFD700; text-shadow: 0 0 10px #FFD700;">警惕</span></div>
                </div>
            </div>

            <!-- Secondary Info / Tag Pills -->
            <div style="display: flex; gap: 20px; margin-top: 30px; opacity: 0;" id="tagPills">
                <div style="background: rgba(0, 212, 255, 0.1); border: 1px solid #00D4FF; border-radius: 100px; padding: 10px 24px; font-size: 20px; font-family: 'JetBrains Mono', monospace; color: #00D4FF; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);">LEVEL: CRITICAL</div>
                <div style="background: rgba(255, 215, 0, 0.1); border: 1px solid #FFD700; border-radius: 100px; padding: 10px 24px; font-size: 20px; font-family: 'JetBrains Mono', monospace; color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);">ACTION: IMMEDIATE</div>
            </div>
        </div>

        <!-- Breathing Animation Style (as keyframes in style tag for blink animation, but rule says no <style> blocks? Need to use inline for animation keyframes? Actually, the rule says no CSS class definitions, no <style> blocks. So cannot use @keyframes. Will use inline animation with a JS-based blink. Let's adjust: We can use a simple opacity toggle via inline style animation but that's limited. Or, we can simulate blinking with a continuous animation via GSAP, but the rule says no repeat: 0 except breathing. Actually, rule 6 says "呼吸动画除外". The blinking icons are not breathing, they are critical. I'll use a simple CSS animation via inline style attribute, which is allowed as it's not a <style> block. The rule 7 says all styles must be inline style="" attribute. This includes animation. So I will use inline style with animation property for the blinking effect. For the keyframes, I need to define them somewhere. But rule 8 says no CSS class definitions, no <style> blocks. This is a conflict. I cannot define @keyframes without a style block. Let's interpret: The sandbox may support inline animation with @keyframes defined in the style attribute? Actually, the style attribute can only contain properties, not @keyframes. So I must avoid animations that require keyframes. I will use GSAP for the blinking effect instead. Let's change the plan: Remove the CSS animation from the icons, and animate them via GSAP timeline. That will comply. We can make them fade in and out continuously with yoyo, repeat: 0. But rule 5 says "不要 repeat: 0（呼吸动画除外）". Blinking icons could be considered a form of breathing? It's a warning blink. I think it's acceptable as a critical alert animation. To be safe, I will not use repeat: 0. Instead, I will have them blink a few times during the sequence. That's better. So, no CSS animation needed. We'll animate everything with GSAP. Good. So I'll remove the animation: blink from the icons and handle it in the timeline. -->

    </div>

    <script>
        // Register the timeline
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-6"] = gsap.timeline({ paused: true });
        const tl = window.__timelines["beat-6"];

        // Helper function for staggered GSAP.from for a list of elements
        function animateElements(selector, fromVars, stagger = 0.15) {
            gsap.from(selector, {
                ...fromVars,
                stagger: stagger,
                ease: "expo.out"
            });
        }

        // 1. Background Grid Vibration (subtle)
        tl.fromTo("#gridCenterLine", { opacity: 0.2, y: -2 }, { opacity: 0.4, y: 2, duration: 0.3, ease: "power2.inOut", yoyo: true, repeat: 3 }, 0);

        // 2. Ghost Text Fade In (very subtle)
        tl.fromTo(["#ghostText", "#ghostText2"], { opacity: 0, scale: 0.95 }, { opacity: 0.03, scale: 1, duration: 2, ease: "power4.out" }, 0);

        // 3. Red Scan Line Sweep
        tl.fromTo("#scanLine", { y: -50, opacity: 0 }, { y: 1130, opacity: 0.8, duration: 1.5, ease: "power4.in" }, 0.2);

        // 4. Floating Warning Symbols (float in and drift)
        tl.fromTo("#warningSymbol1", { y: 50, opacity: 0, rotation: -10 }, { y: 0, opacity: 0.8, rotation: 0, duration: 1.2, ease: "expo.out" }, 0.3);
        tl.fromTo("#warningSymbol2", { y: 30, opacity: 0, rotation: 10 }, { y: 0, opacity: 0.6, rotation: -15, duration: 1.4, ease: "expo.out" }, 0.4);
        tl.fromTo("#warningSymbol3", { y: 40, opacity: 0, scale: 0.5 }, { y: 0, opacity: 0.5, scale: 1, duration: 1, ease: "back.out(1.7)" }, 0.5);

        // 5. Heartbeat Waveform Draw In
        tl.fromTo("#heartbeatSvg polyline", { strokeDasharray: 1000, strokeDashoffset: 1000 }, { strokeDashoffset: 0, duration: 3, ease: "power2.inOut" }, 0.6);

        // 6. Title Shatter and Reform (simulated with multiple fragments)
        // Initial state: Title main is invisible, fragments are visible and scattered
        tl.set("#titleMain", { opacity: 0, scale: 1.5, filter: "blur(8px)" });
        tl.set(["#titleFragment1", "#titleFragment2", "#titleFragment3"], { opacity: 1, x: (i) => (i - 1) * 200, rotation: (i) => (i - 1) * 15 });

        // Animate fragments flying out
        tl.to("#titleFragment1", { x: -600, rotation: -45, opacity: 0, duration: 0.4, ease: "power4.in" }, 1);
        tl.to("#titleFragment2", { y: -300, opacity: 0, duration: 0.4, ease: "power4.in" }, 1.05);
        tl.to("#titleFragment3", { x: 600, rotation: 45, opacity: 0, duration: 0.4, ease: "power4.in" }, 1.1);

        // Then reform main title
        tl.to("#titleMain", { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.8, ease: "expo.out" }, 1.5);

        // 7. Alert List Items Drop In Line by Line
        tl.fromTo("#alertItem1", { y: 60, opacity: 0, scale: 0.95 }, { y: 0, opacity: 1, scale: 1, duration: 0.7, ease: "expo.out" }, 2);
        tl.fromTo("#alertItem2", { y: 60, opacity: 0, scale: 0.95 }, { y: 0, opacity: 1, scale: 1, duration: 0.7, ease: "expo.out" }, 2.3);
        tl.fromTo("#alertItem3", { y: 60, opacity: 0, scale: 0.95 }, { y: 0, opacity: 1, scale: 1, duration: 0.7, ease: "expo.out" }, 2.6);

        // 8. Alert Icons Blink (a few times, not infinite)
        tl.to("#alertIcon1", { opacity: 0.3, duration: 0.15, yoyo: true, repeat: 3 }, 2.8);
        tl.to("#alertIcon2", { opacity: 0.3, duration: 0.15, yoyo: true, repeat: 3 }, 3.0);
        tl.to("#alertIcon3", { opacity: 0.3, duration: 0.15, yoyo: true, repeat: 3 }, 3.2);

        // 9. Tag Pills Fade In
        tl.fromTo("#tagPills", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "expo.out" }, 3.5);

        // 10. Card Breathing Animation (scale pulse) on the last alert item
        tl.to("#alertItem3", { scale: 1.02, duration: 1.25, ease: "sine.inOut", yoyo: true, repeat: 0 }, 4);

        // Final subtle grid vibration
        tl.to("#gridCenterLine", { opacity: 0.2, duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 2 }, 10);
    </script>
</body>
</html>
