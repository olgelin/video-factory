        <!-- Map footer info -->

            <div style="color:#666666; font-size:16px;">竞争者数量：<span style="color:#FFD700; font-family:'JetBrains Mono',monospace;">147,892</span></div>
            <div style="color:#666666; font-size:16px;">覆盖国家：<span style="color:#FFD700; font-family:'JetBrains Mono',monospace;">89</span></div>
            <div style="color:#666666; font-size:16px;">时区跨越：<span style="color:#FFD700; font-family:'JetBrains Mono',monospace;">12</span></div>
        </div>
    </div>
    
    <!-- Right side data cards -->
    <div id="data-cards" style="position:absolute; top:220px; right:100px; width:500px; display:flex; flex-direction:column; gap:24px; opacity:1;">
        
        <!-- Globalization competition card -->
        <div id="globalization-card" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:24px; padding:30px; box-shadow:0 8px 32px rgba(0,0,0,0.4); position:relative; overflow:hidden;">
            <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, #00D4FF, #FF4081);"></div>
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at top center, rgba(0,212,255,0.08) 0%, transparent 70%);"></div>

            </div>
        </div>
        
        <!-- Adaptability index card -->
        <div id="adaptability-card" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:24px; padding:30px; box-shadow:0 8px 32px rgba(0,0,0,0.4); position:relative; overflow:hidden;">
            <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, #00D4FF, #FFD700);"></div>
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at top center, rgba(255,215,0,0.08) 0%, transparent 70%);"></div>
            <div style="color:#999999; font-size:18px; margin-bottom:10px;">适应力指数</div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
                <div style="font-size:64px; font-weight:bold; color:#00D4FF; font-family:'JetBrains Mono',monospace;">72.8</div>
                <div style="color:#999999; font-size:16px; margin-bottom:10px;">/100</div>
            </div>
            <!-- Progress bar -->
            <div style="width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; margin-bottom:15px;">
                <div id="progress-bar" style="width:0%; height:100%; background:linear-gradient(90deg, #00D4FF, #FFD700); border-radius:4px;"></div>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <div style="color:#666666; font-size:14px;">技能多样性</div>
                <div style="color:#666666; font-size:14px;">学习速度</div>
                <div style="color:#666666; font-size:14px;">跨文化沟通</div>
            </div>
        </div>
        
        <!-- Warning card -->
        <div id="warning-card" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(255,64,129,0.3); border-radius:24px; padding:30px; box-shadow:0 8px 32px rgba(0,0,0,0.4); position:relative; overflow:hidden;">
            <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, #FF4081, #FFD700);"></div>
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at top center, rgba(255,64,129,0.08) 0%, transparent 70%);"></div>
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <div style="width:40px; height:40px; background:rgba(255,64,129,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                    <div style="width:20px; height:20px; background:#1a1a2e; border-radius:50%;"></div>
                </div>
                <div style="font-size:24px; color:#FF4081; font-weight:bold;">优势消失警告</div>
            </div>
            <div style="color:#FFFFFF; font-size:18px; line-height:1.6;">
                本地优势正在消失，适应力才是王牌。你可能坐在家里，对手在东京或纽约。
            </div>
        </div>
    </div>
    
    <!-- Bottom information area -->
    <div id="bottom-info" style="position:absolute; bottom:100px; left:100px; width:1820px; display:flex; justify-content:space-between; opacity:1;">
        <div style="display:flex; gap:30px;">
            <div style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:8px; padding:10px 20px;">
                <span style="color:#00D4FF; font-size:16px;">远程办公</span>
            </div>
            <div style="background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:8px; padding:10px 20px;">
                <span style="color:#FF4081; font-size:16px;">全球化竞争</span>
            </div>
            <div style="background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); border-radius:8px; padding:10px 20px;">

            </div>
            <div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 20px;">

    </div>
    
    <!-- Floating particles -->
    <div class="particle" style="position:absolute; top:20%; left:10%; width:4px; height:4px; background:#00D4FF; border-radius:50%; opacity:0;"></div>

    <div class="particle" style="position:absolute; top:70%; left:30%; width:2px; height:2px; background:#1a1a2e; border-radius:50%; opacity:0;"></div>
    <div class="particle" style="position:absolute; top:15%; left:60%; width:3px; height:3px; background:#00D4FF; border-radius:50%; opacity:0;"></div>
    <div class="particle" style="position:absolute; top:80%; left:70%; width:4px; height:4px; background:#1a1a2e; border-radius:50%; opacity:0;"></div>
    
    <!-- Global Competition text overlay -->
    <div id="global-competition-text" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:120px; font-weight:bold; color:rgba(0,212,255,0.03); font-family:'JetBrains Mono',monospace; white-space:nowrap; opacity:1;">GLOBAL COMPETITION</div>
    
</div>

<script>
    // Initialize GSAP timeline
    window.__timelines = window.__timelines || {};
    window.__timelines["beat-6"] = gsap.timeline({paused: true});
    
    const tl = window.__timelines["beat-6"];
    
    // Background decorative layers - first to appear
    tl.from("#bg-grid", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0)
      .from("#bg-glow", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15)
      .from("#scan-line", {opacity: 0, y: -1080, duration: 4, ease: "none", repeat: 0}, 0.3)
      .from(".particle", {opacity: 0, scale: 0, duration: 1, stagger: 0.15, ease: "power2.out"}, 0.3);
    
    // Ghost text - appears after background
    tl.from("#ghost-text", {opacity: 0, duration: 1.5, ease: "power1.inOut"}, 0.6)
      .from("#global-competition-text", {opacity: 0, duration: 1.5, ease: "power1.inOut"}, 0.75);
    
    // Main title - slides in from top
    tl.from("#main-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 1.0);
    
    // Subtitle
    tl.from("#subtitle", {x: -50, opacity: 0, duration: 0.7, ease: "power2.out"}, 1.15);
    
    // HUD container - slides in from left
    tl.from("#hud-container", {x: -100, opacity: 0, duration: 0.9, ease: "back.out(1.7)"}, 1.3);
    
    // City dots - pop in with stagger
    tl.from("#dot-beijing", {scale: 0, opacity: 0, duration: 0.6, ease: "back.out(2)"}, 1.6)
      .from("#dot-tokyo", {scale: 0, opacity: 0, duration: 0.6, ease: "back.out(2)"}, 1.7)
      .from("#dot-newyork", {scale: 0, opacity: 0, duration: 0.6, ease: "back.out(2)"}, 1.8)
      .from("#dot-bangalore", {scale: 0, opacity: 0, duration: 0.6, ease: "back.out(2)"}, 1.9);
    
    // Connection lines - fade in
    tl.from("#connection-lines", {opacity: 0, duration: 1.5, ease: "power2.inOut"}, 2.0);
    
    // Remote work icon
    tl.from("#remote-icon", {opacity: 0, y: 20, duration: 0.7, ease: "power2.out"}, 2.2);
    
    // Data cards - slide in from right
    tl.from("#globalization-card", {x: 100, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.4)
      .from("#adaptability-card", {x: 100, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.55)
      .from("#warning-card", {x: 100, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.7);
    
    // Progress bar animation
    tl.from("#progress-bar", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 3.0);
    
    // Bottom information - fade in last
    tl.from("#bottom-info", {opacity: 0, y: 30, duration: 0.8, ease: "power2.out"}, 3.2);
    
    // Add breathing animations (repeat: 0)
    gsap.to("#globalization-card", {
        scale: 1.015,
        duration: 3,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut"
    });
    
    gsap.to("#main-title", {
        textShadow: "0 0 40px rgba(0,212,255,0.8), 0 0 80px rgba(0,212,255,0.4)",
        opacity: 0.85,
        duration: 2.5,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut"
    });
    
    gsap.to("#bg-glow", {
        x: "random(-20, 20)",
        y: "random(-20, 20)",
        duration: 10,
        repeat: 0,
        ease: "none"
    });
    
    gsap.to(".particle", {
        y: "random(-100, 100)",
        x: "random(-50, 50)",
        duration: 8,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut",
        stagger: {
            each: 1.5,
            from: "random"
        }
    });
    
    // Pulsing effect for bottom time indicator
    gsap.to(".particle:first-child", {
        opacity: 0.7,
        duration: 1,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut"
    });
    
    // Start the timeline
    tl.play();
</script>
</body>
</html>
