<script>
// 注册 timeline 到 window

const tl = gsap.timeline();
window.__timelines["beat-6"] = tl;

// 标题 SLAMS 入场

// 左侧利率柱状图入场

// 箭头流动动画

// 右侧网格单元格入场
tl.from(".grid-cell", { scale: 0, opacity: 0, stagger: 0.1, duration: 0.5, ease: "back.out(1.7)" }, 1.2);
// 网格单元格呼吸感动画
gsap.to(".grid-cell", { scale: 1.05, duration: 2, repeat: 0, yoyo: true, ease: "power1.inOut", stagger: { each: 0.1, repeat: 0, yoyo: true } });

// 中间天平入场
tl.from("#balance", { opacity: 0, scale: 0.5, duration: 1, ease: "elastic.out(1, 0.5)" }, 1.5);
// 天平倾斜动画
tl.to("#beam", { rotation: 15, duration: 2, ease: "power2.inOut" }, 2);
tl.to("#left-pan", { y: 50, duration: 2, ease: "power2.inOut" }, 2);
tl.to("#right-pan", { y: -30, duration: 2, ease: "power2.inOut" }, 2);

// 数据卡片入场
tl.from("#rate-card", { x: -100, opacity: 0, duration: 1, ease: "power2.out" }, 2.5);
tl.from("#scarce-card", { x: 100, opacity: 0, duration: 1, ease: "power2.out" }, 2.7);

// 进度条动画
tl.to("#progress-bar", { width: "30%", duration: 3, ease: "power1.inOut" }, 3);

// 关键文本浮动入场
tl.from("#text-slogan1", { y: 100, opacity: 0, duration: 1, ease: "power2.out" }, 3.2);
tl.from("#text-slogan2", { y: 100, opacity: 0, duration: 1, ease: "power2.out" }, 3.4);
// 文本持续浮动
gsap.to("#text-slogan1", { y: 10, duration: 2, repeat: 0, yoyo: true, ease: "sine.inOut" });
gsap.to("#text-slogan2", { y: 10, duration: 2, repeat: 0, yoyo: true, ease: "sine.inOut" });

// 光晕脉动
gsap.to("#glow-left", { scale: 1.2, opacity: 0.4, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut" });
gsap.to("#glow-right", { scale: 1.2, opacity: 0.4, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut" });

// 背景网格流动动画（左侧）
