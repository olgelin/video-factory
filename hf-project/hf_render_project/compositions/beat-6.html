<script>
    // Initialize timeline
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({paused: true});
    window.__timelines["beat-6"] = tl;

    // Background decorations first
    tl.from(".scene > div:nth-child(1) > div", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);

    // Ghost text
    tl.from(".scene > div:nth-child(2)", {opacity: 0, duration: 1, ease: "power2.out"}, 0.3);
    tl.from(".scene > div:nth-child(3)", {opacity: 0, duration: 1, ease: "power2.out"}, 0.45);

    // Main title
    tl.from("#main-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.6);

    // Message card
    tl.from("#message-card", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 0.75);

    // Industry items with stagger
    tl.from("#item-1", {x: 40, opacity: 0, duration: 0.6, ease: "power2.out"}, 0.9);
    tl.from("#item-2", {x: 40, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.05);
    tl.from("#item-3", {x: 40, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.2);
    tl.from("#item-4", {x: 40, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.35);

    // Progress bars animate their width
    tl.to("#prog-1", {width: "95%", duration: 1, ease: "power2.inOut"}, 1.1);
    tl.to("#prog-2", {width: "88%", duration: 1, ease: "power2.inOut"}, 1.25);
    tl.to("#prog-3", {width: "92%", duration: 1, ease: "power2.inOut"}, 1.4);
    tl.to("#prog-4", {width: "85%", duration: 1, ease: "power2.inOut"}, 1.55);

    // Bottom tags and data
    tl.from("#bottom-tag", {y: 20, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.7);
    tl.from("#bottom-data", {y: 20, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.8);

    // Particles
    tl.from(".particle", {opacity: 0, scale: 0, duration: 0.8, ease: "back.out(2)", stagger: 0.1}, 2.0);

    // Corner decorations
    tl.from(".scene > div:last-child > div:not(.particle)", {opacity: 0, duration: 0.5, stagger: 0.05}, 2.1);

    // === Breathing Animations ===
    // Title glow pulse
    gsap.to("#main-title", {
        textShadow: "0 0 60px rgba(0, 212, 255, 1), 0 0 100px rgba(0, 212, 255, 0.6)",
        duration: 2.5,
        repeat: 0,
        yoyo: true,
        ease: "sine.inOut"
    });

    // Cards subtle scale
    gsap.to("#item-1", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut"});
    gsap.to("#item-2", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 0.5});
    gsap.to("#item-3", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 1});
    gsap.to("#item-4", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 1.5});

    // Background glow movement
    gsap.to(".scene > div:first-child > div:nth-child(2)", {
        x: 50,
        y: 30,
        duration: 10,
        repeat: 0,
        yoyo: true,
        ease: "none"
    });

    // Scan line movement
    gsap.fromTo(".scene > div:first-child > div:nth-child(3)", 
        {top: "-4px"}, 
        {top: "100%", duration: 5, repeat: 0, ease: "none"}
    );

    // Particle drift
    document.querySelectorAll('.particle').forEach((particle, index) => {
        gsap.to(particle, {
            x: `+=${(index % 2 === 0 ? 1 : -1) * 100}`,
            y: `+=${(index % 3 === 0 ? 1 : -1) * 80}`,
            opacity: 0.3,
            duration: 6 + index * 2,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
    });

    // Start the timeline
    tl.play();
</script>
