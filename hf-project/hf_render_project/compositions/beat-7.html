<!DOCTYPE html>
<html data-composition-id="beat-7" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博朋克纪念</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a; overflow: hidden; font-family: 'Inter', 'Noto Sans SC', sans-serif;">

<div class="scene" style="background:#1a1a2e;" style="position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #0a0a0a;">

    <div id="bg-grid" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 60px 60px; opacity: 0;"></div>

    <div id="bg-glow" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1200px; height: 1200px; background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, rgba(0,212,255,0.03) 40%, transparent 70%); border-radius: 50%; opacity: 0; filter: blur(80px);"></div>

    <div id="star-field" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;"></div>

    <div id="silhouette-container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 600px; opacity: 0;">
        <div style="width: 100%; height: 100%; background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%); clip-path: polygon(50% 0%, 80% 15%, 85% 45%, 75% 55%, 65% 50%, 70% 100%, 30% 100%, 35% 50%, 25% 55%, 15% 45%, 20% 15%); filter: blur(8px); border-radius: 50% 50% 0 0; box-shadow: 0 0 120px rgba(255,255,255,0.1);"></div>
    </div>

    <div id="light-beam" style="position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 1400px; background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 70%); clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%); opacity: 0;"></div>

    <div id="title" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0;">
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 120px; font-weight: 900; color: #ffffff; letter-spacing: 12px; text-shadow: 0 0 80px rgba(255,255,255,0.4), 0 0 160px rgba(0,212,255,0.3); margin-bottom: 30px; line-height: 1;">王伟</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 80px; font-weight: 700; color: #ffd700; text-shadow: 0 0 60px rgba(255,215,0,0.5); letter-spacing: 4px;">44年</div>
    </div>

    <div id="subtitle" style="position: absolute; top: 70%; left: 50%; transform: translateX(-50%); text-align: center; opacity: 0; width: 1200px;">
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 32px; font-weight: 400; color: rgba(255,255,255,0.8); letter-spacing: 6px; line-height: 1.6;">记住这个名字，记住这份牺牲</div>
    </div>

    <div id="decor-line-1" style="position: absolute; top: 42%; left: 15%; width: 300px; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent); opacity: 0;"></div>

    <div id="decor-line-2" style="position: absolute; top: 58%; right: 15%; width: 300px; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent); opacity: 0;"></div>

    <div id="particle-1" style="position: absolute; top: 30%; left: 25%; width: 4px; height: 4px; background: #00d4ff; border-radius: 50%; box-shadow: 0 0 20px #00d4ff; opacity: 0;"></div>
    <div id="particle-2" style="position: absolute; top: 70%; right: 20%; width: 3px; height: 3px; background: #00d4ff; border-radius: 50%; box-shadow: 0 0 15px #00d4ff; opacity: 0;"></div>
    <div id="particle-3" style="position: absolute; top: 20%; right: 30%; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 12px #ff4081; opacity: 0;"></div>

    <div id="ghost-text" style="position: absolute; bottom: 80px; right: 80px; font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: 700; color: rgba(255,255,255,0.03); letter-spacing: 20px; opacity: 0; transform: rotate(-10deg);">HERO</div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tl = gsap.timeline({paused: true});
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-7"] = tl;

        tl.to("#bg-grid", {opacity: 0.3, duration: 2, ease: "power2.out"}, 0)
          .to("#bg-glow", {opacity: 1, duration: 3, ease: "power2.out"}, 0.2)
          .to("#star-field", {opacity: 1, duration: 1}, 0)
          .from("#silhouette-container", {opacity: 0, scale: 0.8, duration: 2.5, ease: "expo.out"}, 0.5)
          .to("#silhouette-container", {scale: 1.02, yoyo: true, repeat: 0, duration: 2.5, ease: "sine.inOut"}, 1)
          .from("#light-beam", {opacity: 0, y: -100, duration: 2, ease: "expo.out"}, 1)
          .to("#title", {opacity: 1, duration: 0.1}, 1.8)
          .from("#title > div:first-child", {y: 80, opacity: 0, duration: 2.5, ease: "expo.out"}, 1.8)
          .from("#title > div:last-child", {y: 60, opacity: 0, duration: 2.5, ease: "expo.out"}, 2.1)
          .from("#subtitle", {y: 40, opacity: 0, duration: 2.5, ease: "expo.out"}, 2.4)
          .from("#decor-line-1", {scaleX: 0, opacity: 0, duration: 2, ease: "expo.out", transformOrigin: "left center"}, 2.7)
          .from("#decor-line-2", {scaleX: 0, opacity: 0, duration: 2, ease: "expo.out", transformOrigin: "right center"}, 2.9)
          .from("#particle-1", {opacity: 0, duration: 1, ease: "power2.out"}, 3)
          .to("#particle-1", {y: -30, yoyo: true, repeat: 0, duration: 4, ease: "sine.inOut"}, 3)
          .from("#particle-2", {opacity: 0, duration: 1, ease: "power2.out"}, 3.2)
          .to("#particle-2", {y: 25, yoyo: true, repeat: 0, duration: 5, ease: "sine.inOut"}, 3.2)
          .from("#particle-3", {opacity: 0, duration: 1, ease: "power2.out"}, 3.4)
          .to("#particle-3", {x: -20, yoyo: true, repeat: 0, duration: 3.5, ease: "sine.inOut"}, 3.4)
          .from("#ghost-text", {opacity: 0, duration: 2, ease: "power2.out"}, 3.6)
          .to("#ghost-text", {x: 10, yoyo: true, repeat: 0, duration: 8, ease: "sine.inOut"}, 3.6);

        const starField = document.getElementById('star-field');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.style.cssText = `
                position: absolute;
                width: ${0.5 * 2 + 1}px;
                height: ${0.5 * 2 + 1}px;
                background: ${0.5 > 0.8 ? '#00d4ff' : 'rgba(255,255,255,0.7)'};
                border-radius: 50%;
                top: ${0.5 * 100}%;
                left: ${0.5 * 100}%;
                opacity: ${0.5 * 0.6 + 0.2};
                box-shadow: 0 0 ${0.5 * 4 + 2}px ${0.5 > 0.8 ? '#00d4ff' : 'rgba(255,255,255,0.5)'};
            `;
            starField.appendChild(star);
            gsap.to(star, {
                opacity: 0.5 * 0.3 + 0.1,
                duration: 0.5 * 3 + 2,
                repeat: 0,
                yoyo: true,
                ease: "sine.inOut",
                delay: 0.5 * 2
            });
        }

        tl.play();
    });
</script>

</body>
</html>
