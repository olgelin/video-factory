<!DOCTYPE html>
<html data-composition-id="beat-7" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperFrames - Beat 7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin:0;padding:0;overflow:hidden;background:#1a1a2e;">
    <div class="scene" style="background:#1a1a2e;position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #1a1a2e; font-family: 'Inter', 'Noto Sans SC', sans-serif;">
        <!-- Background Grid -->
        <div id="bg-grid" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,212,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.08) 1px, transparent 1px); background-size: 100px 100px;"></div>
        <!-- Radial Glow -->
        <div id="bg-glow" style="position: absolute; top: 50%; left: 40%; width: 900px; height: 900px; background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, rgba(255,64,129,0.06) 50%, transparent 70%); transform: translate(-50%, -50%);"></div>
        <!-- Ghost Text -->
        <div id="ghost-text" style="position: absolute; top: 40%; left: 30%; font-family: 'JetBrains Mono', monospace; font-size: 280px; color: rgba(255,255,255,0.035); pointer-events: none;">ETHICS</div>
        <!-- Scan Line -->
        <div id="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);"></div>
        <!-- Particle Points -->
        <div id="particle-1" style="position: absolute; width: 3px; height: 3px; background: #00D4FF; border-radius: 50%; top: 150px; left: 200px; opacity: 0.6;"></div>
        <div id="particle-2" style="position: absolute; width: 4px; height: 4px; background:#1a1a2e; border-radius: 50%; top: 300px; left: 400px; opacity: 0.5;"></div>
        <div id="particle-3" style="position: absolute; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; top: 500px; left: 600px; opacity: 0.4;"></div>
        <div id="particle-4" style="position: absolute; width: 3px; height: 3px; background: #00D4FF; border-radius: 50%; top: 700px; left: 800px; opacity: 0.6;"></div>
        <div id="particle-5" style="position: absolute; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; top: 200px; left: 1200px; opacity: 0.5;"></div>
        <!-- Corner Decorations -->
        <div id="corner-tl" style="position: absolute; top: 100px; left: 100px; width: 60px; height: 60px; border-top: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3);"></div>
        <div id="corner-tr" style="position: absolute; top: 100px; right: 100px; width: 60px; height: 60px; border-top: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3);"></div>
        <div id="corner-bl" style="position: absolute; bottom: 100px; left: 100px; width: 60px; height: 60px; border-bottom: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3);"></div>
        <div id="corner-br" style="position: absolute; bottom: 100px; right: 100px; width: 60px; height: 60px; border-bottom: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3);"></div>

        <!-- Main Title -->
        <div id="main-title" style="position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-size: 100px; font-weight: bold; color: #00D4FF; text-shadow: 0 0 40px rgba(0,212,255,0.8), 0 0 80px rgba(0,212,255,0.4); text-align: center;">AI vs 人类</div>
        <!-- Subtitle -->
        <div id="subtitle" style="position: absolute; top: 240px; left: 50%; transform: translateX(-50%); font-size: 32px; color: rgba(255,255,255,0.7); text-align: center;">科技伦理与就业公平的博弈</div>

        <!-- Core Content Area - Left Column -->
        <div id="core-content" style="position: absolute; top: 300px; left: 100px; width: 1080px; height: 450px;">
            <!-- Code Gear Brain Icon -->
            <div id="icon-brain" style="position: absolute; top: 0; left: 50px; width: 200px; height: 200px; border: 3px solid #00D4FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 80px; color: #00D4FF; background: rgba(0,212,255,0.1);">
                <div style="position: absolute; width: 100%; height: 100%; border: 2px dashed rgba(0,212,255,0.4); border-radius: 50%; animation: spin 20s linear 3;"></div>
                ⚙️🧠
            </div>
            <!-- Human Abstract Symbol -->
            <div id="icon-human" style="position: absolute; top: 0; right: 50px; width: 200px; height: 200px; border: 3px solid #FF4081; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; color: #FF4081; background: rgba(255,64,129,0.1);">
                <div style="position: absolute; width: 100%; height: 100%; border: 2px dashed rgba(255,64,129,0.4); border-radius: 50%; animation: spin-reverse 25s linear 3;"></div>
                👤🔗
            </div>
            <!-- Balance Scale -->
            <div id="balance-scale" style="position: absolute; top: 220px; left: 50%; transform: translateX(-50%); width: 400px; height: 150px; border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                <div style="width: 60%; height: 2px; background: linear-gradient(90deg, #00D4FF, #FF4081); position: relative;">
                    <div style="position: absolute; top: -20px; left: 0; width: 40px; height: 40px; background: rgba(0,212,255,0.3); border-radius: 50%; border: 2px solid #00D4FF;"></div>
                    <div style="position: absolute; top: -20px; right: 0; width: 40px; height: 40px; background: rgba(255,64,129,0.3); border-radius: 50%; border: 2px solid #FF4081;"></div>
                </div>
            </div>
            <!-- Data Card 1 -->
            <div id="data-card-1" style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 600px; padding: 30px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
                <div style="font-size: 16px; color: #999999; margin-bottom: 10px;">核心议题</div>
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: bold; color: #FFD700;">伦理 vs 进步</div>
                <div style="font-size: 24px; color: rgba(255,255,255,0.7); margin-top: 10px;">AI是否应该取代人类工作？</div>
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent);"></div>
            </div>
        </div>

        <!-- Right Column - Auxiliary Info -->
        <div id="aux-content" style="position: absolute; top: 300px; right: 100px; width: 480px; height: 450px;">
            <!-- Tag Pills -->
            <div id="tag-pill-1" style="position: absolute; top: 0; left: 0; padding: 10px 20px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.4); border-radius: 50px; font-size: 20px; color: #00D4FF;">公平</div>
            <div id="tag-pill-2" style="position: absolute; top: 0; left: 150px; padding: 10px 20px; background: rgba(255,64,129,0.1); border: 1px solid rgba(255,64,129,0.4); border-radius: 50px; font-size: 20px; color: #FF4081;">伦理</div>
            <div id="tag-pill-3" style="position: absolute; top: 60px; left: 0; padding: 10px 20px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4); border-radius: 50px; font-size: 20px; color: #FFD700;">过渡期</div>
            <!-- Floating Symbols -->
            <div id="float-symbol-1" style="position: absolute; top: 150px; left: 50px; font-size: 40px; color: rgba(255,255,255,0.3);">❓</div>
            <div id="float-symbol-2" style="position: absolute; top: 250px; right: 50px; font-size: 40px; color: rgba(0,212,255,0.3);">💡</div>
            <!-- Data Card 2 -->
            <div id="data-card-2" style="position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,64,129,0.3); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
                <div style="font-size: 14px; color: #999999;">社会影响</div>
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: bold; color: #FF4081;">40%</div>
                <div style="font-size: 20px; color: rgba(255,255,255,0.7);">潜在工作替代率</div>
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #FF4081, transparent);"></div>
            </div>
        </div>

        <!-- Bottom Info Area -->
        <div id="bottom-info" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center;">
            <div id="quote" style="font-size: 28px; color: rgba(255,255,255,0.8); line-height: 1.5;">"这不只是找工作，是定义未来社会的缩影。"</div>
            <div id="source" style="font-size: 18px; color: #666666; margin-top: 20px;">— 2026高校毕业生就业趋势报告</div>
        </div>

        <!-- Progress Bar -->
        <div id="progress-bar" style="position: absolute; bottom: 50px; left: 100px; width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;">
            <div id="progress-fill" style="width: 70%; height: 100%; background: linear-gradient(90deg, #00D4FF, #FF4081); border-radius: 2px;"></div>
        </div>
    </div>

    <script>
        gsap.registerPlugin();
        const timeline = gsap.timeline({ paused: true });
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-7"] = timeline;

        // Animation sequence with 0.15s stagger
        // Background decorations
        timeline.from("#bg-grid", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0);
        timeline.from("#bg-glow", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0.15);
        timeline.from("#ghost-text", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0.3);
        timeline.from("#scan-line", { y: -1080, duration: 6, ease: "power1.inOut", repeat: 0 }, 0.45);
        timeline.from("#particle-1", { opacity: 0, y: 50, duration: 6, ease: "power1.inOut" }, 0.6);
        timeline.from("#particle-2", { opacity: 0, y: -30, duration: 8, ease: "power1.inOut" }, 0.75);
        timeline.from("#particle-3", { opacity: 0, x: 20, duration: 10, ease: "power1.inOut" }, 0.9);
        timeline.from("#particle-4", { opacity: 0, y: 40, duration: 7, ease: "power1.inOut" }, 1.05);
        timeline.from("#particle-5", { opacity: 0, x: -25, duration: 9, ease: "power1.inOut" }, 1.2);
        timeline.from("#corner-tl", { opacity: 0, scale: 0.5, duration: 0.8, ease: "power2.out" }, 1.35);
        timeline.from("#corner-tr", { opacity: 0, scale: 0.5, duration: 0.8, ease: "power2.out" }, 1.5);
        timeline.from("#corner-bl", { opacity: 0, scale: 0.5, duration: 0.8, ease: "power2.out" }, 1.65);
        timeline.from("#corner-br", { opacity: 0, scale: 0.5, duration: 0.8, ease: "power2.out" }, 1.8);

        // Ghost text fade in
        timeline.from("#ghost-text", { opacity: 0, duration: 1.5, ease: "power2.inOut" }, 1.95);

        // Main title - CRASHES effect
        timeline.from("#main-title", { y: -50, opacity: 0, duration: 0.8, ease: "power3.out" }, 2.1);
        timeline.from("#subtitle", { y: -30, opacity: 0, duration: 0.6, ease: "power2.out" }, 2.25);

        // Core content elements
        timeline.from("#icon-brain", { x: -80, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, 2.4);
        timeline.from("#icon-human", { x: 80, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, 2.55);
        timeline.from("#balance-scale", { scaleX: 0, transformOrigin: "center", duration: 0.8, ease: "power2.inOut" }, 2.7);
        timeline.from("#data-card-1", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 2.85);

        // Auxiliary elements
        timeline.from("#tag-pill-1", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 3.0);
        timeline.from("#tag-pill-2", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 3.15);
        timeline.from("#tag-pill-3", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 3.3);
        timeline.from("#float-symbol-1", { opacity: 0, scale: 0.5, duration: 0.6, ease: "power2.out" }, 3.45);
        timeline.from("#float-symbol-2", { opacity: 0, scale: 0.5, duration: 0.6, ease: "power2.out" }, 3.6);
        timeline.from("#data-card-2", { y: 40, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 3.75);

        // Bottom info
        timeline.from("#quote", { opacity: 0, y: 20, duration: 0.8, ease: "power2.out" }, 3.9);
        timeline.from("#source", { opacity: 0, duration: 0.6, ease: "power2.out" }, 4.05);
        timeline.from("#progress-bar", { scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut" }, 4.2);
        timeline.from("#progress-fill", { scaleX: 0, transformOrigin: "left", duration: 1.2, ease: "power2.inOut" }, 4.35);

        // Breathing animations (only a few elements)
        // Main title breathing glow
        gsap.to("#main-title", {
            textShadow: "0 0 50px rgba(0,212,255,0.9), 0 0 100px rgba(0,212,255,0.5)",
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        // Data card 1 breathing scale
        gsap.to("#data-card-1", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        // Background glow slow drift
        gsap.to("#bg-glow", {
            x: 50,
            y: 30,
            duration: 10,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Play timeline
        timeline.play();
    </script>
</body>
</html>
