        timeline.from(".decoration-glow", {opacity: 0, scale: 0.8, duration: 1.5, ease: "power1.inOut"}, 0.15);

        // HUD Modules (staggered)
        timeline.from(".hud-module", {opacity: 0, y: 40, duration: 0.6, ease: "power3.out", stagger: 0.15}, 1.2);
        
        // Progress bars
        timeline.to(".progress-bar", {width: "100%", duration: 1.5, ease: "power2.inOut", stagger: 0.2}, 1.5);
        
        // Ring progress animation
        timeline.fromTo(".ring-progress", 
            {rotation: 45, borderTopColor: "transparent", borderRightColor: "transparent"}, 
            {rotation: 45 + 187, borderTopColor: "#FFD700", borderRightColor: "#FFD700", duration: 1.5, ease: "power2.inOut"}, 
            1.8
        );
        
        // Main title
        timeline.from(".main-title", {opacity: 0, y: -50, duration: 0.8, ease: "power3.out"}, 1.5);
        
        // Subtitle
        timeline.from(".subtitle", {opacity: 0, x: -30, duration: 0.5, ease: "power2.out"}, 1.8);
        
        // Narrative text

            duration: 8,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

            repeat: 0,

        });
