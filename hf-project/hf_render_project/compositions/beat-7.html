<!DOCTYPE html>
<html data-composition-id="beat-7" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background: #1a1a2e; font-family: 'Inter','Noto Sans SC',sans-serif;">
    <div class="scene" style="background:#1a1a2e;width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #1a1a2e;">
        
        <!-- Grid Network Layer -->
        <div style="position: absolute; inset: 0; background: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 100px 100px; pointer-events: none;"></div>
        
        <!-- Radial Glow -->

        <!-- Ghost Text Background -->
        <div style="position: absolute; top: 200px; left: 100px; font-size: 240px; font-weight: bold; color: rgba(255,255,255,0.04); font-family: 'JetBrains Mono',monospace; white-space: nowrap; pointer-events: none; user-select: none;">红利机会数据</div>
        
        <!-- Scan Line Animation -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent); pointer-events: none;"></div>
        
        <!-- Particle Dots -->
        <div style="position: absolute; top: 150px; left: 300px; width: 3px; height: 3px; background: #00D4FF; border-radius: 50%; pointer-events: none;"></div>
        <div style="position: absolute; top: 400px; left: 600px; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; pointer-events: none;"></div>

        <div style="position: absolute; top: 600px; left: 400px; width: 2px; height: 2px; background: #00D4FF; border-radius: 50%; pointer-events: none;"></div>

        <!-- Corner Decorations -->
        <div style="position: absolute; top: 120px; left: 120px; width: 50px; height: 2px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div style="position: absolute; top: 120px; left: 120px; width: 2px; height: 50px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        
        <div style="position: absolute; top: 120px; right: 120px; width: 50px; height: 2px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div style="position: absolute; top: 120px; right: 120px; width: 2px; height: 50px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        
        <div style="position: absolute; bottom: 120px; left: 120px; width: 50px; height: 2px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div style="position: absolute; bottom: 120px; left: 120px; width: 2px; height: 50px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        
        <div style="position: absolute; bottom: 120px; right: 120px; width: 50px; height: 2px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div style="position: absolute; bottom: 120px; right: 120px; width: 2px; height: 50px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
        
        <!-- Ghost Text Foreground -->
        <div style="position: absolute; top: 180px; left: 50%; transform: translateX(-50%); font-size: 200px; font-weight: bold; color: rgba(255,255,255,0.03); font-family: 'JetBrains Mono',monospace; white-space: nowrap; pointer-events: none; user-select: none;">盯紧别被忽悠</div>
        <div style="position: absolute; top: 450px; left: 30%; font-size: 180px; font-weight: bold; color: rgba(255,255,255,0.02); font-family: 'JetBrains Mono',monospace; white-space: nowrap; pointer-events: none; user-select: none;">数据说话机会眼前</div>
        
        <!-- Main Content Area -->
        <div style="position: absolute; top: 200px; left: 100px; right: 100px; bottom: 200px; display: flex; flex-direction: column; justify-content: center;">
            
            <!-- Tech Frame List -->
            <div style="background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); position: relative; width: 70%; margin: 0 auto;">
                
                <!-- Top Highlight -->
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent); border-radius: 24px 24px 0 0;"></div>
                
                <!-- Internal Glow -->
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 50%; background: radial-gradient(ellipse at top, rgba(0,212,255,0.08), transparent); pointer-events: none;"></div>
                
                <!-- List Items -->
                <div style="display: flex; flex-direction: column; gap: 30px;">
                    <!-- Item 1 -->
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; border: 1px solid rgba(0,212,255,0.1); border-radius: 16px; background: rgba(0,212,255,0.02);">
                        <div style="font-size: 32px; color: #FFFFFF; font-weight: bold;">科技出口板块</div>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <div style="font-size: 28px; color: #FFD700; font-family: 'JetBrains Mono',monospace;">↑ 15.7%</div>
                            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #FFD700, #FF4081); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                                <span style="color: #1a1a2e; font-weight: bold; font-size: 20px;">¥</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Item 2 - Highlighted -->
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; border: 1px solid rgba(255,64,129,0.5); border-radius: 16px; background: rgba(255,64,129,0.05); box-shadow: 0 0 20px rgba(255,64,129,0.1);">
                        <div style="font-size: 36px; color: #FF4081; font-weight: bold;">跨境贸易机会</div>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <div style="font-size: 32px; color: #FFD700; font-family: 'JetBrains Mono',monospace;">↑ 22.3%</div>
                            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #FFD700, #00D4FF); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                                <span style="color: #1a1a2e; font-weight: bold; font-size: 20px;">🌐</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Item 3 -->
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; border: 1px solid rgba(0,212,255,0.1); border-radius: 16px; background: rgba(0,212,255,0.02);">
                        <div style="font-size: 32px; color: #FFFFFF; font-weight: bold;">数据验证优先</div>
                        <div style="font-size: 28px; color: #999999; font-family: 'JetBrains Mono',monospace;">监控中...</div>
                    </div>
                    
                    <!-- Item 4 -->
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; border: 1px solid rgba(0,212,255,0.1); border-radius: 16px; background: rgba(0,212,255,0.02);">
                        <div style="font-size: 32px; color: #FFFFFF; font-weight: bold;">政策红利窗口</div>
                        <div style="font-size: 28px; color: #FFD700; font-family: 'JetBrains Mono',monospace;">即将关闭</div>
                    </div>
                </div>
                
                <!-- Bottom Label -->
                <div style="text-align: center; margin-top: 30px; font-size: 24px; color: rgba(0,212,255,0.7); letter-spacing: 2px;">行动清单 · 优先级排序</div>
            </div>
        </div>
        
        <!-- Bottom Information Area -->
        <div style="position: absolute; bottom: 120px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: flex-end;">
            <!-- Left Tags -->
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="padding: 10px 25px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); border-radius: 100px; font-size: 20px; color: #00D4FF;">投资者注意</div>
                <div style="padding: 10px 25px; background: rgba(255,64,129,0.1); border: 1px solid rgba(255,64,129,0.2); border-radius: 100px; font-size: 20px; color: #FF4081;">数据驱动</div>
                <div style="padding: 10px 25px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.2); border-radius: 100px; font-size: 20px; color: #FFD700;">红利窗口</div>
            </div>
            
            <!-- Right Data -->
            <div style="text-align: right;">
                <div style="font-size: 18px; color: #999999; margin-bottom: 10px;">外贸连续3个月</div>
                <div style="font-size: 80px; font-weight: bold; color: #FFD700; font-family: 'JetBrains Mono',monospace; text-shadow: 0 0 30px rgba(255,215,0,0.3);">4.2万亿</div>
                <div style="font-size: 24px; color: rgba(0,212,255,0.7); margin-top: 10px;">人民币</div>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div style="position: absolute; bottom: 180px; left: 120px; right: 120px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
            <div style="height: 100%; width: 75%; background: linear-gradient(90deg, #00D4FF, #FF4081, #FFD700); border-radius: 2px;"></div>
        </div>
        
        <!-- Title Area -->
        <div style="position: absolute; top: 80px; left: 120px;">
            <div style="font-size: 20px; color: rgba(0,212,255,0.5); letter-spacing: 3px; margin-bottom: 10px;">投资策略 · 7号场景</div>
            <div style="font-size: 72px; font-weight: bold; color: #FFFFFF; text-shadow: 0 0 30px rgba(0,212,255,0.5); line-height: 1.2;">盯紧科技出口和跨境板块</div>
            <div style="font-size: 36px; color: rgba(255,255,255,0.7); margin-top: 10px;">这波红利，吃得到</div>
        </div>
        
        <!-- Right Side Decoration -->
        <div style="position: absolute; top: 250px; right: 150px; width: 200px; height: 600px; border-right: 1px solid rgba(0,212,255,0.1); pointer-events: none;"></div>
        
        <!-- Data Visualization Dots -->
        <div style="position: absolute; top: 300px; right: 200px; width: 150px; height: 300px; display: flex; flex-direction: column; justify-content: space-between;">
            <div style="width: 8px; height: 8px; background: #00D4FF; border-radius: 50%; box-shadow: 0 0 10px rgba(0,212,255,0.5);"></div>
            <div style="width: 12px; height: 12px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px rgba(255,64,129,0.5);"></div>
            <div style="width: 10px; height: 10px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px rgba(255,215,0,0.5);"></div>
            <div style="width: 8px; height: 8px; background: #00D4FF; border-radius: 50%; box-shadow: 0 0 10px rgba(0,212,255,0.5);"></div>
        </div>
    </div>

    <script>
        // Register timeline
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-7"] = gsap.timeline({paused: true});
        
        const timeline = window.__timelines["beat-7"];
        
        // Get all scene elements
        const sceneElements = document.querySelectorAll('.scene > *:not(:first-child)');
        
        // Add entrance animations
        sceneElements.forEach((element, index) => {
            // Different animation based on element type
            if (element.querySelector('[style*="font-size: 72px"]') || 
                element.querySelector('[style*="font-size: 240px"]') ||
                element.querySelector('[style*="font-size: 200px"]')) {
                // Title animations
                timeline.from(element, {
                    y: -50,
                    opacity: 0,
                    duration: 0.8,
                    ease: "power3.out"
                }, index * 0.15);
            } 
            else if (element.querySelector('[style*="backdrop-filter"]')) {
                // Card animations
                timeline.from(element, {
                    y: 60,
                    opacity: 0,
                    scale: 0.9,
                    duration: 0.7,
                    ease: "back.out(1.7)"
                }, index * 0.15);
            }
            else if (element.querySelector('[style*="border-radius: 100px"]')) {
                // Tag pill animations
                timeline.from(element, {
                    x: -30,
                    opacity: 0,
                    duration: 0.5,
                    ease: "power2.out"
                }, index * 0.15);
            }
            else if (element.querySelector('[style*="height: 4px"]')) {
                // Progress bar animations
                timeline.from(element, {
                    scaleX: 0,
                    transformOrigin: "left",
                    duration: 1,
                    ease: "power2.inOut"
                }, index * 0.15);
            }
            else {
                // General decorative elements
                timeline.from(element, {
                    opacity: 0,
                    duration: 1.2,
                    ease: "power1.inOut"
                }, index * 0.15);
            }
        });
        
        // Add breathing animations for selected elements
        gsap.to('.scene [style*="backdrop-filter"]', {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Add glow pulse for title
        gsap.to('.scene [style*="font-size: 72px"]', {
            textShadow: '0 0 40px rgba(0,212,255,0.8)',
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Start timeline
        timeline.play();
    </script>
</body>
</html>
