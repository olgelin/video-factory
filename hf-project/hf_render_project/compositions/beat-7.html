<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({paused: true});

// Register timeline
window.__timelines["beat-7"] = tl;

// 1. Background decorations fade in
tl.from("#grid-bg", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
tl.from("#central-glow", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15);
tl.from("#ghost-text", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3);
tl.from("#gear-group", {opacity: 0, rotation: -15, duration: 1.5, ease: "power2.out"}, 0.45);

// 2. Main title slam
tl.from("#main-title", {y: -80, opacity: 0, duration: 0.9, ease: "expo.out"}, 0.6);
tl.from("#subtitle", {y: -40, opacity: 0, duration: 0.7, ease: "power3.out"}, 0.75);

// 3. Data card drops in
tl.from("#data-card", {y: 80, opacity: 0, scale: 0.9, duration: 0.8, ease: "back.out(1.7)"}, 0.9);
tl.from("#key-data", {scale: 1.2, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.05);

// 4. Action cards slide in with stagger
tl.from("#action-card-1", {x: -80, opacity: 0, duration: 0.7, ease: "power3.out"}, 1.0);
tl.from("#action-card-2", {x: -80, opacity: 0, duration: 0.7, ease: "power3.out"}, 1.15);
tl.from("#action-card-3", {x: -80, opacity: 0, duration: 0.7, ease: "power3.out"}, 1.3);

// 5. Progress bar and tags
tl.from("#progress-bar", {scaleX: 0, duration: 1.2, ease: "power2.inOut"}, 1.4);
tl.from("#tag-1", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.5);
tl.from("#tag-2", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.6);
tl.from("#tag-3", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.7);

// 6. Footer and particles
tl.from("#series-tag", {y: 30, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.8);
tl.from("#footer-text", {opacity: 0, duration: 0.5, ease: "power2.out"}, 1.9);
tl.from("#ghost-label", {opacity: 0, duration: 0.5, ease: "power2.out"}, 2.0);

// 7. Particles and glow effects
tl.from("#particle-1", {opacity: 0, scale: 0, duration: 0.4, ease: "back.out(2)"}, 2.0);
tl.from("#particle-2", {opacity: 0, scale: 0, duration: 0.4, ease: "back.out(2)"}, 2.1);
tl.from("#particle-3", {opacity: 0, scale: 0, duration: 0.4, ease: "back.out(2)"}, 2.2);
tl.from("#particle-4", {opacity: 0, scale: 0, duration: 0.4, ease: "back.out(2)"}, 2.3);
tl.from("#particle-5", {opacity: 0, scale: 0, duration: 0.4, ease: "back.out(2)"}, 2.4);
tl.from("#golden-glow", {opacity: 0, scale: 0.5, duration: 1.0, ease: "power2.out"}, 2.0);

// 8. Scan line animation (continuous)
gsap.to("#scan-line", {
    y: 1080,
    duration: 5,
    repeat: 0,
    ease: "none",
    delay: 2.5
});

// 9. Breathing animations (limited to 2-3 elements)
gsap.to("#data-card", {
    scale: 1.02,
    duration: 2.5,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut",
    delay: 2.5
});

gsap.to("#main-title", {
    textShadow: "0 0 50px rgba(0,212,255,1), 0 0 100px rgba(0,212,255,0.6)",
    duration: 2.5,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut",
    delay: 2.5
});

// 10. Slow gear rotation
gsap.to("#gear-group", {
    rotation: 360,
    duration: 30,
    repeat: 0,
    ease: "none"
});

// 11. Particle floating animations
gsap.to("#particle-1", {y: "-=30", duration: 8, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle-2", {x: "+=25", duration: 10, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle-3", {y: "+=20", x: "-=15", duration: 12, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle-4", {x: "-=20", duration: 9, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to("#particle-5", {y: "-=25", x: "+=10", duration: 11, repeat: 0, yoyo: true, ease: "sine.inOut"});
</script>
