<!DOCTYPE html>
<html data-composition-id="beat-7" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <title>Cyber Tech - Insights for You</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a; font-family: 'Inter', 'Noto Sans SC', sans-serif; overflow: hidden;">
    <div class="scene" style="background:#1a1a2e; width: 1920px; height: 1080px; position: relative; background: #1a1a2e; display: flex; align-items: center; justify-content: center;">
        <!-- Background Decorative Layers -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px); background-size: 60px 60px; z-index: 1;"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%); border-radius: 50%; z-index: 2;"></div>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 3; pointer-events: none;"></div>
        <div style="position: absolute; top: 100px; left: 150px; font-family: 'JetBrains Mono', monospace; font-size: 120px; color: rgba(0, 212, 255, 0.03); font-weight: bold; z-index: 4; user-select: none;">DATA</div>
        <div style="position: absolute; bottom: 150px; right: 200px; font-family: 'JetBrains Mono', monospace; font-size: 150px; color: rgba(255, 64, 129, 0.03); font-weight: bold; z-index: 4; user-select: none;">FLOW</div>

        <!-- Main Content Container -->
        <div style="position: relative; z-index: 10; width: 1400px; padding: 80px;">
            <!-- PUNCH Title -->
            <div id="title" style="font-size: 96px; font-weight: bold; color: #FFFFFF; text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.4); margin-bottom: 60px; text-align: center;">
                给你的启示
            </div>

            <!-- Advice List -->
            <div style="display: flex; flex-direction: column; gap: 40px;">
                <!-- Item 1 -->
                <div id="item1" style="display: flex; align-items: flex-start; gap: 20px;">
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 48px; color: #FFD700; font-weight: bold; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); opacity: 0;">1.</span>
                    <div style="flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 16px; padding: 30px 40px; position: relative; overflow: hidden;">
                        <div style="position: absolute; top: 50%; left: 20px; transform: translateY(-50%); width: 4px; height: 60%; background: #00D4FF; border-radius: 2px; opacity: 0.6;"></div>
                        <div id="cursor1" style="display: inline-block; width: 3px; height: 48px; background-color: #00D4FF; vertical-align: middle; animation: blink 1s step-end 3; box-shadow: 0 0 10px #00D4FF;"></div>
                        <span id="text1" style="font-size: 40px; color: #FFFFFF; line-height: 1.4; margin-left: 15px;">
                            现金为王的时代正在过去，得学会<span style="color: #00D4FF; font-weight: bold; animation: pulse 1.5s ease-in-out 3;">管理</span>你的“活钱”。
                        </span>
                    </div>
                </div>

                <!-- Item 2 -->
                <div id="item2" style="display: flex; align-items: flex-start; gap: 20px;">
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 48px; color: #FFD700; font-weight: bold; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); opacity: 0;">2.</span>
                    <div style="flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 16px; padding: 30px 40px; position: relative; overflow: hidden;">
                        <div style="position: absolute; top: 50%; left: 20px; transform: translateY(-50%); width: 4px; height: 60%; background: #00D4FF; border-radius: 2px; opacity: 0.6;"></div>
                        <div id="cursor2" style="display: inline-block; width: 3px; height: 48px; background-color: #00D4FF; vertical-align: middle; animation: blink 1s step-end 3; box-shadow: 0 0 10px #00D4FF; opacity: 0;"></div>
                        <span id="text2" style="font-size: 40px; color: #FFFFFF; line-height: 1.4; margin-left: 15px; opacity: 0;">
                            提前还贷要<span style="color: #00D4FF; font-weight: bold; animation: pulse 1.5s ease-in-out 3;">算清细账</span>，别盲目跟风。
                        </span>
                    </div>
                </div>

                <!-- Item 3 -->
                <div id="item3" style="display: flex; align-items: flex-start; gap: 20px;">
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 48px; color: #FFD700; font-weight: bold; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6); opacity: 0;">3.</span>
                    <div style="flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 16px; padding: 30px 40px; position: relative; overflow: hidden;">
                        <div style="position: absolute; top: 50%; left: 20px; transform: translateY(-50%); width: 4px; height: 60%; background:#1a1a2e; border-radius: 2px; opacity: 0.6;"></div>
                        <div id="cursor3" style="display: inline-block; width: 3px; height: 48px; background-color: #FF4081; vertical-align: middle; animation: blink 1s step-end 3; box-shadow: 0 0 10px #FF4081; opacity: 0;"></div>
                        <span id="text3" style="font-size: 40px; color: #FFFFFF; line-height: 1.4; margin-left: 15px; opacity: 0;">
                            与其焦虑钱去哪了，不如想想怎么让自己手里的钱更“聪明”。别让储蓄，在沉默中贬值。
                        </span>
                    </div>
                </div>
            </div>

            <!-- Final Summary Numbers -->
            <div style="display: flex; justify-content: center; gap: 100px; margin-top: 80px;">
                <div id="num1" style="font-family: 'JetBrains Mono', monospace; font-size: 80px; color: #FFD700; font-weight: bold; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); opacity: 0;">01</div>
                <div id="num2" style="font-family: 'JetBrains Mono', monospace; font-size: 80px; color: #FFD700; font-weight: bold; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); opacity: 0;">02</div>
                <div id="num3" style="font-family: 'JetBrains Mono', monospace; font-size: 80px; color: #FFD700; font-weight: bold; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); opacity: 0;">03</div>
            </div>
        </div>

        <!-- Decorative Neon Lines -->
        <div id="line1" style="position: absolute; bottom: 80px; left: 100px; width: 300px; height: 2px; background: linear-gradient(90deg, transparent, #00D4FF, transparent); opacity: 0;"></div>
        <div id="line2" style="position: absolute; top: 120px; right: 120px; width: 2px; height: 250px; background: linear-gradient(180deg, transparent, #FF4081, transparent); opacity: 0;"></div>

        <!-- Animation Styles -->
        <style>
            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }
            @keyframes pulse {
                0%, 100% { transform: scale(1); text-shadow: 0 0 10px currentColor; }
                50% { transform: scale(1.05); text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
            }
        </style>
    </div>

    <script>
        // Register timeline
        if (!window.__timelines) window.__timelines = {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["beat-7"] = tl;

        // PUNCH title animation
        tl.from("#title", {
            y: 40,
            opacity: 0,
            scale: 0.95,
            filter: "blur(10px)",
            duration: 1.2,
            ease: "expo.out"
        });

        // Item 1 animation
        tl.from("#item1", {
            x: -100,
            opacity: 0,
            duration: 1,
            ease: "expo.out"
        }, "-=0.3")
        .to("#item1 span:first-child", {
            opacity: 1,
            duration: 0.5,
            ease: "power2.out"
        }, "-=0.8")
        .from("#cursor1", {
            opacity: 0,
            duration: 0.3
        }, "-=0.6")
        .from("#text1", {
            opacity: 0,
            duration: 1.5,
            ease: "power1.out"
        }, "-=0.3");

        // Item 2 animation
        tl.from("#item2", {
            x: -100,
            opacity: 0,
            duration: 1,
            ease: "expo.out"
        }, "-=0.5")
        .to("#item2 span:first-child", {
            opacity: 1,
            duration: 0.5,
            ease: "power2.out"
        }, "-=0.8")
        .to("#cursor2", {
            opacity: 1,
            duration: 0.3
        }, "-=0.6")
        .to("#text2", {
            opacity: 1,
            duration: 1.5,
            ease: "power1.out"
        }, "-=0.3");

        // Item 3 animation
        tl.from("#item3", {
            x: -100,
            opacity: 0,
            duration: 1,
            ease: "expo.out"
        }, "-=0.5")
        .to("#item3 span:first-child", {
            opacity: 1,
            duration: 0.5,
            ease: "power2.out"
        }, "-=0.8")
        .to("#cursor3", {
            opacity: 1,
            duration: 0.3
        }, "-=0.6")
        .to("#text3", {
            opacity: 1,
            duration: 1.5,
            ease: "power1.out"
        }, "-=0.3");

        // Summary numbers COUNT UP animation
        tl.to("#num1", {
            opacity: 1,
            duration: 0.8,
            ease: "back.out(1.7)"
        }, "+=0.5")
        .to("#num2", {
            opacity: 1,
            duration: 0.8,
            ease: "back.out(1.7)"
        }, "-=0.6")
        .to("#num3", {
            opacity: 1,
            duration: 0.8,
            ease: "back.out(1.7)"
        }, "-=0.6");

        // Decorative lines fade in
        tl.to("#line1, #line2", {
            opacity: 0.4,
            duration: 1,
            ease: "power2.out"
        }, "-=1");

        // Play the timeline
        tl.play();
    </script>
</body>
</html>
