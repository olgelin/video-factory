<!DOCTYPE html>
<html data-composition-id="beat-7" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 7 - Ethical Balance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; width: 1920px; height: 1080px;">
    <div class="scene" style="background:#1a1a2e;position: relative; width: 100%; height: 100%; font-family: 'Inter', 'Noto Sans SC', sans-serif; overflow: hidden;">

        <!-- Decorative Layers -->
        <div class="grid-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,212,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.06) 1px, transparent 1px); background-size: 100px 100px; opacity: 0;"></div>
        <div class="glow-layer" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, rgba(0,212,255,0) 70%); opacity: 0;"></div>
        <div class="ghost-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 250px; font-weight: 900; color: rgba(255,255,255,0.04); white-space: nowrap; opacity: 0;">ETHICS</div>
        <div class="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,212,255,0.2); transform: translateY(-2px); opacity: 0;"></div>

        <!-- Particle Points (5-8 points) -->
        <div class="particle" style="position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #00D4FF; opacity: 0.4; top: 25%; left: 15%;"></div>
        <div class="particle" style="position: absolute; width: 3px; height: 3px; border-radius: 50%; background:#1a1a2e; opacity: 0.3; top: 65%; left: 80%;"></div>
        <div class="particle" style="position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #00D4FF; opacity: 0.5; top: 40%; left: 55%;"></div>
        <div class="particle" style="position: absolute; width: 4px; height: 4px; border-radius: 50%; background:#1a1a2e; opacity: 0.35; top: 80%; left: 30%;"></div>
        <div class="particle" style="position: absolute; width: 3px; height: 3px; border-radius: 50%; background:#1a1a2e; opacity: 0.4; top: 15%; left: 70%;"></div>
        <div class="particle" style="position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #00D4FF; opacity: 0.3; top: 50%; left: 40%;"></div>

        <!-- Corner Decorations -->
        <div class="corner-deco" style="position: absolute; top: 80px; left: 80px; width: 50px; height: 50px; border-top: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>
        <div class="corner-deco" style="position: absolute; top: 80px; right: 80px; width: 50px; height: 50px; border-top: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>
        <div class="corner-deco" style="position: absolute; bottom: 80px; left: 80px; width: 50px; height: 50px; border-bottom: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>
        <div class="corner-deco" style="position: absolute; bottom: 80px; right: 80px; width: 50px; height: 50px; border-bottom: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>

        <!-- Main Content -->
        <div style="position: absolute; top: 100px; left: 100px; right: 100px;">
            <h1 class="main-title" style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 96px; font-weight: 900; color: #00D4FF; margin: 0; text-shadow: 0 0 40px rgba(0,212,255,0.8), 0 0 80px rgba(0,212,255,0.4); opacity: 0;">冷静看待</h1>
            <p class="subtitle" style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 28px; color: rgba(0,212,255,0.6); margin-top: 15px; opacity: 0;">AI能力飞跃的双面性</p>
        </div>

        <!-- Balance Visual Area -->
        <div style="position: absolute; top: 280px; left: 100px; right: 100px; bottom: 200px; display: flex; justify-content: center; align-items: center;">

            <!-- Central Balance Beam -->
            <div class="balance-beam" style="position: relative; width: 80%; height: 4px; background: linear-gradient(90deg, rgba(255,64,129,0.5), rgba(0,212,255,0.8), rgba(255,215,0,0.5)); border-radius: 2px; opacity: 0;"></div>

            <!-- Balance Pivot Point -->
            <div class="pivot-point" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border-radius: 50%; background:#1a1a2e; box-shadow: 0 0 20px rgba(255,215,0,0.6); opacity: 0;"></div>

            <!-- Left Pan (Challenges) -->
            <div class="left-pan" style="position: absolute; left: 15%; top: 50%; transform: translateY(-50%); width: 300px; opacity: 0;">
                <div class="pan-connector" style="width: 2px; height: 60px; background: rgba(255,64,129,0.6); margin: 0 auto;"></div>
                <div class="card-challenge" style="background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,64,129,0.3); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(255,64,129,0.1);">
                    <div style="position: absolute; top: 0; left: 30px; right: 30px; height: 3px; background: linear-gradient(90deg, #FF4081, transparent);"></div>
                    <h3 style="font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #FF4081; margin: 0 0 20px 0; text-transform: uppercase;">Challenges</h3>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div class="challenge-item" style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background:#1a1a2e; box-shadow: 0 0 10px rgba(255,64,129,0.6);"></div>
                            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 20px; color: #FFFFFF;">数据隐私泄露</span>
                        </div>
                        <div class="challenge-item" style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background:#1a1a2e; box-shadow: 0 0 10px rgba(255,64,129,0.6);"></div>
                            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 20px; color: #FFFFFF;">算法偏见加剧</span>
                        </div>
                        <div class="challenge-item" style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background:#1a1a2e; box-shadow: 0 0 10px rgba(255,64,129,0.6);"></div>
                            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 20px; color: #FFFFFF;">就业市场冲击</span>
                        </div>
                    </div>
                    <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,64,129,0.2);">
                        <div class="data-label" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.5);">RISK LEVEL</div>
                        <div class="data-value" style="font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: bold; color: #FF4081; margin-top: 8px; line-height: 1;">HIGH</div>
                    </div>
                </div>
            </div>

            <!-- Right Pan (Opportunities) -->
            <div class="right-pan" style="position: absolute; right: 15%; top: 50%; transform: translateY(-50%); width: 300px; opacity: 0;">
                <div class="pan-connector" style="width: 2px; height: 60px; background: rgba(0,212,255,0.6); margin: 0 auto;"></div>
                <div class="card-opportunity" style="background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,255,0.1);">
                    <div style="position: absolute; top: 0; left: 30px; right: 30px; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent);"></div>
                    <h3 style="font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #00D4FF; margin: 0 0 20px 0; text-transform: uppercase;">Opportunities</h3>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div class="opportunity-item" style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background: #00D4FF; box-shadow: 0 0 10px rgba(0,212,255,0.6);"></div>
                            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 20px; color: #FFFFFF;">创新机遇涌现</span>
                        </div>
                        <div class="opportunity-item" style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background: #00D4FF; box-shadow: 0 0 10px rgba(0,212,255,0.6);"></div>
                            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 20px; color: #FFFFFF;">效率革命提升</span>
                        </div>
                        <div class="opportunity-item" style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background: #00D4FF; box-shadow: 0 0 10px rgba(0,212,255,0.6);"></div>
                            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 20px; color: #FFFFFF;">新产业生态形成</span>
                        </div>
                    </div>
                    <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(0,212,255,0.2);">
                        <div class="data-label" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.5);">POTENTIAL</div>
                        <div class="data-value" style="font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: bold; color: #FFD700; margin-top: 8px; line-height: 1;">2.5x</div>
                    </div>
                </div>
            </div>

            <!-- Data Storm Background Elements -->
            <div class="data-storm" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15;">
                <div style="position: absolute; top: 20%; left: 10%; width: 200px; height: 200px; border: 1px solid rgba(0,212,255,0.15); border-radius: 50%; animation: rotate 20s linear 3;"></div>
                <div style="position: absolute; top: 60%; left: 70%; width: 150px; height: 150px; border: 1px solid rgba(255,64,129,0.1); border-radius: 50%; animation: rotate 15s linear 3 reverse;"></div>
                <div style="position: absolute; top: 40%; left: 50%; width: 100px; height: 100px; border: 1px dashed rgba(255,215,0,0.1); animation: rotate 25s linear 3;"></div>
            </div>
        </div>

        <!-- Bottom Info Area -->
        <div style="position: absolute; bottom: 120px; left: 100px; right: 100px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="bottom-left" style="opacity: 0;">
                <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <div class="pill" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #00D4FF; border: 1px solid rgba(0,212,255,0.3); border-radius: 20px; padding: 8px 16px;">ETHICS</div>
                    <div class="pill" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #FF4081; border: 1px solid rgba(255,64,129,0.3); border-radius: 20px; padding: 8px 16px;">BALANCE</div>
                    <div class="pill" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #FFD700; border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 8px 16px;">RESPONSIBILITY</div>
                </div>
                <p style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); margin: 0;">AI能力飞跃也带来挑战，咱们得冷静看待。</p>
            </div>
            <div class="bottom-right" style="opacity: 0; text-align: right;">
                <div class="progress-label" style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 10px;">SOCIAL IMPACT ASSESSMENT</div>
                <div class="progress-bar-container" style="width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                    <div class="progress-bar" style="width: 65%; height: 100%; background: linear-gradient(90deg, #FF4081, #FFD700, #00D4FF); border-radius: 3px;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #FF4081;">Challenges</span>
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #FFD700;">Neutral</span>
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #00D4FF;">Opportunities</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Register timeline
        if (!window.__timelines) window.__timelines = {};
        window.__timelines["beat-7"] = gsap.timeline({paused: true});

        // Create animation sequence
        const tl = window.__timelines["beat-7"];

        // 1. Background decorative layers
        tl.from(".grid-layer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
        tl.from(".glow-layer", {opacity: 0, duration: 1.5, ease: "power1.inOut"}, 0.1);
        tl.from(".ghost-text", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.2);
        tl.from(".scan-line", {opacity: 0, y: -5, duration: 1, ease: "power1.inOut"}, 0.3);

        // 2. Corner decorations
        tl.from(".corner-deco", {opacity: 0, duration: 0.8, ease: "power2.out"}, 0.4);

        // 3. Main title
        tl.from(".main-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.5);
        tl.from(".subtitle", {y: -20, opacity: 0, duration: 0.6, ease: "power3.out"}, 0.65);

        // 4. Balance visual elements
        tl.from(".balance-beam", {opacity: 0, scaleX: 0, duration: 1, ease: "power2.inOut"}, 0.8);
        tl.from(".pivot-point", {opacity: 0, scale: 0, duration: 0.7, ease: "back.out(1.7)"}, 0.9);

        // 5. Left and right pans
        tl.from(".left-pan", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.0);
        tl.from(".right-pan", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.15);

        // 6. Challenge and opportunity items
        tl.from(".challenge-item", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.3);
        tl.from(".opportunity-item", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.3);

        // 7. Data values
        tl.from(".data-label", {opacity: 0, duration: 0.4, ease: "power2.out"}, 1.5);
        tl.from(".data-value", {scaleY: 0, transformOrigin: "bottom", opacity: 0, duration: 0.6, ease: "power2.out"}, 1.6);

        // 8. Bottom area
        tl.from(".bottom-left", {y: 30, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.8);
        tl.from(".bottom-right", {y: 30, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.9);

        // 9. Pills
        tl.from(".pill", {x: -20, opacity: 0, duration: 0.4, ease: "power2.out"}, 2.0);

        // 10. Progress bar
        tl.from(".progress-bar", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 2.1);

        // 11. Particles
        tl.from(".particle", {opacity: 0, duration: 0.8, ease: "power1.inOut"}, 2.2);

        // 12. Data storm
        tl.from(".data-storm", {opacity: 0, duration: 1.5, ease: "power1.inOut"}, 0.6);

        // Breathing animations (after timeline completes)
        tl.call(() => {
            // Card breathing
            gsap.to(".card-challenge", {
                scale: 1.02,
                duration: 2.5,
                repeat: 0,
                yoyo: true,
                ease: "sine.inOut"
            });
            gsap.to(".card-opportunity", {
                scale: 1.02,
                duration: 2.5,
                repeat: 0,
                yoyo: true,
                ease: "sine.inOut",
                delay: 0.3
            });

            // Title glow pulsing
            gsap.to(".main-title", {
                textShadow: "0 0 60px rgba(0,212,255,1), 0 0 120px rgba(0,212,255,0.6)",
                duration: 2.5,
                repeat: 0,
                yoyo: true,
                ease: "sine.inOut"
            });

            // Pill border pulsing
            gsap.to(".pill", {
                borderColor: "rgba(0,212,255,0.6)",
                duration: 2,
                repeat: 0,
                yoyo: true,
                ease: "sine.inOut",
                stagger: 0.2
            });

            // Background glow movement
            gsap.to(".glow-layer", {
                x: 50,
                y: 30,
                duration: 10,
                repeat: 0,
                yoyo: true,
                ease: "none"
            });

            // Scan line animation
            gsap.to(".scan-line", {
                y: "100%",
                duration: 5,
                repeat: 0,
                ease: "none"
            });

            // Particle movements
            gsap.to(".particle", {
                y: "random(-50, 50)",
                x: "random(-30, 30)",
                duration: "random(6, 12)",
                repeat: 0,
                yoyo: true,
                ease: "sine.inOut",
                stagger: 0.3
            });
        });
    </script>

    <style>
        /* Animation for data storm circles */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
