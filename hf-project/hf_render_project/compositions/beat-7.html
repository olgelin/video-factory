<!DOCTYPE html>
<html data-composition-id="beat-7" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>

</style>
</head>
<body style="margin: 0; padding: 0; background: #1a1a2e; overflow: hidden; width: 1920px; height: 1080px; position: relative;">
<div class="scene" style="background:#1a1a2e;width: 100%; height: 100%; position: relative; overflow: hidden; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);">
    
    <!-- Decorative Layer 1: Grid -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.08; background-image: 
        linear-gradient(rgba(0,212,255,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.3) 1px, transparent 1px);
        background-size: 100px 100px; pointer-events: none;"></div>
    
    <!-- Decorative Layer 2: Radial Glow -->
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; border-radius: 50%; background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, rgba(0,212,255,0.04) 40%, transparent 70%); pointer-events: none;"></div>
    
    <!-- Decorative Layer 3: Ghost Text -->
    <div style="position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 280px; font-weight: bold; color: rgba(255,255,255,0.04); line-height: 1; pointer-events: none; text-align: center;">FUTURE</div>
    
    <!-- Decorative Layer 4: Scanline -->
    <div id="scanline" style="position: absolute; top: -100%; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.2) 20%, rgba(0,212,255,0.4) 50%, rgba(0,212,255,0.2) 80%, transparent 100%); pointer-events: none;"></div>
    
    <!-- Decorative Layer 5: Particle Points -->
    <div class="particle" style="position: absolute; width: 4px; height: 4px; border-radius: 50%; background: rgba(0,212,255,0.8); top: 20%; left: 15%;"></div>
    <div class="particle" style="position: absolute; width: 3px; height: 3px; border-radius: 50%; background: rgba(255,64,129,0.8); top: 70%; left: 85%;"></div>
    <div class="particle" style="position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(255,215,0,0.8); top: 40%; left: 90%;"></div>
    <div class="particle" style="position: absolute; width: 4px; height: 4px; border-radius: 50%; background: rgba(0,212,255,0.8); top: 80%; left: 25%;"></div>
    <div class="particle" style="position: absolute; width: 3px; height: 3px; border-radius: 50%; background: rgba(255,64,129,0.8); top: 30%; left: 70%;"></div>
    <div class="particle" style="position: absolute; width: 2px; height: 2px; border-radius: 50%; background: rgba(255,215,0,0.8); top: 60%; left: 40%;"></div>
    
    <!-- Decorative Layer 6: Corner Decorations -->
    <div style="position: absolute; top: 100px; left: 100px; width: 60px; height: 3px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; top: 100px; left: 100px; width: 3px; height: 60px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; top: 100px; right: 100px; width: 60px; height: 3px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; top: 100px; right: 100px; width: 3px; height: 60px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; bottom: 100px; left: 100px; width: 60px; height: 3px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; bottom: 100px; left: 100px; width: 3px; height: 60px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; bottom: 100px; right: 100px; width: 60px; height: 3px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    <div style="position: absolute; bottom: 100px; right: 100px; width: 3px; height: 60px; background: rgba(0,212,255,0.3); pointer-events: none;"></div>
    
    <!-- Main Content: Quote Card -->
    <div id="quoteCard" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1200px; padding: 60px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(0,212,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.8), rgba(255,64,129,0.8), transparent); border-radius: 24px 24px 0 0;"></div>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: radial-gradient(circle at center top, rgba(0,212,255,0.08) 0%, transparent 70%);"></div>
        
        <div style="text-align: center; position: relative; z-index: 2;">
            <div id="quoteText" style="font-family: 'Noto Sans SC', sans-serif; font-size: 72px; font-weight: bold; line-height: 1.3; background: linear-gradient(135deg, #00D4FF 0%, #FF4081 50%, #FFD700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none; margin-bottom: 20px;">未来不会淘汰人，只会淘汰那些固守旧地图的人</div>
            
            <div id="abilityText" style="font-family: 'Noto Sans SC', sans-serif; font-size: 36px; color: rgba(255,255,255,0.7); margin-bottom: 40px;">它考验的是我们<strong style="color: #FFD700;">定义变化的能力</strong></div>
            
            <div style="display: flex; justify-content: center; gap: 20px;">
                <div class="tag-pill" style="padding: 12px 24px; border-radius: 50px; border: 1px solid rgba(0,212,255,0.4); color: #00D4FF; font-family: 'Noto Sans SC', sans-serif; font-size: 20px; background: rgba(0,212,255,0.1);">2026是起点</div>
                <div class="tag-pill" style="padding: 12px 24px; border-radius: 50px; border: 1px solid rgba(255,64,129,0.4); color: #FF4081; font-family: 'Noto Sans SC', sans-serif; font-size: 20px; background: rgba(255,64,129,0.1);">挑战与机遇</div>
                <div class="tag-pill" style="padding: 12px 24px; border-radius: 50px; border: 1px solid rgba(255,215,0,0.4); color: #FFD700; font-family: 'Noto Sans SC', sans-serif; font-size: 20px; background: rgba(255,215,0,0.1);">就业市场</div>
            </div>
        </div>
    </div>
    
    <!-- Light Beams Container -->
    <div id="lightBeams" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 0; height: 0; pointer-events: none;"></div>
    
    <!-- Human Silhouettes -->
    <div id="silhouettes" style="position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%); display: flex; gap: 60px; pointer-events: none;"></div>
    
    <!-- Bottom Text -->
    <div id="bottomText" style="position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); font-family: 'Noto Sans SC', sans-serif; font-size: 48px; font-weight: bold; color: rgba(0,212,255,0.9); text-shadow: 0 0 30px rgba(0,212,255,0.6); opacity: 0;">起点</div>
    
    <!-- Call to Action -->
    <div id="ctaText" style="position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); font-family: 'Noto Sans SC', sans-serif; font-size: 24px; color: rgba(255,255,255,0.6); text-align: center; opacity: 0;">转发给需要的人！</div>
    
    <!-- Data Card -->
    <div id="dataCard" style="position: absolute; top: 150px; right: 150px; width: 300px; padding: 30px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #FFD700, transparent); border-radius: 16px 16px 0 0;"></div>
        <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 10px;">核心洞察</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: bold; color: #FFD700; line-height: 1;">100%</div>
        <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 18px; color: rgba(255,255,255,0.7); margin-top: 10px;">淘汰固守旧地图的人</div>
        <div style="width: 100%; height: 8px; background: rgba(255,215,0,0.2); border-radius: 4px; margin-top: 20px; overflow: hidden;">
            <div id="progressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #FFD700, #FF4081); border-radius: 4px;"></div>
        </div>
    </div>
    
    <!-- Side Info Card -->
    <div id="sideCard" style="position: absolute; top: 350px; right: 150px; width: 300px; padding: 30px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,64,129,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #FF4081, transparent); border-radius: 16px 16px 0 0;"></div>
        <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 10px;">时代特征</div>
        <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 24px; font-weight: bold; color: #FF4081; margin-bottom: 15px;">AI重塑就业</div>
        <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 16px; color: rgba(255,255,255,0.7); line-height: 1.6;">技术迭代加速，传统岗位面临转型压力，新兴职业机会涌现。</div>
        <div style="display: flex; gap: 8px; margin-top: 20px;">
            <div style="padding: 6px 12px; border-radius: 4px; background: rgba(255,64,129,0.2); font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #FF4081;">+32%</div>
            <div style="padding: 6px 12px; border-radius: 4px; background: rgba(0,212,255,0.2); font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #00D4FF;">新职业</div>
        </div>
    </div>
</div>

<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({paused: true});

// Create light beams
const lightBeamsContainer = document.getElementById('lightBeams');
for (let i = 0; i < 12; i++) {
    const beam = document.createElement('div');
    beam.style.cssText = `
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 0;
        background: linear-gradient(to top, rgba(0,212,255,0), rgba(0,212,255,0.8));
        transform-origin: bottom center;
        transform: rotate(${i * 30}deg);
        opacity: 0;
    `;
    lightBeamsContainer.appendChild(beam);
}

// Create human silhouettes
const silhouettesContainer = document.getElementById('silhouettes');
for (let i = 0; i < 8; i++) {
    const silhouette = document.createElement('div');
    silhouette.style.cssText = `
        width: 40px;
        height: 80px;
        background: rgba(0,212,255,0.1);
        border-radius: 20px 20px 5px 5px;
        position: relative;
        opacity: 0;
    `;
    // Head
    const head = document.createElement('div');
    head.style.cssText = `
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background: rgba(0,212,255,0.1);
    `;
    silhouette.appendChild(head);
    silhouettesContainer.appendChild(silhouette);
}

// Entrance Animations (0.15s stagger)
tl.from("#quoteCard", {
    y: 60,
    opacity: 0,
    scale: 0.9,
    duration: 0.8,
    ease: "back.out(1.7)"
}, 0);

tl.from("#quoteText", {
    opacity: 0,
    y: -30,
    duration: 0.6,
    ease: "power3.out"
}, 0.3);

tl.from("#abilityText", {
    opacity: 0,
    y: 20,
    duration: 0.5,
    ease: "power2.out"
}, 0.45);

tl.from(".tag-pill", {
    x: -30,
    opacity: 0,
    stagger: 0.1,
    duration: 0.5,
    ease: "power2.out"
}, 0.6);

tl.from("#dataCard", {
    y: 50,
    opacity: 0,
    scale: 0.9,
    duration: 0.7,
    ease: "back.out(1.7)"
}, 0.75);

tl.from("#sideCard", {
    y: 50,
    opacity: 0,
    scale: 0.9,
    duration: 0.7,
    ease: "back.out(1.7)"
}, 0.9);

tl.from("#progressBar", {
    scaleX: 0,
    transformOrigin: "left",
    duration: 1.5,
    ease: "power2.inOut"
}, 1.0);

tl.from(".particle", {
    opacity: 0,
    stagger: 0.1,
    duration: 0.8,
    ease: "power1.out"
}, 0.5);

tl.from("#lightBeams div", {
    height: 0,
    opacity: 0,
    stagger: 0.05,
    duration: 0.8,
    ease: "power2.out"
}, 1.2);

tl.from("#silhouettes div", {
    opacity: 0,
    y: 30,
    stagger: 0.1,
    duration: 0.6,
    ease: "power2.out"
}, 1.5);

tl.to("#bottomText", {
    opacity: 1,
    y: -20,
    duration: 0.8,
    ease: "power2.out"
}, 1.8);

tl.to("#ctaText", {
    opacity: 1,
    duration: 0.5,
    ease: "power2.out"
}, 2.2);

// Breathing Animations
gsap.to("#quoteCard", {
    scale: 1.015,
    duration: 3,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to("#quoteText", {
    textShadow: "0 0 40px rgba(0,212,255,0.8)",
    opacity: 0.9,
    duration: 2.5,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

// Scanline animation
gsap.to("#scanline", {
    top: "100%",
    duration: 5,
    repeat: 0,
    ease: "none"
});

// Particle drift animations
gsap.to(".particle:nth-child(1)", {
    y: -20,
    x: 10,
    duration: 8,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to(".particle:nth-child(2)", {
    y: 15,
    x: -15,
    duration: 10,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to(".particle:nth-child(3)", {
    y: -10,
    x: 20,
    duration: 12,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to(".particle:nth-child(4)", {
    y: 25,
    x: -10,
    duration: 9,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to(".particle:nth-child(5)", {
    y: -15,
    x: 5,
    duration: 11,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to(".particle:nth-child(6)", {
    y: 20,
    x: -20,
    duration: 7,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

// Tag pill border pulse
gsap.to(".tag-pill", {
    borderColor: "rgba(0,212,255,0.8)",
    duration: 2,
    repeat: 0,
    yoyo: true,
    stagger: 0.5,
    ease: "sine.inOut"
});

// Data card breathing
gsap.to("#dataCard", {
    scale: 1.02,
    duration: 2.5,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

// Side card breathing
gsap.to("#sideCard", {
    scale: 1.02,
    duration: 2.5,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

// Particle explosion effect at 8 seconds
setTimeout(() => {
    const particles = document.querySelectorAll('.particle');
    particles.forEach(particle => {
        gsap.to(particle, {
            scale: 3,
            opacity: 0,
            duration: 0.5,
            ease: "power2.out",
            onComplete: () => {
                gsap.set(particle, {scale: 1, opacity: 0.8});
            }
        });
    });
}, 8000);

window.__timelines["beat-7"] = tl;
tl.play();
</script>
</body>
</html>
