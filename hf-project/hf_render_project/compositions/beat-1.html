<!DOCTYPE html>
<html data-composition-id="beat-1" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperFrames Scene</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
</head>
<body style="margin:0; padding:0; overflow:hidden; background:#1a1a2e;">
<div class="scene" style="position:relative; width:1920px; height:1080px; background:#1a1a2e; overflow:hidden; font-family:'Inter','Noto Sans SC',sans-serif;">
    <!-- Background Decoration Layers -->
    <div class="grid-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(to right, rgba(0,212,255,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,212,255,0.06) 1px, transparent 1px); background-size:100px 100px; opacity:0.1;"></div>
    <div class="glow-layer" style="position:absolute; top:40%; left:55%; transform:translate(-50%,-50%); width:800px; height:800px; background:radial-gradient(circle, rgba(0,212,255,0.15), transparent 70%); opacity:0.8;"></div>
    <div class="ghost-text" style="position:absolute; top:250px; left:50px; font-size:280px; font-weight:bold; color:rgba(255,255,255,0.04); font-family:'JetBrains Mono',monospace;">40000亿</div>
    <div class="scan-line" style="position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(to right, transparent, rgba(0,212,255,0.2), transparent); transform:translateY(100vh);"></div>
    <div class="particle" style="position:absolute; top:200px; left:300px; width:3px; height:3px; background:#00D4FF; border-radius:50%; opacity:0.5;"></div>
    <div class="particle" style="position:absolute; top:500px; left:1200px; width:4px; height:4px; background:#1a1a2e; border-radius:50%; opacity:0.4;"></div>
    <div class="particle" style="position:absolute; top:800px; left:800px; width:3px; height:3px; background:#1a1a2e; border-radius:50%; opacity:0.6;"></div>
    <div class="particle" style="position:absolute; top:300px; left:1600px; width:2px; height:2px; background:#00D4FF; border-radius:50%; opacity:0.3;"></div>
    <div class="particle" style="position:absolute; top:600px; left:400px; width:3px; height:3px; background:#1a1a2e; border-radius:50%; opacity:0.5;"></div>
    <div class="corner-deco" style="position:absolute; top:100px; left:100px; width:60px; height:60px; border-top:2px solid rgba(0,212,255,0.3); border-left:2px solid rgba(0,212,255,0.3);"></div>
    <div class="corner-deco" style="position:absolute; top:100px; right:100px; width:60px; height:60px; border-top:2px solid rgba(0,212,255,0.3); border-right:2px solid rgba(0,212,255,0.3);"></div>
    <div class="corner-deco" style="position:absolute; bottom:100px; left:100px; width:60px; height:60px; border-bottom:2px solid rgba(0,212,255,0.3); border-left:2px solid rgba(0,212,255,0.3);"></div>
    <div class="corner-deco" style="position:absolute; bottom:100px; right:100px; width:60px; height:60px; border-bottom:2px solid rgba(0,212,255,0.3); border-right:2px solid rgba(0,212,255,0.3);"></div>

    <!-- Main Content - Left 60% -->
    <div class="main-title" style="position:absolute; top:120px; left:200px; font-size:96px; font-weight:bold; color:#00D4FF; text-shadow:0 0 30px rgba(0,212,255,0.5); line-height:1.2;">中国外贸连续3个月超4万亿元</div>
    <div class="subtitle" style="position:absolute; top:240px; left:200px; font-size:32px; color:rgba(0,212,255,0.5); font-weight:regular;">政策红利持续释放</div>
    <div class="data-card" style="position:absolute; top:300px; left:200px; width:500px; padding:40px; background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,0.4); border-top:3px solid transparent; border-image:linear-gradient(to right, rgba(0,212,255,0.8), transparent) 1;">
        <div style="font-size:120px; font-weight:bold; color:#FFD700; font-family:'JetBrains Mono',monospace; line-height:1;">40000亿</div>
        <div style="font-size:24px; color:#999; margin-top:10px;">连续三个月超四万亿元</div>
        <div style="font-size:16px; color:#FF4081; margin-top:10px;">▲ 12.5% 同比增长</div>
    </div>
    <div class="voiceover" style="position:absolute; top:550px; left:200px; font-size:30px; color:#FFFFFF; max-width:500px; line-height:1.5;">你绝对想不到，中国外贸连续三个月超四万亿元：政策红利持续释放。兄弟们，这数据，直接炸翻全网，我第一眼看到都惊了。</div>

    <!-- Main Content - Right 40% -->
    <div class="pill" style="position:absolute; top:120px; left:1200px; padding:12px 24px; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:16px; font-size:20px; color:#00D4FF;">数据爆炸</div>
    <div class="progress-bar" style="position:absolute; top:200px; left:1200px; width:400px; height:8px; background:rgba(0,212,255,0.1); border-radius:4px;">
        <div style="width:80%; height:100%; background:linear-gradient(to right, #00D4FF, #FF4081); border-radius:4px;"></div>
    </div>
    <div class="pill" style="position:absolute; top:250px; left:1200px; padding:10px 20px; background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:16px; font-size:18px; color:#FF4081;">全球关注</div>
    <div style="position:absolute; top:320px; left:1200px; font-size:20px; color:#666;">数据趋势</div>
    <div class="pill" style="position:absolute; top:350px; left:1200px; padding:8px 16px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); border-radius:16px; font-size:16px; color:#FFD700;">月度数据</div>

    <!-- Bottom Info -->
    <div class="footer-info" style="position:absolute; bottom:120px; left:100px; width:1720px; display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:20px; color:#999;">数据来源: 海关总署 | 更新时间: 2023-10-01</div>
        <div style="display:flex; gap:20px;">
            <div style="padding:8px 16px; background:rgba(0,212,255,0.05); border-radius:8px; font-size:16px; color:#00D4FF;">Q3 2023</div>
            <div style="padding:8px 16px; background:rgba(255,64,129,0.05); border-radius:8px; font-size:16px; color:#FF4081;">同比↑</div>
        </div>
    </div>

    <!-- Additional decorative element -->
    <div style="position:absolute; top:900px; left:200px; width:500px; height:2px; background:linear-gradient(to right, rgba(0,212,255,0.2), transparent);"></div>
</div>

<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({paused: true});

// Entry animations with 0.15s stagger
tl.from('.grid-layer', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0)
  .from('.glow-layer', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15)
  .from('.ghost-text', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3)
  .from('.scan-line', {y: '100vh', opacity: 0, duration: 4, ease: "power1.inOut"}, 0.45)
  .from('.particle', {opacity: 0, duration: 1.2, ease: "power1.inOut", stagger: 0.08}, 0.6)
  .from('.corner-deco', {opacity: 0, duration: 1.2, ease: "power1.inOut", stagger: 0.1}, 0.75)
  .from('.main-title', {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.9)
  .from('.data-card', {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.05)
  .from('.subtitle', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.2)
  .from('.voiceover', {y: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.35)
  .from('.pill', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.1}, 1.5)
  .from('.progress-bar', {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 1.65)
  .from('.footer-info', {opacity: 0, duration: 0.5, ease: "power2.out"}, 1.8);

// Breathing animations (only for specified elements)
gsap.to('.data-card', {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to('.main-title', {textShadow: '0 0 40px rgba(0,212,255,0.8)', duration: 2.5, repeat: 0, yoyo: true, ease: "sine.inOut"});
gsap.to('.glow-layer', {scale: 1.05, duration: 10, repeat: 0, yoyo: true, ease: "none"});

window.__timelines["beat-1"] = tl;
</script>
</body>
</html>
