<!DOCTYPE html>
<html data-composition-id="beat-1" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #0a0a0a; width: 1920px; height: 1080px; overflow: hidden; font-family: 'Inter', 'Noto Sans SC', sans-serif;">
    <div class="scene" style="background:#1a1a2e;position: relative; width: 100%; height: 100%; background: #1a1a2e;">
        <!-- Background Grid Layer -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: 
            linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 100px 100px; opacity: 0.4;" id="grid-bg"></div>
        
        <!-- Radial Glow -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1200px; height: 1200px; background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, rgba(0, 212, 255, 0) 70%); pointer-events: none;" id="glow-center"></div>
        
        <!-- Red Warning Dots -->
        <div style="position: absolute; top: 15%; left: 20%; width: 8px; height: 8px; background:#1a1a2e; border-radius: 50%; opacity: 0; box-shadow: 0 0 10px #FF4081;" id="warning-dot-1"></div>
        <div style="position: absolute; top: 30%; left: 65%; width: 6px; height: 6px; background:#1a1a2e; border-radius: 50%; opacity: 0; box-shadow: 0 0 8px #FF4081;" id="warning-dot-2"></div>
        <div style="position: absolute; top: 70%; left: 40%; width: 10px; height: 10px; background:#1a1a2e; border-radius: 50%; opacity: 0; box-shadow: 0 0 12px #FF4081;" id="warning-dot-3"></div>
        <div style="position: absolute; top: 45%; left: 80%; width: 7px; height: 7px; background:#1a1a2e; border-radius: 50%; opacity: 0; box-shadow: 0 0 9px #FF4081;" id="warning-dot-4"></div>
        
        <!-- Ghost Text Watermark -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 280px; font-weight: 900; color: rgba(255, 255, 255, 0.03); letter-spacing: 20px; pointer-events: none; white-space: nowrap;" id="ghost-text">DATA2026</div>
        
        <!-- Neon Circuit Lines -->
        <div style="position: absolute; top: 0; left: 10%; width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(0, 212, 255, 0.3), transparent); opacity: 0;" id="neon-line-1"></div>
        <div style="position: absolute; top: 0; left: 90%; width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(255, 64, 129, 0.3), transparent); opacity: 0;" id="neon-line-2"></div>
        
        <!-- Main Title -->
        <div style="position: absolute; top: 280px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; z-index: 10;">
            <div style="font-size: 110px; font-weight: 900; color: #FFFFFF; text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.4); letter-spacing: 8px; line-height: 1.1;">
                机遇与风险并存
            </div>
            <div style="width: 300px; height: 4px; background: linear-gradient(90deg, #00D4FF, #FF4081); margin: 30px auto 0; border-radius: 2px;" id="title-line"></div>
        </div>
        
        <!-- Core Data Card -->
        <div style="position: absolute; top: 520px; left: 50%; transform: translateX(-50%); width: 700px; background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 24px; padding: 40px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); text-align: center;">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #00D4FF, #FF4081, transparent); border-radius: 24px 24px 0 0;"></div>
            <div style="font-size: 16px; color: #999999; margin-bottom: 15px; letter-spacing: 2px;">核心预测</div>
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 72px; font-weight: 700; color: #FFD700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);">±38%</div>
            <div style="font-size: 20px; color: #FFFFFF; margin-top: 15px; opacity: 0.8;">市场波动区间</div>
            <div style="width: 100%; height: 4px; background: rgba(0, 212, 255, 0.2); border-radius: 2px; margin-top: 25px; overflow: hidden;">
                <div style="width: 65%; height: 100%; background: linear-gradient(90deg, #00D4FF, #00FF88); border-radius: 2px;" id="progress-bar"></div>
            </div>
        </div>
        
        <!-- Info Pills -->
        <div style="position: absolute; top: 780px; left: 15%; display: flex; gap: 30px; opacity: 0;" id="pills-container">
            <div style="background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 100px; padding: 12px 24px; font-size: 18px; color: #00D4FF; display: flex; align-items: center; gap: 8px;">
                <div style="width: 8px; height: 8px; background: #00D4FF; border-radius: 50%;"></div>
                AI驱动增长
            </div>
            <div style="background: rgba(255, 64, 129, 0.1); border: 1px solid rgba(255, 64, 129, 0.4); border-radius: 100px; padding: 12px 24px; font-size: 18px; color: #FF4081; display: flex; align-items: center; gap: 8px;">
                <div style="width: 8px; height: 8px; background:#1a1a2e; border-radius: 50%;"></div>
                政策不确定性
            </div>
            <div style="background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 100px; padding: 12px 24px; font-size: 18px; color: #FFD700; display: flex; align-items: center; gap: 8px;">
                <div style="width: 8px; height: 8px; background:#1a1a2e; border-radius: 50%;"></div>
                科技泡沫风险
            </div>
        </div>
        
        <!-- Voiceover Text -->
        <div style="position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; z-index: 5; opacity: 0;" id="voiceover">
            <div style="font-size: 30px; color: #FFFFFF; line-height: 1.6; max-width: 1200px; margin: 0 auto;">
                你绝对想不到，2026年股市展望：<span style="color: #00D4FF; font-weight: 600;">机遇与风险并存</span>。说白了，这可不是什么老生常谈，而是科技浪潮和人性弱点的一场硬核对决。
            </div>
        </div>
        
        <!-- Corner Decorations -->
        <div style="position: absolute; top: 100px; left: 100px; width: 60px; height: 2px; background: rgba(0, 212, 255, 0.3);" id="corner-tl-h"></div>
        <div style="position: absolute; top: 100px; left: 100px; width: 2px; height: 60px; background: rgba(0, 212, 255, 0.3);" id="corner-tl-v"></div>
        <div style="position: absolute; top: 100px; right: 100px; width: 60px; height: 2px; background: rgba(0, 212, 255, 0.3);" id="corner-tr-h"></div>
        <div style="position: absolute; top: 100px; right: 100px; width: 2px; height: 60px; background: rgba(0, 212, 255, 0.3);" id="corner-tr-v"></div>
        <div style="position: absolute; bottom: 100px; left: 100px; width: 60px; height: 2px; background: rgba(255, 64, 129, 0.3);" id="corner-bl-h"></div>
        <div style="position: absolute; bottom: 100px; left: 100px; width: 2px; height: 60px; background: rgba(255, 64, 129, 0.3);" id="corner-bl-v"></div>
        <div style="position: absolute; bottom: 100px; right: 100px; width: 60px; height: 2px; background: rgba(255, 64, 129, 0.3);" id="corner-br-h"></div>
        <div style="position: absolute; bottom: 100px; right: 100px; width: 2px; height: 60px; background: rgba(255, 64, 129, 0.3);" id="corner-br-v"></div>
        
        <!-- Circuit Particles -->
        <div style="position: absolute; top: 20%; left: 15%; width: 4px; height: 4px; background: #00D4FF; border-radius: 50%; opacity: 0; box-shadow: 0 0 8px #00D4FF;" id="particle-1"></div>
        <div style="position: absolute; top: 40%; left: 75%; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%; opacity: 0; box-shadow: 0 0 6px #FF4081;" id="particle-2"></div>
        <div style="position: absolute; top: 65%; left: 30%; width: 5px; height: 5px; background:#1a1a2e; border-radius: 50%; opacity: 0; box-shadow: 0 0 10px #FFD700;" id="particle-3"></div>
        <div style="position: absolute; top: 35%; left: 55%; width: 3px; height: 3px; background: #00FF88; border-radius: 50%; opacity: 0; box-shadow: 0 0 6px #00FF88;" id="particle-4"></div>
        
        <!-- Scanning Line -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4), transparent); opacity: 0;" id="scan-line"></div>
        
        <!-- Broken Code Fragments -->
        <div style="position: absolute; top: 25%; left: 80%; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(0, 212, 255, 0.3); transform: rotate(-15deg); opacity: 0;" id="code-1">2026::MARKET_VOLATILITY</div>
        <div style="position: absolute; top: 55%; left: 10%; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255, 64, 129, 0.3); transform: rotate(8deg); opacity: 0;" id="code-2">//risk_probability_calc()</div>
        <div style="position: absolute; top: 75%; left: 65%; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255, 215, 0, 0.3); opacity: 0;" id="code-3">if(opportunity.exists) {invest();}</div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-1"] = gsap.timeline({paused: true});
        
        const tl = window.__timelines["beat-1"];
        
        // Background elements first
        tl.from('#grid-bg', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
        tl.from('#glow-center', {opacity: 0, scale: 0.8, duration: 1.5, ease: "power2.inOut"}, 0.2);
        
        // Warning dots
        tl.from('#warning-dot-1', {opacity: 0, scale: 0, duration: 0.5, ease: "back.out(1.7)"}, 0.4);
        tl.from('#warning-dot-2', {opacity: 0, scale: 0, duration: 0.5, ease: "back.out(1.7)"}, 0.55);
        tl.from('#warning-dot-3', {opacity: 0, scale: 0, duration: 0.5, ease: "back.out(1.7)"}, 0.7);
        tl.from('#warning-dot-4', {opacity: 0, scale: 0, duration: 0.5, ease: "back.out(1.7)"}, 0.85);
        
        // Ghost text
        tl.from('#ghost-text', {opacity: 0, duration: 1.5, ease: "power2.inOut"}, 0.3);
        
        // Neon lines
        tl.from('#neon-line-1', {opacity: 0, duration: 0.8, ease: "power1.inOut"}, 0.5);
        tl.from('#neon-line-2', {opacity: 0, duration: 0.8, ease: "power1.inOut"}, 0.7);
        
        // Main title - SLAMS effect
        tl.from('.scene div:nth-child(8) div:first-child', {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.9);
        tl.from('#title-line', {scaleX: 0, transformOrigin: "center", duration: 0.6, ease: "power2.inOut"}, 1.2);
        
        // Data card - morphs in
        tl.from('.scene div:nth-child(9)', {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.3);
        tl.from('#progress-bar', {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 1.6);
        
        // Pills - cascade in
        tl.from('#pills-container', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.8);
        tl.from('#pills-container div:nth-child(1)', {x: -20, opacity: 0, duration: 0.4, ease: "power2.out"}, 1.9);
        tl.from('#pills-container div:nth-child(2)', {x: -20, opacity: 0, duration: 0.4, ease: "power2.out"}, 2.0);
        tl.from('#pills-container div:nth-child(3)', {x: -20, opacity: 0, duration: 0.4, ease: "power2.out"}, 2.1);
        
        // Voiceover text
        tl.from('#voiceover', {y: 20, opacity: 0, duration: 0.6, ease: "power2.out"}, 2.2);
        
        // Corner decorations
        tl.from('#corner-tl-h, #corner-tl-v', {opacity: 0, duration: 0.5}, 1.0);
        tl.from('#corner-tr-h, #corner-tr-v', {opacity: 0, duration: 0.5}, 1.1);
        tl.from('#corner-bl-h, #corner-bl-v', {opacity: 0, duration: 0.5}, 1.2);
        tl.from('#corner-br-h, #corner-br-v', {opacity: 0, duration: 0.5}, 1.3);
        
        // Circuit particles
        tl.from('#particle-1', {opacity: 0, scale: 0, duration: 0.5}, 1.4);
        tl.from('#particle-2', {opacity: 0, scale: 0, duration: 0.5}, 1.5);
        tl.from('#particle-3', {opacity: 0, scale: 0, duration: 0.5}, 1.6);
        tl.from('#particle-4', {opacity: 0, scale: 0, duration: 0.5}, 1.7);
        
        // Code fragments
        tl.from('#code-1', {opacity: 0, x: -20, duration: 0.6, ease: "power2.out"}, 1.8);
        tl.from('#code-2', {opacity: 0, x: -20, duration: 0.6, ease: "power2.out"}, 1.9);
        tl.from('#code-3', {opacity: 0, x: -20, duration: 0.6, ease: "power2.out"}, 2.0);
        
        // Scanning line
        tl.from('#scan-line', {opacity: 0, duration: 0.4}, 2.0);
        
        // Breathing animations after timeline
        const breathTimeline = gsap.timeline({repeat: 0, yoyo: true});
        
        // Title glow pulse
        breathTimeline.to('.scene div:nth-child(8) div:first-child', {
            textShadow: "0 0 40px rgba(0, 212, 255, 1), 0 0 80px rgba(0, 212, 255, 0.6)",
            duration: 2.5,
            ease: "sine.inOut"
        }, 0);
        
        // Data card scale pulse
        breathTimeline.to('.scene div:nth-child(9)', {
            scale: 1.015,
            duration: 3,
            ease: "sine.inOut"
        }, 0);
        
        // Center glow drift
        gsap.to('#glow-center', {
            scale: 1.1,
            duration: 10,
            repeat: 0,
            yoyo: true,
            ease: "none"
        });
        
        // Warning dot blink
        gsap.to('#warning-dot-1, #warning-dot-2, #warning-dot-3, #warning-dot-4', {
            opacity: 0.6,
            duration: 0.8,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut",
            stagger: 0.2
        });
        
        // Scan line movement
        gsap.to('#scan-line', {
            y: 1080,
            duration: 4,
            repeat: 0,
            ease: "none"
        });
        
        // Particle drift
        gsap.to('#particle-1', {y: -30, x: 15, duration: 8, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('#particle-2', {y: 25, x: -20, duration: 10, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('#particle-3', {y: -20, x: 10, duration: 12, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('#particle-4', {y: 15, x: -25, duration: 9, repeat: 0, yoyo: true, ease: "sine.inOut"});
        
        // Start timeline
        tl.play();
    </script>
</body>
</html>
