<!DOCTYPE html>

                    </div>

                    <div style="background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,64,129,0.3); border-radius: 24px; padding: 35px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;">

                    </div>

                    <div style="background: rgba(26,26,46,0.5); border-left: 4px solid #00D4FF; padding: 30px; border-radius: 0 16px 16px 0; opacity: 0;">
                        <div style="font-size: 28px; color: rgba(255,255,255,0.9); line-height: 1.6; font-style: italic;">"就业市场正在经历结构性变革，传统岗位与新兴职业并存，要求毕业生具备更强的适应力和跨界能力。"</div>
                        <div style="font-size: 20px; color: rgba(153,153,153,0.7); margin-top: 20px; text-align: right;">— 人社部就业指导中心</div>
                    </div>
                    <!-- Neon Line -->
                    <div style="height: 3px; background: linear-gradient(90deg, transparent, #00D4FF, transparent); opacity: 0;"></div>
                </div>
            </div>

            <!-- Bottom Info -->
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px; opacity: 0;">
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: rgba(153,153,153,0.7);">TIMELINE: 2024-2026</div>
                <div style="width: 400px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">

            </div>
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        
        const tl = gsap.timeline({paused: true});
        
        // Layer 1: Background decorations
        tl.from('.scene > div:nth-child(1)', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0)
          .from('.scene > div:nth-child(2)', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15)
          .from('.scene > div:nth-child(3)', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3)
          .from('.scene > div:nth-child(4)', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.45)
          .from('.scene > div:nth-child(5)', {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.6);
        
        // Layer 2: Ghost text
        tl.from('.scene > div:nth-child(6)', {opacity: 0, duration: 0.8, ease: "power2.inOut"}, 0.8)
          .from('.scene > div:nth-child(7)', {opacity: 0, duration: 0.8, ease: "power2.inOut"}, 0.95);
        
        // Layer 3: Scanning line
        tl.from('.scene > div:nth-child(8)', {opacity: 0, y: -100, duration: 1.5, ease: "power1.inOut"}, 1.1);
        
        // Layer 4: Particles
        tl.from('.scene > div:nth-child(9)', {opacity: 0, scale: 0, duration: 0.6, ease: "back.out(1.7)"}, 1.3)
          .from('.scene > div:nth-child(10)', {opacity: 0, scale: 0, duration: 0.6, ease: "back.out(1.7)"}, 1.45)
          .from('.scene > div:nth-child(11)', {opacity: 0, scale: 0, duration: 0.6, ease: "back.out(1.7)"}, 1.6)
          .from('.scene > div:nth-child(12)', {opacity: 0, scale: 0, duration: 0.6, ease: "back.out(1.7)"}, 1.75)
          .from('.scene > div:nth-child(13)', {opacity: 0, scale: 0, duration: 0.6, ease: "back.out(1.7)"}, 1.9)
          .from('.scene > div:nth-child(14)', {opacity: 0, scale: 0, duration: 0.6, ease: "back.out(1.7)"}, 2.05);
        
        // Layer 5: Corner decorations
        tl.from('.scene > div:nth-child(15)', {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 2.2)
          .from('.scene > div:nth-child(16)', {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 2.35)
          .from('.scene > div:nth-child(17)', {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 2.5)
          .from('.scene > div:nth-child(18)', {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 2.65);
        
        // Layer 6: Main title
        tl.from('.scene div:has(> div:contains("2026高校毕业生就业"))', {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 2.8)
          .from('.scene div:has(> div:contains("挑战与机遇并存"))', {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 2.95);
        
        // Layer 7: Data cards
        tl.from('.scene div:has(> div:contains("GLOBAL TREND"))', {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 3.1)
          .from('.scene div:has(> div:contains("AI岗位需求"))', {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 3.25);
        
        // Layer 8: Tags and quote
        tl.from('.scene div:has(> div:contains("科技赋能"))', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 3.4)
          .from('.scene div:has(> div:contains("产业升级"))', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 3.55)
          .from('.scene div:has(> div:contains("数字转型"))', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 3.7)
          .from('.scene div:has(> div:contains("新质生产力"))', {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 3.85)
          .from('.scene div:has(> div:contains("就业市场正在经历结构性变革"))', {y: 30, opacity: 0, duration: 0.6, ease: "power2.out"}, 4)
          .from('.scene div:has(> div:contains("人社部就业指导中心"))', {opacity: 0, duration: 0.4, ease: "power2.out"}, 4.15);
        
        // Layer 9: Neon line
        tl.from('.scene div:has(> div:contains("TIMELINE"))', {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 4.3);
        
        // Layer 10: Bottom info
        tl.from('.scene div:has(> div:contains("TIMELINE: 2024-2026"))', {opacity: 0, duration: 0.6, ease: "power2.out"}, 4.5)
          .from('.scene div:has(> div:contains("数据来源"))', {opacity: 0, duration: 0.6, ease: "power2.out"}, 4.65);
        
        // Breathing animations
        gsap.to('.scene div:has(> div:contains("GLOBAL TREND"))', {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to('.scene div:contains("挑战与机遇并存")', {
            textShadow: "0 0 60px rgba(0,212,255,0.8), 0 0 120px rgba(0,212,255,0.4)",
            opacity: 0.9,
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Particle drift animations
        gsap.to('.scene > div:nth-child(9)', {y: "+=40", x: "+=20", duration: 8, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('.scene > div:nth-child(10)', {y: "-=30", x: "-=15", duration: 10, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('.scene > div:nth-child(11)', {y: "+=25", x: "-=30", duration: 12, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('.scene > div:nth-child(12)', {y: "-=20", x: "+=25", duration: 9, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('.scene > div:nth-child(13)', {y: "+=35", x: "+=10", duration: 11, repeat: 0, yoyo: true, ease: "sine.inOut"});
        gsap.to('.scene > div:nth-child(14)', {y: "-=15", x: "-=20", duration: 7, repeat: 0, yoyo: true, ease: "sine.inOut"});
        
        // Scanning line animation
        gsap.fromTo('.scene > div:nth-child(8)', 
            {y: -100}, 
            {y: 1080, duration: 5, repeat: 0, ease: "none"}
        );
        
        window.__timelines["beat-1"] = tl;
    </script>
