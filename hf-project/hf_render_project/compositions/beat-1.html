<!DOCTYPE html>
<html data-composition-id="beat-1" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin:0; padding:0; overflow:hidden; background-color:#1a1a2e; font-family:'Inter','Noto Sans SC',sans-serif;">
    <div class="scene" style="background:#1a1a2e; position:relative; width:100%; height:100vh; background:radial-gradient(circle at 50% 50%, #1a1a3e 0%, #0a0a1a 100%); overflow:hidden;">
        
        <!-- Decorative grid layer -->
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.15; pointer-events:none;">
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: 
                linear-gradient(rgba(0,212,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.1) 1px, transparent 1px);
                background-size: 100px 100px;"></div>
        </div>
        
        <!-- Radial glow background -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:1200px; height:800px; background:radial-gradient(circle, rgba(255,64,129,0.15) 0%, rgba(0,212,255,0.08) 50%, transparent 70%); border-radius:50%; pointer-events:none;"></div>
        
        <!-- Ghost text watermark -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:240px; font-weight:bold; color:rgba(255,255,255,0.03); font-family:'JetBrains Mono',monospace; pointer-events:none; user-select:none;">DATA</div>
        
        <!-- Main title -->
        <div id="title" style="position:absolute; top:80px; left:100px; font-size:96px; font-weight:bold; color:#FFFFFF; text-shadow:0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.3); letter-spacing:8px;">
            居民存款
        </div>
        
        <!-- Data card -2 trillion -->
        <div id="data-card" style="position:absolute; top:200px; left:100px; background:rgba(26,26,46,0.8); border:2px solid rgba(255,64,129,0.4); border-radius:24px; padding:40px 60px; box-shadow:0 0 30px rgba(255,64,129,0.2);">
            <div style="font-size:24px; color:#999999; margin-bottom:20px; font-weight:regular;">两个月缩水</div>
            <div id="data-value" style="font-size:120px; font-weight:bold; color:#FFD700; font-family:'JetBrains Mono',monospace; text-shadow:0 0 20px rgba(255,215,0,0.5);">-2万亿</div>
        </div>
        
        <!-- Red neon arrow -->
        <div id="neon-arrow" style="position:absolute; top:400px; left:400px; width:300px; height:200px; transform:rotate(-30deg);">
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:250px; height:8px; background:#1a1a2e; box-shadow:0 0 20px #FF4081, 0 0 40px #FF4081;"></div>
            <div style="position:absolute; top:50%; right:0; transform:translateY(-50%); width:0; height:0; border-top:30px solid transparent; border-bottom:30px solid transparent; border-left:50px solid #FF4081; filter:drop-shadow(0 0 10px #FF4081);"></div>
        </div>
        
        <!-- Time decade grid -->
        <div style="position:absolute; bottom:150px; left:100px; width:600px; height:200px; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; width:100%; padding:10px 0;">
                <span style="color:#999999; font-size:16px;">2014</span>
                <span style="color:#999999; font-size:16px;">2024</span>
            </div>
            <div style="width:100%; height:4px; background:linear-gradient(90deg, rgba(0,212,255,0.3), rgba(255,64,129,0.3)); position:relative;">
                <div style="position:absolute; right:0; top:-10px; width:20px; height:20px; background:#1a1a2e; border-radius:50%; box-shadow:0 0 15px #FF4081;"></div>
            </div>
            <div style="font-size:20px; color:#00D4FF; margin-top:20px; text-shadow:0 0 10px rgba(0,212,255,0.5);">近10年首次连续下降</div>
        </div>
        
        <!-- Oral script text -->
        <div id="oral-text" style="position:absolute; bottom:100px; right:100px; width:500px; font-size:28px; color:#FFFFFF; line-height:1.6; text-align:right;">
            你绝对想不到，居民存款两个月缩水超二万亿，近一零年首次连续下降，老百姓的钱到底去哪了？
        </div>
        
        <!-- Additional data pill -->
        <div id="data-pill" style="position:absolute; top:100px; right:100px; background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:50px; padding:15px 30px; color:#FF4081; font-size:20px;">
            连续下降
        </div>
        
        <!-- Scan line effect -->
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.03) 3px, rgba(0,212,255,0.03) 4px); pointer-events:none;"></div>
        
        <!-- Particle drift (static representation) -->
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">
            <div style="position:absolute; top:30%; left:20%; width:4px; height:4px; background:#00D4FF; border-radius:50%; box-shadow:0 0 10px #00D4FF;"></div>
            <div style="position:absolute; top:60%; left:70%; width:3px; height:3px; background:#1a1a2e; border-radius:50%; box-shadow:0 0 8px #FF4081;"></div>
            <div style="position:absolute; top:80%; left:40%; width:5px; height:5px; background:#1a1a2e; border-radius:50%; box-shadow:0 0 12px #FFD700;"></div>
        </div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-1"] = gsap.timeline({paused: true});
        
        const tl = window.__timelines["beat-1"];
        
        tl.from("#title", {
            duration: 1.2,
            opacity: 0,
            x: -100,
            scale: 0.8,
            ease: "expo.out"
        }, 0);
        
        tl.from("#data-card", {
            duration: 1.5,
            opacity: 0,
            y: 80,
            scale: 0.9,
            ease: "expo.out"
        }, 0.15);
        
        tl.from("#data-value", {
            duration: 2,
            textContent: "0",
            snap: {textContent: 1000000000},
            ease: "power4.out",
            onUpdate: function() {
                const value = gsap.getProperty("#data-value", "textContent");
                const numericValue = parseInt(value) || 0;
                if (numericValue < -2000000000000) {
                    document.getElementById("data-value").textContent = "-2万亿";
                    tl.remove(this);
                }
            }
        }, 0.3);
        
        tl.from("#neon-arrow", {
            duration: 1.8,
            opacity: 0,
            x: -200,
            y: 100,
            scale: 0.7,
            ease: "expo.out"
        }, 0.45);
        
        tl.from("#oral-text", {
            duration: 1.4,
            opacity: 0,
            x: 80,
            ease: "expo.out"
        }, 0.6);
        
        tl.from("#data-pill", {
            duration: 1,
            opacity: 0,
            scale: 0.5,
            ease: "expo.out"
        }, 0.75);
        
        // Card breathing animation
        gsap.to("#data-card", {
            scale: 1.02,
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "power1.inOut",
            delay: 2
        });
        
        // Start timeline after a short delay
        setTimeout(() => {
            tl.play();
        }, 100);
    </script>
</body>
</html>
