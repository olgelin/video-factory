<!DOCTYPE html>
<html lang="zh" data-composition-id="beat-1" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <title>2026高校毕业生就业</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; font-family: 'Inter', 'Noto Sans SC', sans-serif;">
    <div class="scene" style="background:#1a1a2e;width: 100vw; height: 100vh; position: relative; overflow: hidden;">
        <!-- Decorative Layers -->
        <div class="grid-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,212,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.08) 1px, transparent 1px); background-size: 100px 100px; opacity: 0;"></div>
        <div class="glow-layer" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1200px; height: 1200px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, rgba(0,212,255,0) 70%); opacity: 0;"></div>
        <div class="ghost-text" style="position: absolute; top: 100px; left: -50px; font-family: 'JetBrains Mono', monospace; font-size: 250px; font-weight: bold; color: rgba(255,255,255,0.04); transform: rotate(-5deg); user-select: none; pointer-events: none; opacity: 0;">2026</div>
        <div class="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent); transform: translateY(-100%); opacity: 0;"></div>
        <!-- Corner Decorations -->
        <div style="position: absolute; top: 100px; left: 100px; width: 60px; height: 60px; border-left: 2px solid rgba(0,212,255,0.3); border-top: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>
        <div style="position: absolute; top: 100px; right: 100px; width: 60px; height: 60px; border-right: 2px solid rgba(0,212,255,0.3); border-top: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>
        <div style="position: absolute; bottom: 100px; left: 100px; width: 60px; height: 60px; border-left: 2px solid rgba(0,212,255,0.3); border-bottom: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>
        <div style="position: absolute; bottom: 100px; right: 100px; width: 60px; height: 60px; border-right: 2px solid rgba(0,212,255,0.3); border-bottom: 2px solid rgba(0,212,255,0.3); opacity: 0;"></div>

        <!-- Title Area -->
        <div class="title-area" style="position: absolute; top: 100px; left: 100px; width: calc(100% - 200px);">
            <h1 class="main-title" style="font-size: 96px; font-weight: bold; color: #00D4FF; margin: 0; text-shadow: 0 0 30px rgba(0,212,255,0.8); opacity: 0; transform: translateY(-50px);">2026高校毕业生就业</h1>
            <p class="subtitle" style="font-size: 32px; color: rgba(0,212,255,0.5); margin: 15px 0 0 0; opacity: 0; transform: translateY(-30px);">挑战与机遇并存的未来图景</p>
        </div>

        <!-- Core Content Area -->
        <div style="position: absolute; top: 250px; left: 100px; width: calc(100% - 200px); height: 500px; display: flex; gap: 40px;">
            <!-- Left Column (60%) -->
            <div style="flex: 0 0 60%; display: flex; flex-direction: column; gap: 30px;">
                <!-- Main Data Card -->
                <div class="data-card" style="background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; padding: 40px; position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; transform: translateY(60px) scale(0.9);">
                    <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent);"></div>
                    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top, rgba(0,212,255,0.08) 0%, transparent 70%); border-radius: 24px;"></div>
                    <div style="font-size: 24px; color: #999999; margin-bottom: 15px;">核心议题</div>
                    <div class="giant-question" style="font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: bold; color: #FFD700; line-height: 1; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,215,0,0.5);">?</div>
                    <div style="font-size: 30px; color: #FFFFFF; line-height: 1.6;">你绝对想不到，2026高校毕业生就业：挑战与机遇并存。这年头，毕业即失业？别急着下结论，咱们得细品背后的逻辑。</div>
                </div>
                <!-- Progress Bar -->
                <div style="background: rgba(26,26,46,0.5); border-radius: 16px; padding: 25px 30px; opacity: 0; transform: translateX(-30px);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <span style="font-size: 20px; color: #999999;">不确定性指数</span>
                        <span style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #FF4081;">78%</span>
                    </div>
                    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                        <div class="progress-fill" style="width: 78%; height: 100%; background: linear-gradient(90deg, #FF4081, #00D4FF); border-radius: 4px; transform: scaleX(0); transform-origin: left;"></div>
                    </div>
                </div>
            </div>

            <!-- Right Column (40%) -->
            <div style="flex: 0 0 40%; display: flex; flex-direction: column; gap: 25px;">
                <!-- Tag Pills -->
                <div class="tag-pill" style="background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 50px; padding: 15px 25px; display: inline-flex; align-items: center; gap: 10px; width: fit-content; opacity: 0; transform: translateX(-30px);">
                    <div style="width: 10px; height: 10px; background: #00D4FF; border-radius: 50%; box-shadow: 0 0 10px #00D4FF;"></div>
                    <span style="font-size: 24px; color: #FFFFFF;">就业市场剧变</span>
                </div>
                <div class="tag-pill" style="background: rgba(255,64,129,0.1); border: 1px solid rgba(255,64,129,0.3); border-radius: 50px; padding: 15px 25px; display: inline-flex; align-items: center; gap: 10px; width: fit-content; opacity: 0; transform: translateX(-30px);">
                    <div style="width: 10px; height: 10px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px #FF4081;"></div>
                    <span style="font-size: 24px; color: #FFFFFF;">技术重塑岗位</span>
                </div>
                <div class="tag-pill" style="background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 50px; padding: 15px 25px; display: inline-flex; align-items: center; gap: 10px; width: fit-content; opacity: 0; transform: translateX(-30px);">
                    <div style="width: 10px; height: 10px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px #FFD700;"></div>
                    <span style="font-size: 24px; color: #FFFFFF;">结构性机会涌现</span>
                </div>
                <!-- Small Info Card -->
                <div style="background: rgba(26,26,46,0.5); border-radius: 16px; padding: 30px; border-left: 3px solid #FFD700; opacity: 0; transform: translateX(30px);">
                    <div style="font-size: 18px; color: #999999; margin-bottom: 15px;">关键数据</div>
                    <div style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: bold; color: #FFD700; line-height: 1; margin-bottom: 10px;">2万亿</div>
                    <div style="font-size: 22px; color: #FFFFFF;">新经济领域潜在人才需求</div>
                </div>
            </div>
        </div>

        <!-- Bottom Info Area -->
        <div style="position: absolute; bottom: 100px; left: 100px; width: calc(100% - 200px); display: flex; justify-content: space-between; align-items: flex-end; opacity: 0;">
            <div style="font-size: 20px; color: #666666;">
                <span style="color: #00D4FF;">#</span> 未来趋势 · 2026就业前瞻
            </div>
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #666666;">
                <span style="color: #FF4081;">TREND</span> :: QUANTUM_ANALYSIS
            </div>
        </div>

        <!-- Particle Effects -->
        <div style="position: absolute; top: 200px; left: 1500px; width: 4px; height: 4px; background: #00D4FF; border-radius: 50%; box-shadow: 0 0 10px #00D4FF; opacity: 0;"></div>
        <div style="position: absolute; top: 500px; left: 300px; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 8px #FF4081; opacity: 0;"></div>
        <div style="position: absolute; top: 700px; left: 900px; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 6px #FFD700; opacity: 0;"></div>
        <div style="position: absolute; top: 350px; left: 1600px; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 8px #FFFFFF; opacity: 0;"></div>
        <div style="position: absolute; top: 600px; left: 200px; width: 4px; height: 4px; background: #00D4FF; border-radius: 50%; box-shadow: 0 0 10px #00D4FF; opacity: 0;"></div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["beat-1"] = tl;

        // Decorative layers - appear first
        tl.from(".grid-layer", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0);
        tl.from(".glow-layer", { opacity: 0, scale: 0.8, duration: 2, ease: "power1.inOut" }, 0);
        tl.from(".ghost-text", { opacity: 0, duration: 1.5, ease: "power1.inOut" }, 0.15);
        tl.from(".scan-line", { y: "100vh", duration: 4, ease: "none" }, 0.3);

        // Corner decorations
        tl.from("div[style*='border-left: 2px solid rgba(0,212,255,0.3)']", { opacity: 0, duration: 0.8, ease: "power2.out" }, 0.45);
        tl.from("div[style*='border-right: 2px solid rgba(0,212,255,0.3)']", { opacity: 0, duration: 0.8, ease: "power2.out" }, 0.6);

        // Title area - SLAMS in
        tl.from(".main-title", { y: -50, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.75);
        tl.from(".subtitle", { y: -30, opacity: 0, duration: 0.7, ease: "power2.out" }, 0.9);

        // Core content - main card FLOATS in
        tl.from(".data-card", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 1.05);

        // Progress bar scales in
        tl.from(".progress-fill", { scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut" }, 1.2);

        // Tag pills DROPS in from side
        tl.from(".tag-pill", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.15 }, 1.2);

        // Bottom info fades in last
        tl.from("div[style*='bottom: 100px; left: 100px; width: calc(100% - 200px)']", { opacity: 0, y: 20, duration: 0.8, ease: "power2.out" }, 1.5);

        // Particle drift animations
        tl.from("div[style*='background: #00D4FF; border-radius: 50%; box-shadow: 0 0 10px #00D4FF']", { opacity: 0, duration: 1.5, ease: "power1.inOut" }, 0.5);
        tl.from("div[style*='background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 8px #FF4081']", { opacity: 0, duration: 1.5, ease: "power1.inOut" }, 0.65);
        tl.from("div[style*='background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 6px #FFD700']", { opacity: 0, duration: 1.5, ease: "power1.inOut" }, 0.8);
        tl.from("div[style*='background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 8px #FFFFFF']", { opacity: 0, duration: 1.5, ease: "power1.inOut" }, 0.95);

        // Breathing animations (only specific elements)
        gsap.to(".data-card", { scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut" });
        gsap.to(".main-title", { textShadow: "0 0 30px rgba(0,212,255,0.5)", duration: 2.5, repeat: 0, yoyo: true, ease: "sine.inOut" });
        gsap.to(".glow-layer", { x: "random(-20, 20)", y: "random(-20, 20)", duration: 10, repeat: 0, ease: "none" });

        // Play the timeline
        tl.play();
    </script>
</body>
</html>
