<body style="margin:0; padding:0; background:#0a0a0a; font-family:'Noto Sans SC','PingFang SC',sans-serif; overflow:hidden;">

                    <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#00D4FF,transparent);"></div>
                    <div style="position:absolute; top:0; left:0; right:0; bottom:0; background:radial-gradient(circle at top,rgba(0,212,255,0.08),transparent 70%);"></div>
                    <div style="font-family:'JetBrains Mono',monospace; font-size:48px; font-weight:bold; color:#FFD700; position:relative;">10,000+</div>
                    <div style="font-size:24px; color:#999999; margin-top:8px; position:relative;">性能提升参数</div>
                    <div style="position:absolute; top:20px; right:20px; font-size:16px; color:#FF4081; background:rgba(255,64,129,0.1); padding:4px 12px; border-radius:12px; border:1px solid rgba(255,64,129,0.3);">+300%</div>
                </div>
                
                <!-- Data Card 2 -->
                <div style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:24px; padding:40px; position:relative; overflow:hidden;">
                    <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#FF4081,transparent);"></div>

                </div>
            </div>
            
            <!-- Right Column - Progress & Tags -->

                    <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#00D4FF,transparent);"></div>
                    <div style="font-size:24px; color:#999999; margin-bottom:24px;">训练进度</div>
                    <div style="height:12px; background:rgba(0,212,255,0.1); border-radius:6px; overflow:hidden;">
                        <div style="width:85%; height:100%; background:linear-gradient(90deg,#00D4FF,#FF4081); border-radius:6px; transform-origin:left;"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:16px;">
                        <div style="font-family:'JetBrains Mono',monospace; font-size:20px; color:#00D4FF;">85%</div>
                        <div style="font-family:'JetBrains Mono',monospace; font-size:20px; color:#FFD700;">剩余 320T FLOPS</div>
                    </div>
                </div>
                
                <!-- Tag Pills -->
                <div style="display:flex; flex-wrap:wrap; gap:16px;">
                    <div style="padding:12px 24px; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:100px; font-size:20px; color:#00D4FF; letter-spacing:1px;">多模态理解</div>
                    <div style="padding:12px 24px; background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:100px; font-size:20px; color:#FF4081; letter-spacing:1px;">实时推理</div>
                    <div style="padding:12px 24px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); border-radius:100px; font-size:20px; color:#FFD700; letter-spacing:1px;">自主代理</div>
                </div>
                
                <!-- Quote Card -->
                <div style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:24px; padding:40px; position:relative; overflow:hidden;">
                    <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#FFD700,transparent);"></div>

        <!-- Bottom Info Area -->
        <div style="position:absolute; bottom:100px; left:100px; right:100px; display:flex; justify-content:space-between; align-items:center;">
            <div style="font-family:'JetBrains Mono',monospace; font-size:18px; color:#666666;">2024.06.15 00:00:00 UTC</div>
            <div style="font-size:18px; color:#999999; display:flex; gap:32px;">
                <span>OpenAI</span>
                <span>·</span>
                <span>GPT系列</span>
                <span>·</span>
                <span>人工智能突破</span>
            </div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:18px; color:#00D4FF;">v5.0.0-rc1</div>
        </div>
        
        <!-- Floating Particles -->
        <div style="position:absolute; top:20%; left:15%; width:4px; height:4px; background:rgba(0,212,255,0.6); border-radius:50%;"></div>
        <div style="position:absolute; top:40%; left:75%; width:3px; height:3px; background:rgba(255,64,129,0.6); border-radius:50%;"></div>
        <div style="position:absolute; top:70%; left:30%; width:5px; height:5px; background:rgba(255,215,0,0.6); border-radius:50%;"></div>
        <div style="position:absolute; top:60%; left:85%; width:3px; height:3px; background:rgba(0,212,255,0.6); border-radius:50%;"></div>
        <div style="position:absolute; top:30%; left:50%; width:4px; height:4px; background:rgba(255,215,0,0.6); border-radius:50%;"></div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        
        gsap.registerEffect({
            name: "fadeIn",
            effect: (targets, config) => {
                return gsap.from(targets, {
                    opacity: 0,
                    duration: config.duration,
                    ease: config.ease
                });
            },
            defaults: {duration: 1, ease: "power2.out"}
        });
        
        const tl = gsap.timeline({paused: true});
        
        // Background layers appear first
        tl.from(".scene > div:nth-child(1)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
        tl.from(".scene > div:nth-child(2)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15);
        tl.from(".scene > div:nth-child(3)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3);
        
        // Ghost text watermark
        tl.from(".scene > div:nth-child(4)", {opacity: 0, duration: 1, ease: "power2.out"}, 0.45);
        
        // Corner decorations
        tl.from(".scene > div:nth-child(5), .scene > div:nth-child(6), .scene > div:nth-child(7), .scene > div:nth-child(8)", 
               {opacity: 0, duration: 0.8, ease: "power2.out", stagger: 0.1}, 0.6);
        
        // Main title
        tl.from(".scene > div:nth-child(9)", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.75);
        
        // Core content area
        tl.from(".scene > div:nth-child(10)", {opacity: 0, duration: 0.8, ease: "power2.out"}, 0.9);
        
        // Data cards with stagger
        tl.from(".scene > div:nth-child(10) > div:nth-child(1) > div", 
               {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)", stagger: 0.15}, 1.05);
        
        // Right column elements
        tl.from(".scene > div:nth-child(10) > div:nth-child(2) > div", 
               {x: 30, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.1}, 1.2);
        
        // Tag pills
        tl.from(".scene > div:nth-child(10) > div:nth-child(2) > div:nth-child(2) > div", 
               {scale: 0.8, opacity: 0, duration: 0.5, ease: "back.out(1.7)", stagger: 0.08}, 1.5);
        
        // Bottom info area
        tl.from(".scene > div:nth-child(11)", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.8);
        
        // Floating particles
        tl.from(".scene > div:nth-child(12), .scene > div:nth-child(13), .scene > div:nth-child(14), .scene > div:nth-child(15), .scene > div:nth-child(16)", 
               {opacity: 0, duration: 1.5, ease: "power1.inOut", stagger: 0.2}, 2.0);
        
        // Register timeline
        window.__timelines["beat-1"] = tl;
        
        // Breathing animations
        // Main title breathing
        gsap.to(".scene > div:nth-child(9) > div:first-child", {
            textShadow: "0 0 60px rgba(0,212,255,1),0 0 100px rgba(0,212,255,0.6)",
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Data card breathing
        gsap.to(".scene > div:nth-child(10) > div:nth-child(1) > div:first-child", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Background glow breathing
        gsap.to(".scene > div:nth-child(2)", {
            scale: 1.1,
            duration: 10,
            repeat: 0,
            yoyo: true,
            ease: "none"
        });
        
        // Floating particles animation
        gsap.to(".scene > div:nth-child(12)", {
            y: -20,
            x: 10,
            duration: 8,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to(".scene > div:nth-child(13)", {
            y: 15,
            x: -15,
            duration: 12,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to(".scene > div:nth-child(14)", {
            y: -10,
            x: 5,
            duration: 10,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to(".scene > div:nth-child(15)", {
            y: 20,
            x: -10,
            duration: 9,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to(".scene > div:nth-child(16)", {
            y: -15,
            x: 8,
            duration: 11,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Start timeline
        tl.play();
        
        // CSS animation for scanline
        const style = document.createElement('style');
        style.textContent = `@keyframes scanline {0% {top: -2px;} 100% {top: 1082px;}}`;
        document.head.appendChild(style);
    </script>
</body>
