<!DOCTYPE html>
<html data-composition-id="beat-2" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
<meta charset="UTF-8">
<title>HyperFrames Scene</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a; overflow: hidden;">
<div class="scene" style="background:#1a1a2e;position: relative; width: 1920px; height: 1080px; background: #0a0a0a; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #FFFFFF; overflow: hidden;">

    <!-- Background Grid Layer -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px); background-size: 100px 100px; z-index: 1;" id="gridLayer"></div>

    <!-- Radial Glow Layer -->
    <div style="position: absolute; top: 50%; left: 40%; width: 800px; height: 800px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(0, 212, 255, 0.12) 0%, transparent 70%); z-index: 2; pointer-events: none;" id="glowLayer"></div>

    <!-- Ghost Text Watermarks -->
    <div style="position: absolute; top: 150px; left: -50px; font-family: 'JetBrains Mono', monospace; font-size: 280px; font-weight: bold; color: rgba(255, 255, 255, 0.03); line-height: 1; z-index: 3; pointer-events: none; user-select: none;" id="ghostText1">突破</div>
    <div style="position: absolute; top: 400px; right: -80px; font-family: 'JetBrains Mono', monospace; font-size: 240px; font-weight: bold; color: rgba(255, 255, 255, 0.04); line-height: 1; z-index: 3; pointer-events: none; user-select: none; text-align: right;" id="ghostText2">极限</div>
    <div style="position: absolute; bottom: 150px; left: 200px; font-family: 'JetBrains Mono', monospace; font-size: 180px; font-weight: bold; color: rgba(255, 64, 129, 0.035); line-height: 1; z-index: 3; pointer-events: none; user-select: none;" id="ghostText3">科技圈</div>

    <!-- Scanning Line -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.25), transparent); z-index: 4; transform: translateY(-10px);" id="scanLine"></div>

    <!-- Main Title -->
    <div style="position: absolute; top: 100px; left: 120px; font-size: 96px; font-weight: bold; color: #00D4FF; text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.4); z-index: 10;" id="mainTitle">GPT-5</div>

    <!-- Core Data Card -->
    <div style="position: absolute; top: 260px; left: 120px; width: 720px; padding: 40px; background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 24px; z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.4);" id="dataCard">
        <div style="position: absolute; top: 0; left: 20px; right: 20px; height: 3px; background: linear-gradient(90deg, #00D4FF, rgba(0, 212, 255, 0)); border-radius: 3px;"></div>
        <div style="font-size: 28px; color: #999999; margin-bottom: 16px;">核心突破</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: bold; color: #FFD700; line-height: 1.1; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);">捅了个</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 100px; font-weight: bold; color: #FF4081; line-height: 1; text-shadow: 0 0 25px rgba(255, 64, 129, 0.6); margin-top: -10px;">窟窿</div>
        <div style="position: absolute; bottom: 40px; right: 40px; font-size: 40px; color: #FFD700;">↗</div>
    </div>

    <!-- Speech Bubble / Quote -->
    <div style="position: absolute; top: 280px; right: 120px; width: 640px; padding: 40px; background: rgba(26, 26, 46, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255, 64, 129, 0.2); border-radius: 20px; font-size: 32px; line-height: 1.6; color: #FFFFFF; z-index: 10;">
        说白了，这次GPT-5的发布，直接把AI的天花板又捅了个窟窿。OpenAI这次玩真的，不搞虚的，整个科技圈都<b style="color: #FF4081;">炸了锅</b>。
        <div style="position: absolute; top: -20px; left: 40px; background:#1a1a2e; color: #0a0a0a; padding: 8px 24px; border-radius: 12px; font-size: 20px; font-weight: bold;">行业震动</div>
    </div>

    <!-- Tags / Pills -->
    <div style="position: absolute; top: 200px; left: 880px; display: flex; flex-direction: column; gap: 24px; z-index: 10;">
        <div style="display: inline-flex; padding: 12px 28px; background: rgba(0, 212, 255, 0.15); border: 1px solid rgba(0, 212, 255, 0.4); border-radius: 50px; font-size: 28px; color: #00D4FF;" id="tag1">突破极限</div>
        <div style="display: inline-flex; padding: 12px 28px; background: rgba(255, 64, 129, 0.15); border: 1px solid rgba(255, 64, 129, 0.4); border-radius: 50px; font-size: 28px; color: #FF4081;" id="tag2">能力飞跃</div>
        <div style="display: inline-flex; padding: 12px 28px; background: rgba(255, 215, 0, 0.15); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 50px; font-size: 28px; color: #FFD700;" id="tag3">AI革命</div>
    </div>

    <!-- Bottom Info Bar -->
    <div style="position: absolute; bottom: 100px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: center; z-index: 10;" id="bottomBar">
        <div style="display: flex; align-items: center; gap: 40px;">
            <div style="padding: 16px 32px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px;">
                <div style="font-size: 20px; color: #999999;">发布者</div>
                <div style="font-size: 28px; font-weight: bold; color: #00D4FF;">OpenAI</div>
            </div>
            <div style="padding: 16px 32px; background: rgba(255, 64, 129, 0.1); border: 1px solid rgba(255, 64, 129, 0.3); border-radius: 16px;">
                <div style="font-size: 20px; color: #999999;">震动指数</div>
                <div style="font-size: 28px; font-weight: bold; color: #FF4081;">极高</div>
            </div>
            <div style="padding: 16px 32px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 16px;">
                <div style="font-size: 20px; color: #999999;">影响领域</div>
                <div style="font-size: 28px; font-weight: bold; color: #FFD700;">全科技圈</div>
            </div>
        </div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #666666;">2024.05.15</div>
    </div>

    <!-- Decorative Corner Lines -->
    <div style="position: absolute; top: 100px; left: 100px; width: 40px; height: 40px; border-left: 2px solid rgba(0, 212, 255, 0.3); border-top: 2px solid rgba(0, 212, 255, 0.3); z-index: 5;" id="corner1"></div>
    <div style="position: absolute; top: 100px; right: 100px; width: 40px; height: 40px; border-right: 2px solid rgba(0, 212, 255, 0.3); border-top: 2px solid rgba(0, 212, 255, 0.3); z-index: 5;" id="corner2"></div>
    <div style="position: absolute; bottom: 100px; left: 100px; width: 40px; height: 40px; border-left: 2px solid rgba(255, 64, 129, 0.3); border-bottom: 2px solid rgba(255, 64, 129, 0.3); z-index: 5;" id="corner3"></div>
    <div style="position: absolute; bottom: 100px; right: 100px; width: 40px; height: 40px; border-right: 2px solid rgba(255, 64, 129, 0.3); border-bottom: 2px solid rgba(255, 64, 129, 0.3); z-index: 5;" id="corner4"></div>

    <!-- Particle Dots (Placeholder, would be animated) -->
    <div style="position: absolute; top: 20%; left: 30%; width: 4px; height: 4px; background: #00D4FF; border-radius: 50%; z-index: 6;" id="particle1"></div>
    <div style="position: absolute; top: 40%; left: 70%; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%; z-index: 6;" id="particle2"></div>
    <div style="position: absolute; top: 60%; left: 50%; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; z-index: 6;" id="particle3"></div>

</div>

<script>
    // Register timeline
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({paused: true});
    window.__timelines["beat-2"] = tl;

    // 1. Background decorations fade in
    tl.from("#gridLayer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
    tl.from("#glowLayer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.1);
    tl.from("#scanLine", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.2);

    // 2. Ghost Text Fade in
    tl.from("#ghostText1", {opacity: 0, duration: 1, ease: "power2.out"}, 0.3);
    tl.from("#ghostText2", {opacity: 0, duration: 1, ease: "power2.out"}, 0.45);
    tl.from("#ghostText3", {opacity: 0, duration: 1, ease: "power2.out"}, 0.6);

    // 3. Main Title
    tl.from("#mainTitle", {x: -80, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.8);

    // 4. Core Data Card
    tl.from("#dataCard", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 0.95);

    // 5. Speech Bubble & Tags
    tl.from("#quote", {x: 50, opacity: 0, duration: 0.6, ease: "power2.out"}, 1.1);
    tl.from("#tag1", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.25);
    tl.from("#tag2", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.4);
    tl.from("#tag3", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.55);

    // 6. Bottom Info & Corners
    tl.from("#bottomBar", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.7);
    tl.from("#corner1", {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 1.8);
    tl.from("#corner2", {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 1.85);
    tl.from("#corner3", {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 1.9);
    tl.from("#corner4", {opacity: 0, scale: 0.8, duration: 0.5, ease: "power2.out"}, 1.95);

    // 7. Particles fade in last
    tl.from("#particle1", {opacity: 0, duration: 0.4}, 2.0);
    tl.from("#particle2", {opacity: 0, duration: 0.4}, 2.05);
    tl.from("#particle3", {opacity: 0, duration: 0.4}, 2.1);

    // Add Breathing Animations (post timeline)
    gsap.to("#dataCard", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 2.5});
    gsap.to("#mainTitle", {textShadow: "0 0 40px rgba(0, 212, 255, 1), 0 0 80px rgba(0, 212, 255, 0.6)", opacity: 0.9, duration: 2.5, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 2.5});
    gsap.to("#glowLayer", {x: 50, y: 30, duration: 10, repeat: 0, yoyo: true, ease: "none"});
    gsap.to("#tag1", {borderColor: "rgba(0, 212, 255, 0.8)", duration: 2, repeat: 0, yoyo: true, ease: "sine.inOut"});
    gsap.to("#scanLine", {y: 1080, duration: 5, repeat: 0, ease: "none", delay: 2});

    // Particles drift
    gsap.to("#particle1", {y: -200, x: -100, duration: 8, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 2.2});
    gsap.to("#particle2", {y: 150, x: 80, duration: 10, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 2.4});
    gsap.to("#particle3", {y: -100, x: 120, duration: 12, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 2.6});
</script>
</body>
</html>
