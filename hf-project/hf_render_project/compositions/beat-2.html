<!DOCTYPE html>
<html data-composition-id="beat-2" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-2"] = gsap.timeline({paused: true});
    </script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background: #0a0a0a;">
    <div class="scene" style="background:#1a1a2e;position: relative; width: 1920px; height: 1080px; background: #0a0a0a; overflow: hidden;">
        
        <!-- Grid Background -->
        <div id="grid" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: 
            linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px); background-size: 100px 100px; opacity: 0.3;"></div>
        
        <!-- Central Glow -->
        <div id="centralGlow" style="position: absolute; top: 25%; left: 30%; width: 600px; height: 400px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(40px);"></div>
        
        <!-- Ghost Text -->
        <div id="ghostText" style="position: absolute; top: 20%; left: 10%; font-family: 'JetBrains Mono', monospace; font-size: 280px; font-weight: bold; color: rgba(255,255,255,0.03); letter-spacing: 20px;">+300%</div>
        <div id="ghostText2" style="position: absolute; bottom: 10%; right: 10%; font-family: 'JetBrains Mono', monospace; font-size: 220px; font-weight: bold; color: rgba(255,255,255,0.03); letter-spacing: 15px;">-50%</div>
        
        <!-- Scanline -->
        <div id="scanline" style="position: absolute; top: -2px; left: 0; width: 100%; height: 2px; background: rgba(0,212,255,0.2);"></div>
        
        <!-- Particle Points -->
        <div id="particle1" style="position: absolute; top: 30%; left: 25%; width: 3px; height: 3px; background: #00D4FF; border-radius: 50%; opacity: 0.6;"></div>
        <div id="particle2" style="position: absolute; top: 65%; left: 70%; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%; opacity: 0.5;"></div>
        <div id="particle3" style="position: absolute; top: 45%; left: 50%; width: 4px; height: 4px; background:#1a1a2e; border-radius: 50%; opacity: 0.4;"></div>
        
        <!-- Corner Decorations -->
        <div id="cornerTopLeft" style="position: absolute; top: 100px; left: 100px; width: 60px; height: 2px; background: rgba(0,212,255,0.3);"></div>
        <div id="cornerTopLeft2" style="position: absolute; top: 100px; left: 100px; width: 2px; height: 60px; background: rgba(0,212,255,0.3);"></div>
        <div id="cornerTopRight" style="position: absolute; top: 100px; right: 100px; width: 60px; height: 2px; background: rgba(0,212,255,0.3);"></div>
        <div id="cornerTopRight2" style="position: absolute; top: 100px; right: 100px; width: 2px; height: 60px; background: rgba(0,212,255,0.3);"></div>
        
        <!-- Title Area -->
        <div id="mainTitle" style="position: absolute; top: 80px; left: 100px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 96px; font-weight: bold; color: #FFFFFF; text-shadow: 0 0 30px rgba(0,212,255,0.7); line-height: 1.1;">2026股市展望</div>
        <div id="subTitle" style="position: absolute; top: 190px; left: 100px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 32px; font-weight: regular; color: rgba(0,212,255,0.8);">机遇与风险并存 · 科技革命进行时</div>
        
        <!-- Left Data Block -->
        <div id="leftCard" style="position: absolute; top: 250px; left: 100px; width: 900px; height: 500px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
            <!-- Top Highlight Bar -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent); border-radius: 24px 24px 0 0;"></div>
            <!-- Inner Glow -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top, rgba(0,212,255,0.08), transparent 60%); border-radius: 24px;"></div>
            
            <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 28px; color: rgba(255,255,255,0.7); margin-bottom: 20px;">AI & 量子计算板块</div>
            <div id="bigNumber" style="font-family: 'JetBrains Mono', monospace; font-size: 140px; font-weight: bold; color: #00FF88; text-shadow: 0 0 40px rgba(0,255,136,0.5); margin: 20px 0;">+300%</div>
            <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 24px; color: #FFD700; display: flex; align-items: center;">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" style="margin-right: 10px;">
                    <path d="M15 5 L25 20 L5 20 Z" fill="#FFD700"/>
                </svg>
                预计暴涨
            </div>
            
            <!-- Light Column -->
            <div style="position: absolute; top: 40px; right: 40px; width: 40px; height: 420px; background: linear-gradient(to top, #00FF88, rgba(0,255,136,0.1)); border-radius: 4px; opacity: 0.7;"></div>
            <!-- Arrow -->
            <div style="position: absolute; top: 30px; right: 45px; width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 30px solid #00FF88;"></div>
        </div>
        
        <!-- Right Data Block -->
        <div id="rightCard" style="position: absolute; top: 250px; right: 100px; width: 500px; height: 500px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,64,129,0.3); border-radius: 24px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
            <!-- Top Highlight Bar -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #FF4081, transparent); border-radius: 24px 24px 0 0;"></div>
            <!-- Inner Glow -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top, rgba(255,64,129,0.08), transparent 60%); border-radius: 24px;"></div>
            
            <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 28px; color: rgba(255,255,255,0.7); margin-bottom: 20px;">传统能源板块</div>
            <div id="bigNumber2" style="font-family: 'JetBrains Mono', monospace; font-size: 140px; font-weight: bold; color: #FF4081; text-shadow: 0 0 40px rgba(255,64,129,0.5); margin: 20px 0;">-50%</div>
            <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 24px; color: #FF4081; display: flex; align-items: center;">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" style="margin-right: 10px; transform: rotate(180deg);">
                    <path d="M15 5 L25 20 L5 20 Z" fill="#FF4081"/>
                </svg>
                预计腰斩
            </div>
            
            <!-- Light Column -->
            <div style="position: absolute; top: 40px; right: 40px; width: 40px; height: 420px; background: linear-gradient(to bottom, #FF4081, rgba(255,64,129,0.1)); border-radius: 4px; opacity: 0.7;"></div>
            <!-- Arrow -->
            <div style="position: absolute; bottom: 30px; right: 45px; width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 30px solid #FF4081;"></div>
        </div>
        
        <!-- Comparison Line -->
        <div id="compLine" style="position: absolute; top: 250px; left: 50%; width: 2px; height: 500px; background: linear-gradient(to bottom, rgba(0,212,255,0.4), rgba(255,64,129,0.4)); transform: translateX(-50%);"></div>
        
        <!-- Data Particles -->
        <div id="particle4" style="position: absolute; top: 300px; left: 350px; width: 6px; height: 6px; background: #00FF88; border-radius: 50%; opacity: 0.8;"></div>
        <div id="particle5" style="position: absolute; top: 400px; left: 600px; width: 4px; height: 4px; background:#1a1a2e; border-radius: 50%; opacity: 0.7;"></div>
        <div id="particle6" style="position: absolute; top: 500px; right: 250px; width: 5px; height: 5px; background:#1a1a2e; border-radius: 50%; opacity: 0.6;"></div>
        <div id="particle7" style="position: absolute; top: 650px; left: 200px; width: 3px; height: 3px; background: #00D4FF; border-radius: 50%; opacity: 0.5;"></div>
        
        <!-- Bottom Info Area -->
        <div id="bottomArea" style="position: absolute; bottom: 100px; left: 100px; width: 1720px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div id="tag1" style="display: inline-block; padding: 12px 24px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 20px; color: #00D4FF; margin-right: 20px;">科技革命</div>
                    <div id="tag2" style="display: inline-block; padding: 12px 24px; background: rgba(255,64,129,0.1); border: 1px solid rgba(255,64,129,0.3); border-radius: 24px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 20px; color: #FF4081;">传统衰退</div>
                    <div id="tag3" style="display: inline-block; padding: 12px 24px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 24px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 20px; color: #FFD700; margin-left: 20px;">数据分化</div>
                </div>
                <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 18px; color: rgba(255,255,255,0.5);">
                    数据来源：2026全球股市展望报告 | 预测模型
                </div>
            </div>
        </div>
        
        <!-- Additional Decorative Lines -->
        <div style="position: absolute; top: 800px; left: 100px; width: 1720px; height: 1px; background: linear-gradient(90deg, rgba(0,212,255,0.2), rgba(255,64,129,0.2), rgba(255,215,0,0.2));"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tl = window.__timelines["beat-2"];
            
            // Entry animations with 0.15s stagger
            tl.from("#grid", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0)
              .from("#centralGlow", {opacity: 0, scale: 0.8, duration: 1.5, ease: "power1.inOut"}, 0.15)
              .from("#ghostText", {opacity: 0, y: 20, duration: 1, ease: "power1.inOut"}, 0.3)
              .from("#ghostText2", {opacity: 0, y: -20, duration: 1, ease: "power1.inOut"}, 0.45)
              .from("#mainTitle", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.6)
              .from("#subTitle", {y: -30, opacity: 0, duration: 0.7, ease: "power2.out"}, 0.75)
              .from("#leftCard", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 0.9)
              .from("#rightCard", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.05)
              .from("#compLine", {scaleY: 0, transformOrigin: "top", duration: 1, ease: "power2.inOut"}, 1.2)
              .from("#tag1", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.35)
              .from("#tag2", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.5)
              .from("#tag3", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.65)
              .from("#bottomArea", {opacity: 0, y: 20, duration: 0.6, ease: "power2.out"}, 1.8)
              .from("#scanline", {y: -2, duration: 6, ease: "none", repeat: 0}, 0)
              .from("#cornerTopLeft", {opacity: 0, duration: 0.8}, 0.4)
              .from("#cornerTopLeft2", {opacity: 0, duration: 0.8}, 0.5)
              .from("#cornerTopRight", {opacity: 0, duration: 0.8}, 0.6)
              .from("#cornerTopRight2", {opacity: 0, duration: 0.8}, 0.7)
              .from("#particle1", {opacity: 0, duration: 0.5}, 0.8)
              .from("#particle2", {opacity: 0, duration: 0.5}, 0.9)
              .from("#particle3", {opacity: 0, duration: 0.5}, 1.0)
              .from("#particle4", {opacity: 0, duration: 0.5}, 1.1)
              .from("#particle5", {opacity: 0, duration: 0.5}, 1.2)
              .from("#particle6", {opacity: 0, duration: 0.5}, 1.3)
              .from("#particle7", {opacity: 0, duration: 0.5}, 1.4);
            
            // Breathing animations
            gsap.to("#leftCard", {
                scale: 1.015,
                duration: 3,
                ease: "sine.inOut",
                repeat: 0,
                yoyo: true
            });
            
            gsap.to("#rightCard", {
                scale: 1.015,
                duration: 3,
                ease: "sine.inOut",
                repeat: 0,
                yoyo: true
            });
            
            // Title glow pulse
            gsap.to("#mainTitle", {
                textShadow: "0 0 40px rgba(0,212,255,0.9)",
                duration: 2.5,
                ease: "sine.inOut",
                repeat: 0,
                yoyo: true
            });
            
            // Background glow movement
            gsap.to("#centralGlow", {
                x: 20,
                y: 15,
                duration: 10,
                ease: "sine.inOut",
                repeat: 0,
                yoyo: true
            });
            
            // Tag border pulse
            gsap.to("#tag1", {
                borderColor: "rgba(0,212,255,0.6)",
                duration: 2,
                ease: "sine.inOut",
                repeat: 0,
                yoyo: true
            });
            
            // Particle movements
            gsap.to("#particle1", {y: 20, duration: 8, ease: "sine.inOut", repeat: 0, yoyo: true});
            gsap.to("#particle2", {y: -15, duration: 10, ease: "sine.inOut", repeat: 0, yoyo: true});
            gsap.to("#particle3", {x: 25, y: -10, duration: 12, ease: "sine.inOut", repeat: 0, yoyo: true});
            gsap.to("#particle4", {y: 30, duration: 7, ease: "sine.inOut", repeat: 0, yoyo: true});
            gsap.to("#particle5", {x: -20, y: 15, duration: 9, ease: "sine.inOut", repeat: 0, yoyo: true});
            gsap.to("#particle6", {x: 15, y: 20, duration: 11, ease: "sine.inOut", repeat: 0, yoyo: true});
            gsap.to("#particle7", {x: -10, y: -25, duration: 13, ease: "sine.inOut", repeat: 0, yoyo: true});
            
            // Start the timeline
            tl.play();
        });
    </script>
</body>
</html>
