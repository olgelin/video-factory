<!DOCTYPE html>
<html lang="en" data-composition-id="beat-2" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        window.__timelines = window.__timelines || {};
    </script>
</head>
<body style="margin:0;padding:0;overflow:hidden;background:#1a1a2e;">
    <div class="scene" style="background:#1a1a2e;position: relative; width: 1920px; height: 1080px; overflow: hidden; background-color: #1a1a2e;">
        <!-- Background Decoration Layers -->
        <div id="grid-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,212,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.08) 1px, transparent 1px); background-size: 100px 100px; pointer-events: none;"></div>
        <div id="radial-glow" style="position: absolute; top: 200px; left: 500px; width: 800px; height: 800px; background: radial-gradient(circle, rgba(0,212,255,0.12), transparent 70%); pointer-events: none;"></div>
        <div id="ghost-text" style="position: absolute; top: 300px; left: 300px; font-family: 'JetBrains Mono', monospace; font-size: 300px; font-weight: bold; color: rgba(255,255,255,0.04); pointer-events: none;">2200万</div>
        
        <!-- Scanning Line -->
        <div id="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,212,255,0.2); pointer-events: none;"></div>
        
        <!-- Particle Dots -->
        <div id="particle1" style="position: absolute; width: 4px; height: 4px; background: #00D4FF; border-radius: 50%; top: 150px; left: 250px; pointer-events: none;"></div>
        <div id="particle2" style="position: absolute; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%; top: 400px; left: 800px; pointer-events: none;"></div>
        <div id="particle3" style="position: absolute; width: 4px; height: 4px; background:#1a1a2e; border-radius: 50%; top: 600px; left: 1200px; pointer-events: none;"></div>
        <div id="particle4" style="position: absolute; width: 2px; height: 2px; background: #00D4FF; border-radius: 50%; top: 250px; left: 1500px; pointer-events: none;"></div>
        <div id="particle5" style="position: absolute; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%; top: 700px; left: 600px; pointer-events: none;"></div>
        
        <!-- Corner Decorations -->
        <div id="corner-tl" style="position: absolute; top: 100px; left: 100px; width: 40px; height: 40px; border-left: 2px solid rgba(0,212,255,0.3); border-top: 2px solid rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div id="corner-tr" style="position: absolute; top: 100px; right: 100px; width: 40px; height: 40px; border-right: 2px solid rgba(0,212,255,0.3); border-top: 2px solid rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div id="corner-bl" style="position: absolute; bottom: 100px; left: 100px; width: 40px; height: 40px; border-left: 2px solid rgba(0,212,255,0.3); border-bottom: 2px solid rgba(0,212,255,0.3); pointer-events: none;"></div>
        <div id="corner-br" style="position: absolute; bottom: 100px; right: 100px; width: 40px; height: 40px; border-right: 2px solid rgba(0,212,255,0.3); border-bottom: 2px solid rgba(0,212,255,0.3); pointer-events: none;"></div>
        
        <!-- Main Title -->
        <div id="main-title" style="position: absolute; top: 120px; left: 160px; font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 96px; font-weight: bold; color: #00D4FF; text-shadow: 0 0 30px rgba(0,212,255,0.8);">2026毕业生就业冲击</div>
        
        <!-- Core Data Cards -->
        <div id="data-card-graduates" style="position: absolute; top: 250px; left: 160px; width: 420px; padding: 30px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent); border-radius: 24px 24px 0 0;"></div>
            <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 18px; color: #999999;">全球高校毕业生预计</div>
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: bold; color: #FFD700; line-height: 1; margin-top: 10px;">2200万+</div>
            <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 24px; color: #FF4081; margin-top: 10px;">↑ 历史新高</div>
        </div>
        
        <div id="data-card-employment" style="position: absolute; top: 250px; left: 620px; width: 420px; padding: 30px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,64,129,0.3); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #FF4081, transparent); border-radius: 24px 24px 0 0;"></div>
            <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 18px; color: #999999;">就业率可能只有</div>
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: bold; color: #FF4081; line-height: 1; margin-top: 10px;">65%</div>
            <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 24px; color: #FFD700; margin-top: 10px;">↓ 下降趋势</div>
            <div id="progress-bar-bg" style="width: 100%; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px;">
                <div id="progress-bar-fill" style="width: 65%; height: 100%; background: linear-gradient(90deg, #FF4081, #FFD700); border-radius: 10px;"></div>
            </div>
        </div>
        
        <!-- Auxiliary Data Area -->
        <div id="aux-data" style="position: absolute; top: 250px; right: 160px; width: 350px;">
            <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 24px; color: #00D4FF; margin-bottom: 20px;">全球 vs 中国</div>
            <div style="display: flex; gap: 20px;">
                <div id="card-global" style="flex: 1; padding: 20px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 16px;">
                    <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 16px; color: #999999;">全球</div>
                    <div style="font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: bold; color: #FFD700; margin-top: 10px;">2200万+</div>
                </div>
                <div id="card-china" style="flex: 1; padding: 20px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,64,129,0.3); border-radius: 16px;">
                    <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 16px; color: #999999;">中国</div>
                    <div style="font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: bold; color: #FF4081; margin-top: 10px;">1100万+</div>
                </div>
            </div>
        </div>
        
        <!-- Tags Pills -->
        <div id="tag-challenge" style="position: absolute; top: 750px; left: 160px; padding: 10px 20px; background: rgba(255,64,129,0.2); border: 1px solid rgba(255,64,129,0.5); border-radius: 100px; font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 20px; color: #FF4081;">挑战：投简历海投，面试难如上青天</div>
        <div id="tag-opportunity" style="position: absolute; top: 750px; left: 500px; padding: 10px 20px; background: rgba(0,212,255,0.2); border: 1px solid rgba(0,212,255,0.5); border-radius: 100px; font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 20px; color: #00D4FF;">机遇：科技与AI领域需求增长</div>
        
        <!-- Bottom Information Area -->
        <div id="bottom-info" style="position: absolute; top: 850px; left: 160px; right: 160px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 18px; color: #999999;">数据来源：全球教育统计报告 2026</div>
            <div id="timeline-node" style="display: flex; gap: 20px;">
                <div style="width: 12px; height: 12px; background: #00D4FF; border-radius: 50%;"></div>
                <div style="width: 12px; height: 12px; background:#1a1a2e; border-radius: 50%;"></div>
                <div style="width: 12px; height: 12px; background:#1a1a2e; border-radius: 50%;"></div>
                <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 16px; color: #666;">2020</div>
                <div style="font-family: 'Inter','Noto Sans SC', sans-serif; font-size: 16px; color: #666;">2026</div>
            </div>
        </div>
        
        <!-- Ghost Text Foreground -->
        <div id="ghost-text-foreground" style="position: absolute; top: 600px; right: 200px; font-family: 'JetBrains Mono', monospace; font-size: 200px; font-weight: bold; color: rgba(255,255,255,0.03); pointer-events: none;">DATA</div>
    </div>

    <script>
        // Initialize timeline
        const tl = gsap.timeline({ paused: true });
        window.__timelines["beat-2"] = tl;

        // Background decoration layers
        tl.from("#grid-layer", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0);
        tl.from("#radial-glow", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0.15);
        tl.from("#ghost-text", { opacity: 0, duration: 1, ease: "power1.inOut" }, 0.3);
        tl.from("#scan-line", { opacity: 0, duration: 1, ease: "power1.inOut" }, 0.45);

        // Particle dots
        tl.from("#particle1", { opacity: 0, duration: 0.8, ease: "power1.inOut" }, 0.6);
        tl.from("#particle2", { opacity: 0, duration: 0.8, ease: "power1.inOut" }, 0.75);
        tl.from("#particle3", { opacity: 0, duration: 0.8, ease: "power1.inOut" }, 0.9);
        tl.from("#particle4", { opacity: 0, duration: 0.8, ease: "power1.inOut" }, 1.05);
        tl.from("#particle5", { opacity: 0, duration: 0.8, ease: "power1.inOut" }, 1.2);

        // Corner decorations
        tl.from("#corner-tl", { opacity: 0, duration: 0.6, ease: "power1.inOut" }, 1.35);
        tl.from("#corner-tr", { opacity: 0, duration: 0.6, ease: "power1.inOut" }, 1.5);
        tl.from("#corner-bl", { opacity: 0, duration: 0.6, ease: "power1.inOut" }, 1.65);
        tl.from("#corner-br", { opacity: 0, duration: 0.6, ease: "power1.inOut" }, 1.8);

        // Main title
        tl.from("#main-title", { y: -50, opacity: 0, duration: 0.8, ease: "power3.out" }, 1.95);

        // Core data cards
        tl.from("#data-card-graduates", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 2.1);
        tl.from("#data-card-employment", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 2.25);

        // Progress bar
        tl.from("#progress-bar-fill", { scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut" }, 2.4);

        // Auxiliary data
        tl.from("#aux-data", { x: 30, opacity: 0, duration: 0.6, ease: "power2.out" }, 2.55);
        tl.from("#card-global", { opacity: 0, scale: 0.9, duration: 0.5, ease: "back.out(1.7)" }, 2.7);
        tl.from("#card-china", { opacity: 0, scale: 0.9, duration: 0.5, ease: "back.out(1.7)" }, 2.85);

        // Tags pills
        tl.from("#tag-challenge", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 3.0);
        tl.from("#tag-opportunity", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 3.15);

        // Bottom information
        tl.from("#bottom-info", { opacity: 0, duration: 0.8, ease: "power1.inOut" }, 3.3);
        tl.from("#timeline-node", { opacity: 0, duration: 0.6, ease: "power1.inOut" }, 3.45);

        // Foreground ghost text
        tl.from("#ghost-text-foreground", { opacity: 0, duration: 1, ease: "power1.inOut" }, 3.6);

        // Breathing animations
        // Core data card breathing
        gsap.to("#data-card-graduates", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        gsap.to("#data-card-employment", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Main title text-shadow pulsation
        gsap.to("#main-title", {
            textShadow: "0 0 40px rgba(0,212,255,1)",
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Background glow movement
        gsap.to("#radial-glow", {
            x: 50,
            y: 30,
            duration: 10,
            repeat: 0,
            yoyo: true,
            ease: "none"
        });

        // Tag border color pulsation
        gsap.to("#tag-challenge", {
            borderColor: "rgba(255,64,129,0.8)",
            duration: 2,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        gsap.to("#tag-opportunity", {
            borderColor: "rgba(0,212,255,0.8)",
            duration: 2,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Scan line movement
        gsap.fromTo("#scan-line", 
            { top: 0 }, 
            { top: "100%", duration: 5, repeat: 0, ease: "none" }
        );

        // Particle drift
        gsap.to("#particle1", { y: 100, x: 50, duration: 8, repeat: 0, yoyo: true, ease: "sine.inOut" });
        gsap.to("#particle2", { y: -80, x: -30, duration: 10, repeat: 0, yoyo: true, ease: "sine.inOut" });
        gsap.to("#particle3", { y: 60, x: -70, duration: 12, repeat: 0, yoyo: true, ease: "sine.inOut" });
        gsap.to("#particle4", { y: -50, x: 40, duration: 9, repeat: 0, yoyo: true, ease: "sine.inOut" });
        gsap.to("#particle5", { y: 70, x: -60, duration: 11, repeat: 0, yoyo: true, ease: "sine.inOut" });

        // Play timeline
        tl.play();
    </script>
</body>
</html>
