    opacity: 0,
    duration: 0.8,
    ease: "power3.out"
}, 0);

    opacity: 0,
    duration: 0.7,
    ease: "back.out(1.7)"
}, 0.15);

tl.from("#leftPanel", {

    opacity: 0,
    duration: 0.8,
    ease: "power3.out"
}, 0.3);

    duration: 0.8,
    ease: "power3.out"
}, 0.45);

tl.from("#comparison", {

    opacity: 0,
    duration: 0.7,
    ease: "back.out(1.7)"
}, 0.6);

tl.from("#bottomSection", {
    y: 40,
    opacity: 0,
    duration: 0.6,
    ease: "power2.out"
}, 0.75);

// Breathing animations

    scale: 1.015,
    duration: 3,
    repeat: 0,
    yoyo: true,
    ease: "sine.inOut"
});

gsap.to("#rightPanel", {

    repeat: 0,

    delay: 1
});

gsap.to("#mainTitle div:first-child", {
    textShadow: "0 0 40px rgba(255,64,129,0.8), 0 0 80px rgba(255,64,129,0.4)",
    duration: 2.5,
    repeat: 0,
    yoyo: true,
    ease: "power1.inOut"
});

// Scan line animation
@keyframes scan {
    0% {top: 0%;}
    100% {top: 100%;}
}

// Particle drift animation
@keyframes drift {
    0%, 100% {transform: translate(0, 0);}
    25% {transform: translate(10px, 15px);}
    50% {transform: translate(-5px, 20px);}
    75% {transform: translate(15px, 5px);}
}
