<!DOCTYPE html>
<html data-composition-id="beat-5" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin:0; padding:0; background:#1a1a2e; font-family:'Inter','Noto Sans SC',sans-serif; overflow:hidden;">
    <div class="scene" style="position:relative; width:1920px; height:1080px; overflow:hidden;">
        <!-- Background grid -->
        <div id="bg-grid" style="position:absolute; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(0,212,255,0.07) 1px, transparent 1px),linear-gradient(90deg, rgba(0,212,255,0.07) 1px, transparent 1px); background-size:100px 100px; opacity:0;"></div>
        
        <!-- Radial glow -->
        <div id="radial-glow" style="position:absolute; top:200px; left:50%; transform:translateX(-50%); width:1200px; height:600px; background:radial-gradient(ellipse, rgba(0,212,255,0.12) 0%, transparent 70%); opacity:0;"></div>
        
        <!-- Ghost text -->
        <div id="ghost-text" style="position:absolute; top:300px; left:100px; font-size:280px; font-weight:bold; color:rgba(255,255,255,0.03); font-family:'JetBrains Mono',monospace; opacity:0; user-select:none;">CONSUME</div>
        
        <!-- Scan line -->
        <div id="scan-line" style="position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent); opacity:0;"></div>
        
        <!-- Corner decorations -->
        <div style="position:absolute; top:80px; left:80px; width:60px; height:60px; border-top:2px solid rgba(0,212,255,0.3); border-left:2px solid rgba(0,212,255,0.3); opacity:0;"></div>
        <div style="position:absolute; top:80px; right:80px; width:60px; height:60px; border-top:2px solid rgba(0,212,255,0.3); border-right:2px solid rgba(0,212,255,0.3); opacity:0;"></div>
        <div style="position:absolute; bottom:80px; left:80px; width:60px; height:60px; border-bottom:2px solid rgba(0,212,255,0.3); border-left:2px solid rgba(0,212,255,0.3); opacity:0;"></div>
        <div style="position:absolute; bottom:80px; right:80px; width:60px; height:60px; border-bottom:2px solid rgba(0,212,255,0.3); border-right:2px solid rgba(0,212,255,0.3); opacity:0;"></div>
        
        <!-- Main title -->
        <div id="main-title" style="position:absolute; top:100px; left:100px; font-size:88px; font-weight:bold; color:#00D4FF; text-shadow:0 0 30px rgba(0,212,255,0.6); opacity:0;">
            消费复苏仪表盘
        </div>
        
        <!-- Subtitle -->
        <div id="subtitle" style="position:absolute; top:200px; left:100px; font-size:32px; color:rgba(0,212,255,0.5); opacity:0;">
            社会消费品零售总额趋势分析
        </div>
        
        <!-- Center chart container -->
        <div id="chart-container" style="position:absolute; top:250px; left:120px; width:900px; height:450px; background:rgba(26,26,46,0.7); border-radius:24px; border:1px solid rgba(0,212,255,0.3); padding:40px; backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0;">
            <!-- Chart glow top -->
            <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, #00D4FF, transparent);"></div>
            <!-- Chart title -->
            <div style="font-size:28px; color:#FFFFFF; margin-bottom:20px;">社会消费品零售总额（万亿元）</div>
            <!-- Chart area -->
            <div style="position:relative; width:100%; height:300px; border-bottom:1px solid rgba(0,212,255,0.2); border-left:1px solid rgba(0,212,255,0.2);">
                <!-- Grid lines -->
                <div style="position:absolute; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px),linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px); background-size:100px 100px;"></div>
                <!-- Chart line -->
                <svg id="chart-line" style="position:absolute; top:0; left:0; width:100%; height:100%;" viewBox="0 0 800 300">
                    <defs>
                        <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00D4FF; stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#FF4081; stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M0,280 L100,250 L200,220 L300,180 L400,150 L500,120 L600,80 L700,40 L800,0" stroke="url(#lineGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Data points -->
                    <circle cx="0" cy="280" r="6" fill="#00D4FF"/>
                    <circle cx="100" cy="250" r="6" fill="#00D4FF"/>
                    <circle cx="200" cy="220" r="6" fill="#00D4FF"/>
                    <circle cx="300" cy="180" r="6" fill="#00D4FF"/>
                    <circle cx="400" cy="150" r="6" fill="#00D4FF"/>
                    <circle cx="500" cy="120" r="6" fill="#00D4FF"/>
                    <circle cx="600" cy="80" r="6" fill="#00D4FF"/>
                    <circle cx="700" cy="40" r="6" fill="#00D4FF"/>
                    <circle cx="800" cy="0" r="6" fill="#FF4081"/>
                </svg>
                <!-- Current value -->
                <div style="position:absolute; bottom:10px; right:20px; font-size:48px; font-weight:bold; color:#FFD700; font-family:'JetBrains Mono',monospace;">12.8万亿</div>
                <!-- Growth indicator -->
                <div style="position:absolute; bottom:10px; right:180px; font-size:24px; color:#00FF88;">↑ 8.2%</div>
            </div>
        </div>
        
        <!-- Metric modules container -->
        <div style="position:absolute; top:250px; right:120px; width:500px; display:flex; flex-direction:column; gap:30px;">
            <!-- Tourism module -->
            <div id="tourism-module" class="metric-card" style="background:rgba(26,26,46,0.7); border-radius:16px; border:1px solid rgba(0,212,255,0.3); padding:30px; backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <div style="width:60px; height:60px; background:rgba(0,212,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <div style="width:40px; height:40px; border:2px solid #00D4FF; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                            <div style="width:20px; height:20px; background:#00D4FF; border-radius:50%;"></div>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:24px; color:#FFFFFF;">旅游人次</div>
                        <div style="font-size:48px; font-weight:bold; color:#FFD700; font-family:'JetBrains Mono',monospace;">3.2亿</div>
                    </div>
                </div>
                <div style="margin-top:20px; background:rgba(0,212,255,0.1); border-radius:8px; height:8px; width:100%;">
                    <div style="width:78%; height:100%; background:linear-gradient(90deg, #00D4FF, #FF4081); border-radius:8px;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div style="font-size:18px; color:#999999;">同比增长</div>
                    <div style="font-size:24px; color:#00FF88;">↑ 12.5%</div>
                </div>
            </div>
            
            <!-- Dining module -->
            <div id="dining-module" class="metric-card" style="background:rgba(26,26,46,0.7); border-radius:16px; border:1px solid rgba(0,212,255,0.3); padding:30px; backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <div style="width:60px; height:60px; background:rgba(255,64,129,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <div style="width:30px; height:20px; border:2px solid #FF4081; border-top:0; border-radius:0 0 15px 15px;"></div>
                    </div>
                    <div>
                        <div style="font-size:24px; color:#FFFFFF;">餐饮收入</div>
                        <div style="font-size:48px; font-weight:bold; color:#FFD700; font-family:'JetBrains Mono',monospace;">4.8万亿</div>
                    </div>
                </div>
                <div style="margin-top:20px; background:rgba(255,64,129,0.1); border-radius:8px; height:8px; width:100%;">
                    <div style="width:65%; height:100%; background:linear-gradient(90deg, #FF4081, #FFD700); border-radius:8px;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div style="font-size:18px; color:#999999;">同比增长</div>
                    <div style="font-size:24px; color:#00FF88;">↑ 9.8%</div>
                </div>
            </div>
            
            <!-- Phone module -->
            <div id="phone-module" class="metric-card" style="background:rgba(26,26,46,0.7); border-radius:16px; border:1px solid rgba(0,212,255,0.3); padding:30px; backdrop-filter:blur(10px); box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <div style="width:60px; height:60px; background:rgba(255,215,0,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <div style="width:24px; height:40px; border:2px solid #FFD700; border-radius:4px; position:relative;">
                            <div style="position:absolute; top:4px; left:4px; width:16px; height:24px; background:rgba(255,215,0,0.3);"></div>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:24px; color:#FFFFFF;">手机销量</div>
                        <div style="font-size:48px; font-weight:bold; color:#FFD700; font-family:'JetBrains Mono',monospace;">2.1亿</div>
                    </div>
                </div>
                <div style="margin-top:20px; background:rgba(255,215,0,0.1); border-radius:8px; height:8px; width:100%;">
                    <div style="width:52%; height:100%; background:linear-gradient(90deg, #FFD700, #00D4FF); border-radius:8px;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div style="font-size:18px; color:#999999;">同比增长</div>
                    <div style="font-size:24px; color:#00FF88;">↑ 6.3%</div>
                </div>
            </div>
        </div>
        
        <!-- Bottom info area -->
        <div style="position:absolute; bottom:120px; left:100px; width:1720px; display:flex; justify-content:space-between; align-items:center;">
            <!-- Left side - key metrics -->
            <div id="bottom-metrics" style="display:flex; gap:40px; opacity:0;">
                <div style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:50px; padding:12px 24px; font-size:20px; color:#00D4FF;">
                    消费信心指数: <span style="font-weight:bold; color:#FFD700;">108.5</span>
                </div>
                <div style="background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:50px; padding:12px 24px; font-size:20px; color:#FF4081;">
                    储蓄率: <span style="font-weight:bold; color:#FFD700;">32.1%</span>
                </div>
                <div style="background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); border-radius:50px; padding:12px 24px; font-size:20px; color:#FFD700;">
                    消费支出占比: <span style="font-weight:bold; color:#FFFFFF;">67.9%</span>
                </div>
            </div>
            
            <!-- Right side - timestamp -->
            <div id="timestamp" style="font-size:20px; color:#999999; font-family:'JetBrains Mono',monospace; opacity:0;">
                数据更新: 2024年第三季度 | 来源: 国家统计局
            </div>
        </div>
        
        <!-- Floating particles -->
        <div class="particle" style="position:absolute; top:300px; left:300px; width:4px; height:4px; background:#1a1a2e; border-radius:50%; opacity:0;"></div>
        <div class="particle" style="position:absolute; top:500px; left:700px; width:3px; height:3px; background:#00D4FF; border-radius:50%; opacity:0;"></div>
        <div class="particle" style="position:absolute; top:400px; left:1200px; width:4px; height:4px; background:#1a1a2e; border-radius:50%; opacity:0;"></div>
        <div class="particle" style="position:absolute; top:600px; left:1600px; width:3px; height:3px; background:#1a1a2e; border-radius:50%; opacity:0;"></div>
        <div class="particle" style="position:absolute; top:200px; left:900px; width:4px; height:4px; background:#00D4FF; border-radius:50%; opacity:0;"></div>
        
        <!-- Ghost text foreground -->
        <div style="position:absolute; top:400px; left:800px; font-size:120px; font-weight:bold; color:rgba(255,255,255,0.04); font-family:'JetBrains Mono',monospace; user-select:none; opacity:0;">敢花钱</div>
        
        <!-- Neon connection lines -->
        <svg style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity:0;">
            <line x1="1050" y1="400" x2="1150" y2="350" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,4"/>
            <line x1="1050" y1="450" x2="1150" y2="500" stroke="#FF4081" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,4"/>
            <line x1="1050" y1="500" x2="1150" y2="650" stroke="#FFD700" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,4"/>
        </svg>
    </div>

    <script>
        // Register timeline
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({paused: true});
        window.__timelines["beat-5"] = tl;

        // Background elements (first to appear)
        tl.from("#bg-grid", {opacity:0, duration:1.2, ease:"power1.inOut"}, 0)
          .from("#radial-glow", {opacity:0, duration:1.2, ease:"power1.inOut"}, 0.15)
          .from("#ghost-text", {opacity:0, duration:1.2, ease:"power1.inOut"}, 0.3)
          .from("#scan-line", {opacity:0, y:-1080, duration:6, ease:"none", repeat: 0}, 0.45)
          .from(".corner-decoration", {opacity:0, duration:0.8, ease:"power2.out"}, 0.6);

        // Main title
        tl.from("#main-title", {y:-50, opacity:0, duration:0.8, ease:"power3.out"}, 0.75)
          .to("#main-title", {
              textShadow: "0 0 40px rgba(0,212,255,0.8)",
              duration: 2.5,
              repeat: 0,
              yoyo: true,
              ease: "sine.inOut"
          }, 1.55);

        // Subtitle
        tl.from("#subtitle", {x:-30, opacity:0, duration:0.5, ease:"power2.out"}, 0.9);

        // Chart container
        tl.from("#chart-container", {y:60, opacity:0, scale:0.9, duration:0.7, ease:"back.out(1.7)"}, 1.05);

        // Metric modules with stagger
        tl.from("#tourism-module", {y:60, opacity:0, scale:0.9, duration:0.7, ease:"back.out(1.7)"}, 1.2)
          .from("#dining-module", {y:60, opacity:0, scale:0.9, duration:0.7, ease:"back.out(1.7)"}, 1.35)
          .from("#phone-module", {y:60, opacity:0, scale:0.9, duration:0.7, ease:"back.out(1.7)"}, 1.5);

        // Add breathing to metric cards
        gsap.to(".metric-card", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut",
            stagger: 0.5
        });

        // Bottom elements
        tl.from("#bottom-metrics", {y:30, opacity:0, duration:0.6, ease:"power2.out"}, 1.65)
          .from("#timestamp", {opacity:0, duration:0.5}, 1.8);

        // Floating particles
        tl.from(".particle", {opacity:0, y:20, duration:1, ease:"power2.out"}, 1.9);

        // Foreground ghost text
        tl.from("div:contains('敢花钱')", {opacity:0, duration:1.2, ease:"power1.inOut"}, 2.0);

        // Neon lines
        tl.from("svg:last-of-type", {opacity:0, duration:0.8, ease:"power2.out"}, 2.1);

        // Start timeline
        tl.play();
    </script>
</body>
</html>
