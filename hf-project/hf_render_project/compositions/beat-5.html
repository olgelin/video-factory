<!DOCTYPE html>
<html data-composition-id="beat-5" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperFrames - Beat 5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin:0; padding:0; background:#1a1a2e; overflow:hidden;">
    <div class="scene" style="position:relative; width:1920px; height:1080px; background:#1a1a2e; overflow:hidden;">
        <!-- Background Decor Layer -->
        <div id="background-decor" style="position:absolute; top:0; left:0; width:100%; height:100%;">
            <!-- Grid Lines -->
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; background-image: 
                linear-gradient(rgba(0,212,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.08) 1px, transparent 1px);
                background-size:100px 100px;"></div>
            <!-- Radial Glow -->
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:800px; height:800px; background:radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);"></div>
            <!-- Scan Line -->
            <div id="scan-line" style="position:absolute; top:0; left:0; width:100%; height:2px; background:rgba(0,212,255,0.2);"></div>
        </div>

        <!-- Ghost Text Watermark -->
        <div id="ghost-text" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Inter','Noto Sans SC',sans-serif; font-size:300px; color:rgba(255,255,255,0.04); font-weight:bold; text-align:center; pointer-events:none;">
            TECH
        </div>

        <!-- Main Title -->
        <div id="main-title" style="position:absolute; top:80px; left:100px; font-family:'Inter','Noto Sans SC',sans-serif; font-size:100px; font-weight:bold; color:#00D4FF; text-shadow:0 0 30px rgba(0,212,255,0.8); letter-spacing:2px;">
            技术流程解析
        </div>

        <!-- Core Content Area (Left 60% / Right 40%) -->
        <div style="position:absolute; top:200px; left:100px; right:100px; height:550px;">
            <!-- Left Column (60%) -->
            <div style="width:60%; height:100%; float:left; padding-right:40px;">
                <!-- Data Card -->
                <div id="data-card" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:24px; padding:40px; position:relative; box-shadow:0 8px 32px rgba(0,0,0,0.4); margin-bottom:30px;">
                    <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #00D4FF, transparent);"></div>
                    <div style="position:absolute; top:0; left:0; right:0; height:100%; background:radial-gradient(ellipse at top, rgba(0,212,255,0.08) 0%, transparent 50%); pointer-events:none;"></div>
                    <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:24px; color:#999999; margin-bottom:10px;">学习效率提升</div>
                    <div style="font-family:'JetBrains Mono',monospace; font-size:120px; font-weight:bold; color:#FFD700; line-height:1;">1000%</div>
                    <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:20px; color:#FF4081; margin-top:10px;">↑ 指数级增长</div>
                </div>

                <!-- Flowchart Nodes & Connections -->
                <div style="display:flex; justify-content:space-around; align-items:center; margin-top:40px;">
                    <div id="node1" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:16px; padding:20px; text-align:center; width:200px;">
                        <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:18px; color:#00D4FF;">混合专家架构</div>
                        <div style="font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:bold; color:#FFFFFF; margin-top:10px;">MoE</div>
                    </div>
                    <div style="width:100px; height:2px; background:linear-gradient(90deg, #00D4FF, #FF4081);"></div>
                    <div id="node2" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(0,212,255,0.3); border-radius:16px; padding:20px; text-align:center; width:200px;">
                        <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:18px; color:#00D4FF;">强化学习</div>
                        <div style="font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:bold; color:#FFFFFF; margin-top:10px;">RL</div>
                    </div>
                    <div style="width:100px; height:2px; background:linear-gradient(90deg, #FF4081, #FFD700);"></div>
                    <div id="node3" style="background:rgba(26,26,46,0.7); backdrop-filter:blur(10px); border:1px solid rgba(255,64,129,0.3); border-radius:16px; padding:20px; text-align:center; width:200px;">
                        <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:18px; color:#FF4081;">指数级提升</div>
                        <div style="font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:bold; color:#FFD700; margin-top:10px;">Exponential</div>
                    </div>
                </div>
            </div>

            <!-- Right Column (40%) -->
            <div style="width:40%; height:100%; float:right; padding-left:40px;">
                <!-- Tag Pills -->
                <div id="tag1" style="display:inline-block; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:50px; padding:10px 20px; font-family:'Inter','Noto Sans SC',sans-serif; font-size:20px; color:#00D4FF; margin-bottom:20px;">
                    技术创新
                </div>
                <div id="tag2" style="display:inline-block; background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:50px; padding:10px 20px; font-family:'Inter','Noto Sans SC',sans-serif; font-size:20px; color:#FF4081; margin-bottom:20px; margin-left:10px;">
                    AI革命
                </div>

                <!-- Progress Bar -->
                <div style="margin-top:40px;">
                    <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:18px; color:#999999; margin-bottom:10px;">模型效率提升</div>
                    <div id="progress-bar" style="width:100%; height:10px; background:rgba(255,255,255,0.1); border-radius:5px; overflow:hidden;">
                        <div style="width:80%; height:100%; background:linear-gradient(90deg, #00D4FF, #FFD700); border-radius:5px;"></div>
                    </div>
                    <div style="font-family:'JetBrains Mono',monospace; font-size:24px; color:#FFD700; margin-top:10px;">80%</div>
                </div>

                <!-- Additional Info -->
                <div style="margin-top:60px; font-family:'Inter','Noto Sans SC',sans-serif; font-size:16px; color:#666666;">
                    基于OpenAI最新研究
                </div>
            </div>
        </div>

        <!-- Bottom Info Area -->
        <div id="footer-info" style="position:absolute; bottom:100px; left:100px; right:100px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-family:'Inter','Noto Sans SC',sans-serif; font-size:20px; color:#666666;">
                    HyperFrames | 技术流程可视化
                </div>
                <div style="font-family:'JetBrains Mono',monospace; font-size:20px; color:#00D4FF;">
                    00:10.1
                </div>
            </div>
        </div>

        <!-- Corner Decorations -->
        <div style="position:absolute; top:100px; left:100px; width:40px; height:40px; border-left:2px solid rgba(0,212,255,0.3); border-top:2px solid rgba(0,212,255,0.3);"></div>
        <div style="position:absolute; top:100px; right:100px; width:40px; height:40px; border-right:2px solid rgba(0,212,255,0.3); border-top:2px solid rgba(0,212,255,0.3);"></div>
        <div style="position:absolute; bottom:100px; left:100px; width:40px; height:40px; border-left:2px solid rgba(0,212,255,0.3); border-bottom:2px solid rgba(0,212,255,0.3);"></div>
        <div style="position:absolute; bottom:100px; right:100px; width:40px; height:40px; border-right:2px solid rgba(0,212,255,0.3); border-bottom:2px solid rgba(0,212,255,0.3);"></div>

        <!-- Particle Dots -->
        <div id="particle1" style="position:absolute; top:300px; left:500px; width:4px; height:4px; background:#00D4FF; border-radius:50%; opacity:0.5;"></div>
        <div id="particle2" style="position:absolute; top:400px; left:800px; width:3px; height:3px; background:#1a1a2e; border-radius:50%; opacity:0.4;"></div>
        <div id="particle3" style="position:absolute; top:200px; left:1200px; width:4px; height:4px; background:#1a1a2e; border-radius:50%; opacity:0.5;"></div>
        <div id="particle4" style="position:absolute; top:600px; left:300px; width:2px; height:2px; background:#00D4FF; border-radius:50%; opacity:0.3;"></div>
        <div id="particle5" style="position:absolute; top:500px; left:1400px; width:3px; height:3px; background:#1a1a2e; border-radius:50%; opacity:0.4;"></div>
    </div>

    <script>
        // Initialize timeline and register to window
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({paused: true});
        window.__timelines["beat-5"] = tl;

        // Entry animations with 0.15s stagger
        tl.from("#background-decor", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
        tl.from("#ghost-text", {opacity: 0, duration: 1, ease: "power2.inOut"}, 0.15);
        tl.from("#main-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.3);
        tl.from("#data-card", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 0.45);
        tl.from("#node1", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 0.6);
        tl.from("#node2", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 0.75);
        tl.from("#node3", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 0.9);
        tl.from("#tag1", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.05);
        tl.from("#tag2", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.2);
        tl.from("#progress-bar div", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 1.35);
        tl.from("#footer-info", {opacity: 0, duration: 0.8, ease: "power2.out"}, 1.5);
        tl.from("#particle1", {opacity: 0, duration: 0.5}, 0.5);
        tl.from("#particle2", {opacity: 0, duration: 0.5}, 0.6);
        tl.from("#particle3", {opacity: 0, duration: 0.5}, 0.7);
        tl.from("#particle4", {opacity: 0, duration: 0.5}, 0.8);
        tl.from("#particle5", {opacity: 0, duration: 0.5}, 0.9);

        // Breathing animations (only for selected elements)
        gsap.to("#data-card", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        gsap.to("#main-title", {
            textShadow: "0 0 50px rgba(0,212,255,1)",
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        gsap.to("#tag1", {
            borderColor: "rgba(0,212,255,0.8)",
            duration: 2,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        gsap.to("#scan-line", {
            top: "100%",
            duration: 5,
            repeat: 0,
            ease: "none"
        });
        gsap.to("#particle1", {x: "+=50", y: "+=30", duration: 10, repeat: 0, yoyo: true, ease: "none"});
        gsap.to("#particle2", {x: "-=40", y: "+=20", duration: 12, repeat: 0, yoyo: true, ease: "none"});
        gsap.to("#particle3", {x: "+=30", y: "-=20", duration: 15, repeat: 0, yoyo: true, ease: "none"});
        gsap.to("#particle4", {x: "-=20", y: "+=40", duration: 8, repeat: 0, yoyo: true, ease: "none"});
        gsap.to("#particle5", {x: "+=60", y: "-=10", duration: 14, repeat: 0, yoyo: true, ease: "none"});

        // Start timeline
        tl.play();
    </script>
</body>
</html>
