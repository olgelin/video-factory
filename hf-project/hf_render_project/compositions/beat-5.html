<!DOCTYPE html>
<html data-composition-id="beat-5" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>HyperFrames Beat-5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e;">
    <div class="scene" style="background:#1a1a2e;width: 1920px; height: 1080px; position: relative; overflow: hidden;">
        <!-- Background decorative layers -->
        <div id="grid-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px); background-size: 100px 100px; opacity: 0.1;"></div>
        <div id="glow-layer" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);"></div>
        <div id="ghost-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 300px; color: rgba(255,255,255,0.03); font-weight: bold; pointer-events: none;">FUTURE</div>
        
        <!-- Main timeline axis -->
        <div id="timeline-axis" style="position: absolute; top: 400px; left: 200px; right: 200px; height: 4px; background: linear-gradient(90deg, #00D4FF, #FF4081); box-shadow: 0 0 20px #00D4FF;"></div>
        
        <!-- Year markers -->
        <div id="year-2026" style="position: absolute; top: 420px; left: 200px; font-family: 'JetBrains Mono',monospace; font-size: 24px; color: #FFD700;">2026</div>
        <div id="year-2036" style="position: absolute; top: 420px; right: 200px; font-family: 'JetBrains Mono',monospace; font-size: 24px; color: #FFD700;">2036</div>
        
        <!-- AI brain symbol -->
        <div id="ai-symbol" style="position: absolute; top: 300px; left: 200px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(0,212,255,0.8) 0%, transparent 70%); border-radius: 50%; border: 2px solid #00D4FF; display: flex; align-items: center; justify-content: center; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 16px; color: #FFFFFF;">AI</div>
        
        <!-- Green energy symbol -->
        <div id="green-symbol" style="position: absolute; top: 300px; right: 200px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(0,212,255,0.8) 0%, transparent 70%); border-radius: 50%; border: 2px solid #00D4FF; display: flex; align-items: center; justify-content: center; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 16px; color: #FFFFFF;">Green</div>
        
        <!-- Data flow network connection beam -->
        <div id="data-flow" style="position: absolute; top: 350px; left: 300px; width: 1320px; height: 2px; background: linear-gradient(90deg, transparent, #00D4FF, transparent);"></div>
        
        <!-- Main title -->
        <div id="main-title" style="position: absolute; top: 100px; left: 200px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 80px; font-weight: bold; color: #FFFFFF; text-shadow: 0 0 30px rgba(0,212,255,0.8);">未来十年的科技主导权</div>
        
        <!-- Core data card -->
        <div id="data-card" style="position: absolute; top: 500px; left: 500px; width: 300px; padding: 30px; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); background-image: linear-gradient(to top, rgba(0,212,255,0.08) 0%, transparent 100%);">
            <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 24px; color: #999999; margin-bottom: 10px;">科技主导权</div>
            <div style="font-family: 'JetBrains Mono',monospace; font-size: 80px; color: #FFD700; font-weight: bold;">10年</div>
            <div style="font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 20px; color: #FFFFFF;">2026-2036</div>
        </div>
        
        <!-- Speech text (口播) -->
        <div id="speech-text" style="position: absolute; bottom: 200px; left: 200px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 28px; color: #FFFFFF; max-width: 800px;">意义远不止赚钱。这关乎未来十年的科技主导权——谁掌握AI和绿色技术，谁就捏住了经济的命脉。</div>
        
        <!-- Symbolic small icons -->
        <div id="chip-icon" style="position: absolute; top: 250px; left: 400px; width: 40px; height: 40px; background: rgba(0,212,255,0.2); border-radius: 8px; border: 1px solid #00D4FF;"></div>
        <div id="battery-icon" style="position: absolute; top: 250px; right: 400px; width: 40px; height: 40px; background: rgba(0,212,255,0.2); border-radius: 8px; border: 1px solid #00D4FF;"></div>
        
        <!-- Label pill -->
        <div id="pill-label" style="position: absolute; top: 600px; left: 200px; padding: 10px 20px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 16px; font-family: 'Inter','Noto Sans SC',sans-serif; font-size: 20px; color: #00D4FF;">AI驱动</div>
        
        <!-- Progress bar -->
        <div id="progress-bar" style="position: absolute; top: 650px; left: 200px; width: 300px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
            <div id="progress-fill" style="width: 70%; height: 100%; background: linear-gradient(90deg, #00D4FF, #FF4081);"></div>
        </div>
        
        <!-- Scan line -->
        <div id="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,212,255,0.2);"></div>
        
        <!-- Particle points -->
        <div id="particle-1" style="position: absolute; top: 100px; left: 300px; width: 4px; height: 4px; background: #00D4FF; border-radius: 50%;"></div>
        <div id="particle-2" style="position: absolute; top: 200px; left: 600px; width: 3px; height: 3px; background:#1a1a2e; border-radius: 50%;"></div>
        <div id="particle-3" style="position: absolute; top: 150px; left: 900px; width: 2px; height: 2px; background:#1a1a2e; border-radius: 50%;"></div>
        
        <!-- Corner decorations -->
        <div style="position: absolute; top: 100px; left: 100px; width: 40px; height: 40px; border-top: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; top: 100px; right: 100px; width: 40px; height: 40px; border-top: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; bottom: 100px; left: 100px; width: 40px; height: 40px; border-bottom: 2px solid rgba(0,212,255,0.3); border-left: 2px solid rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; bottom: 100px; right: 100px; width: 40px; height: 40px; border-bottom: 2px solid rgba(0,212,255,0.3); border-right: 2px solid rgba(0,212,255,0.3);"></div>
        
        <!-- Footer information -->
        <div id="footer-text" style="position: absolute; bottom: 100px; left: 200px; font-family: 'JetBrains Mono',monospace; font-size: 16px; color: #999999;">HyperFrames Video Synthesis | 2026 Outlook</div>
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-5"] = gsap.timeline({paused: true});
        const tl = window.__timelines["beat-5"];

        // Entry animations with stagger of 0.15s
        // 1. Background decorative layers
        tl.from("#grid-layer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
        tl.from("#glow-layer", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15);
        tl.from("#ghost-text", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3);
        
        // 2. Main title (SLAMS - from top)
        tl.from("#main-title", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.45);
        
        // 3. Core timeline elements
        tl.from("#timeline-axis", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 0.6);
        tl.from("#year-2026", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 0.75);
        tl.from("#year-2036", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 0.9);
        tl.from("#ai-symbol", {scale: 0.9, opacity: 0, duration: 0.7, ease: "back.out(1.7)"}, 1.05);
        tl.from("#green-symbol", {scale: 0.9, opacity: 0, duration: 0.7, ease: "back.out(1.7)"}, 1.2);
        tl.from("#data-flow", {scaleX: 0, transformOrigin: "center", duration: 1, ease: "power2.inOut"}, 1.35);
        
        // 4. Core data card (FLOATS - from below)
        tl.from("#data-card", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.5);
        
        // 5. Auxiliary elements (CASCADES - from side)
        tl.from("#chip-icon", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.65);
        tl.from("#battery-icon", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.8);
        tl.from("#pill-label", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.95);
        tl.from("#progress-bar", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 2.1);
        tl.from("#scan-line", {y: -1080, duration: 4, ease: "none", repeat: 0}, 2.25);
        tl.from("#particle-1", {opacity: 0, y: 50, duration: 1, ease: "power2.out"}, 2.4);
        tl.from("#particle-2", {opacity: 0, y: -30, duration: 1, ease: "power2.out"}, 2.55);
        tl.from("#particle-3", {opacity: 0, y: 40, duration: 1, ease: "power2.out"}, 2.7);
        
        // 6. Speech text and footer (last)
        tl.from("#speech-text", {opacity: 0, y: 30, duration: 0.8, ease: "power3.out"}, 2.85);
        tl.from("#footer-text", {opacity: 0, y: 20, duration: 0.6, ease: "power2.out"}, 3.0);

        // Breathing animations (independent of timeline)
        // Core data card breathing
        gsap.to("#data-card", {
            scale: 1.02,
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Main title text-shadow pulse
        gsap.to("#main-title", {
            textShadow: "0 0 50px rgba(0,212,255,1)",
            opacity: 1,
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Glow layer drift
        gsap.to("#glow-layer", {
            x: 50,
            y: 30,
            duration: 10,
            repeat: 0,
            yoyo: true,
            ease: "none"
        });
        
        // Pill label border color pulse
        gsap.to("#pill-label", {
            borderColor: "rgba(0,212,255,0.8)",
            duration: 2,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Particle drift animations
        gsap.to("#particle-1", {
            y: "random(-100, 100)",
            x: "random(-50, 50)",
            duration: "random(6, 15)",
            repeat: 0,
            yoyo: true,
            ease: "none"
        });
        gsap.to("#particle-2", {
            y: "random(-80, 80)",
            x: "random(-40, 40)",
            duration: "random(5, 12)",
            repeat: 0,
            yoyo: true,
            ease: "none"
        });
        gsap.to("#particle-3", {
            y: "random(-60, 60)",
            x: "random(-30, 30)",
            duration: "random(7, 14)",
            repeat: 0,
            yoyo: true,
            ease: "none"
        });
        
        // Scan line continuous movement
        gsap.fromTo("#scan-line", 
            {y: -10}, 
            {y: 1080, duration: 5, repeat: 0, ease: "none"}
        );
    </script>
</body>
</html>
