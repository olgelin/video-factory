<!DOCTYPE html>
<html data-composition-id="beat-5" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>HyperFrames Composition - Beat 5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #1a1a2e; overflow: hidden; font-family: 'Inter', 'Noto Sans SC', sans-serif; width: 1920px; height: 1080px;">
    <div class="scene" style="background:#1a1a2e;" style="position: relative; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(ellipse at center, #16163a 0%, #0a0a0a 100%);">
        
        <!-- Decorative Grid -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px); background-size: 80px 80px; opacity: 0.3; z-index: 1;"></div>
        
        <!-- Ghost Text Watermark -->
        <div style="position: absolute; top: 15%; left: 10%; font-family: 'JetBrains Mono', monospace; font-size: 200px; font-weight: bold; color: #ffffff; opacity: 0.02; z-index: 2; transform: rotate(-15deg); pointer-events: none;">1200000+</div>
        
        <!-- Particle Drift Background -->
        <div id="particles" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></div>

        <!-- Main Number Explosion Container -->
        <div id="numberContainer" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; opacity: 0;">
            <div id="mainNumber" style="font-family: 'JetBrains Mono', monospace; font-size: 120px; font-weight: bold; color: #FFD700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.5); line-height: 1;">0</div>
            <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 28px; color: #FFFFFF; margin-top: 20px; opacity: 0.9;">新闻热度值</div>
        </div>

        <!-- Confirmed Bar -->
        <div id="confirmedBar" style="position: absolute; top: 42%; left: 15%; z-index: 10; opacity: 0; transform: translateX(-50px);">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #999999;">置信度</div>
            <div style="width: 300px; height: 8px; background: #2a2a3e; border-radius: 4px; margin-top: 10px; overflow: hidden;">
                <div id="confirmFill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00D4FF, #FF4081); border-radius: 4px;"></div>
            </div>
            <div id="confirmValue" style="font-family: 'JetBrains Mono', monospace; font-size: 40px; color: #FF4081; font-weight: bold; margin-top: 10px;">0</div>
        </div>

        <!-- Trend Line -->
        <svg id="trendSvg" style="position: absolute; bottom: 180px; left: 10%; width: 80%; height: 250px; z-index: 5; opacity: 0;" viewBox="0 0 1000 250" preserveAspectRatio="none">
            <defs>
                <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00D4FF"/>
                    <stop offset="100%" stop-color="#FF4081"/>
                </linearGradient>
                <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
                </linearGradient>
            </defs>
            <path id="trendArea" d="M0,250 L0,250 L1000,250" fill="url(#areaGradient)"/>
            <path id="trendLine" d="M0,250 L0,250 L1000,250" fill="none" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round"/>
            <circle id="peakDot" cx="0" cy="250" r="8" fill="#FF4081" filter="url(#glow)" style="opacity: 0;"/>
            <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </svg>

        <!-- Comment Stream -->
        <div id="commentStream" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; overflow: hidden;"></div>

        <!-- Energy Ring Pulse -->
        <div id="energyRing" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border: 2px solid rgba(255, 64, 129, 0.3); border-radius: 50%; z-index: 4; opacity: 0;"></div>

        <!-- Emotion Peak Label -->
        <div id="emotionPeak" style="position: absolute; top: 25%; right: 12%; z-index: 10; opacity: 0; transform: translateX(50px);">
            <div style="background: rgba(255, 64, 129, 0.1); border: 1px solid #FF4081; border-radius: 16px; padding: 16px 24px; backdrop-filter: blur(10px);">
                <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 20px; color: #FF4081; font-weight: bold; margin-bottom: 8px;">情感峰值</div>
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 32px; color: #FFFFFF; font-weight: bold;">全民共鸣</div>
            </div>
        </div>

        <!-- Social Icons Grid -->
        <div id="socialGrid" style="position: absolute; bottom: 80px; right: 10%; display: grid; grid-template-columns: repeat(3, 60px); gap: 15px; z-index: 10; opacity: 0; transform: translateY(50px);">
            <div style="width: 60px; height: 60px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 24px;">💬</div>
            </div>
            <div style="width: 60px; height: 60px; background: rgba(255, 64, 129, 0.1); border: 1px solid rgba(255, 64, 129, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 24px;">❤️</div>
            </div>
            <div style="width: 60px; height: 60px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 24px;">🔄</div>
            </div>
            <div style="width: 60px; height: 60px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 24px;">🔥</div>
            </div>
            <div style="width: 60px; height: 60px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 24px;">📢</div>
            </div>
            <div style="width: 60px; height: 60px; background: rgba(255, 64, 129, 0.1); border: 1px solid rgba(255, 64, 129, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <div style="font-size: 24px;">👥</div>
            </div>
        </div>

        <!-- Title -->
        <div id="title" style="position: absolute; top: 80px; left: 80px; z-index: 10; opacity: 0; transform: scale(0.5);">
            <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 80px; font-weight: bold; color: #FFFFFF; line-height: 1.2; text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);">
                全民刷屏
            </div>
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #00D4FF; margin-top: 10px; letter-spacing: 4px;">DATA IMPACT VISUALIZATION</div>
        </div>

        <!-- Scanline Overlay -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); z-index: 15; pointer-events: none;"></div>

    </div>

    <script>
        // Register Timeline
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-5"] = gsap.timeline({paused: true});
        const tl = window.__timelines["beat-5"];

        // Create Particles
        const particleContainer = document.getElementById("particles");
        for (let i = 0; i < 80; i++) {
            const particle = document.createElement("div");
            particle.style.cssText = `
                position: absolute;
                width: ${0.5 * 4 + 1}px;
                height: ${0.5 * 4 + 1}px;
                background:#1a1a2e;
                border-radius: 50%;
                box-shadow: 0 0 ${0.5 * 10 + 5}px #FFD700;
                left: ${0.5 * 100}%;
                top: ${0.5 * 100}%;
                opacity: 0;
            `;
            particleContainer.appendChild(particle);
            gsap.to(particle, {
                y: -1000,
                duration: 0.5 * 10 + 5,
                repeat: 0,
                ease: "none",
                delay: 0.5 * 5
            });
        }

        // Create Comment Streaks
        const commentStream = document.getElementById("commentStream");
        for (let i = 0; i < 15; i++) {
            const streak = document.createElement("div");
            const color = 0.5 > 0.5 ? "#00D4FF" : "#FF4081";
            const yPos = 0.5 * 100;
            const width = 0.5 * 300 + 100;
            streak.style.cssText = `
                position: absolute;
                width: ${width}px;
                height: 2px;
                background: linear-gradient(90deg, transparent, ${color}, transparent);
                top: ${yPos}%;
                left: -${width}px;
                opacity: 0.6;
            `;
            commentStream.appendChild(streak);
            gsap.to(streak, {
                x: 2200,
                duration: 0.5 * 3 + 2,
                repeat: 0,
                ease: "none",
                delay: 0.5 * 5
            });
        }

        // Animation Sequence
        // 1. Title Appears from Explosion
        tl.from("#title", { 
            scale: 3, 
            opacity: 0, 
            duration: 1.2, 
            ease: "expo.out"
        }, 0);

        // 2. Number Container Appears
        tl.to("#numberContainer", { 
            opacity: 1, 
            duration: 0.5, 
            ease: "power4.out"
        }, 0.3);

        // 3. Number Counts Up
        const mainNumberEl = document.getElementById("mainNumber");
        const countObj = {value: 0};
        tl.to(countObj, {
            value: 1200000,
            duration: 4,
            ease: "power2.out",
            onUpdate: () => {
                mainNumberEl.innerText = Math.floor(countObj.value).toLocaleString() + "+";
            }
        }, 0.8);

        // 4. Number Pulses with Light after counting
        tl.to("#mainNumber", {
            textShadow: "0 0 30px rgba(255, 215, 0, 1), 0 0 60px rgba(255, 215, 0, 0.8)",
            duration: 0.8,
            ease: "power2.inOut",
            yoyo: true,
            repeat: 1
        }, 4.8);

        // 5. Confirmed Bar Appears and Fills
        tl.to("#confirmedBar", {
            x: 0,
            opacity: 1,
            duration: 1,
            ease: "expo.out"
        }, 1.5);
        tl.to("#confirmFill", {
            width: "90%",
            duration: 2,
            ease: "power3.out"
        }, 2);
        tl.to("#confirmValue", {
            text: "9",
            duration: 2,
            snap: { textContent: 1 },
            ease: "power3.out"
        }, 2);

        // 6. Trend Line Draws
        tl.to("#trendSvg", { opacity: 1, duration: 0.5 }, 3);
        const trendPath = "M0,250 L150,250 L250,180 L400,200 L550,50 L700,100 L850,20 L1000,30";
        const trendAreaPath = "M0,250 L150,250 L250,180 L400,200 L550,50 L700,100 L850,20 L1000,30 L1000,250 Z";
        const length = 2000;
        tl.fromTo("#trendLine", { 
            strokeDasharray: length, 
            strokeDashoffset: length 
        }, {
            strokeDashoffset: 0,
            attr: { d: trendPath },
            duration: 3,
            ease: "power2.inOut"
        }, 3);
        tl.fromTo("#trendArea", { 
            attr: { d: "M0,250 L150,250 L250,180 L400,200 L550,50 L700,100 L850,20 L1000,30 L1000,250 Z" }
        }, {
            attr: { d: trendAreaPath },
            duration: 3,
            ease: "power2.inOut"
        }, 3);
        tl.to("#peakDot", { 
            opacity: 1, 
            attr: { cx: 850, cy: 20 }, 
            duration: 0.3,
            ease: "back.out(1.7)"
        }, 5.5);

        // 7. Emotion Peak Label
        tl.to("#emotionPeak", {
            x: 0,
            opacity: 1,
            duration: 1,
            ease: "expo.out"
        }, 4);

        // 8. Social Icons Grid
        tl.to("#socialGrid", {
            y: 0,
            opacity: 1,
            duration: 1.2,
            ease: "expo.out"
        }, 5);

        // 9. Energy Ring Pulse
        tl.to("#energyRing", {
            opacity: 0.5,
            scale: 1.5,
            duration: 2,
            ease: "expo.out"
        }, 3);

        // 10. Particle Flicker
        tl.to("#particles div", {
            opacity: 0.8,
            duration: 2,
            stagger: 0.02,
            ease: "power2.out"
        }, 1);

        // Card Breathing Animation (continuous)
        gsap.to("#emotionPeak > div", {
            scale: 1.02,
            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
    </script>
</body>
</html>
