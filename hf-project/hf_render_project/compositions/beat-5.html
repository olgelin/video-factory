    <script>
        window.__timelines["beat-5"] = gsap.timeline({ paused: true });
        
        const tl = window.__timelines["beat-5"];
        
        // Background elements
        tl.from("#bg-grid", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0)
          .from("#radial-glow", { opacity: 0, scale: 0.8, duration: 1.5, ease: "power1.inOut" }, 0.15)
          .from("#ghost-text", { opacity: 0, duration: 1.2, ease: "power1.inOut" }, 0.3)
          .from("#scan-line", { y: -20, opacity: 0, duration: 2, ease: "power1.inOut" }, 0.45);
        
        // Main title
        tl.from("#main-title", { y: -50, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.6);
        
        // Flowchart elements
        tl.from("#input-node", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 0.75)
          .from("#expert1", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 0.9)
          .from("#expert2", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 1.05)

          .from("#ai-brain", { scale: 0.5, opacity: 0, duration: 0.8, ease: "back.out(1.7)" }, 1.5);
        
        // SVG connections
        tl.from("#flowchart svg", { opacity: 0, duration: 0.5, ease: "power1.inOut" }, 1.6);
        
        // Energy particles
        tl.from("#particle1", { opacity: 0, scale: 0, duration: 0.4, ease: "back.out(1.7)" }, 1.7)
          .from("#particle2", { opacity: 0, scale: 0, duration: 0.4, ease: "back.out(1.7)" }, 1.75)
          .from("#particle3", { opacity: 0, scale: 0, duration: 0.4, ease: "back.out(1.7)" }, 1.8)
          .from("#particle4", { opacity: 0, scale: 0, duration: 0.4, ease: "back.out(1.7)" }, 1.85);
        
        // Right panel elements
        tl.from("#narration-title", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.9)
          .from("#narration-text", { y: 20, opacity: 0, duration: 0.6, ease: "power2.out" }, 2.0)

          .from("#data-card2", { y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)" }, 2.2);
        
        // Bottom bar

        // Corner decorations
        tl.from(".scene > div:last-child", { opacity: 0, duration: 0.5, ease: "power1.inOut" }, 2.4);
        
        // Add breathing animations
        gsap.to("#data-card1", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut",
            delay: 2.5

            duration: 2.5,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut",
            delay: 2.7

        // Particle drift animations
        gsap.to("#particle1", {

            y: 20,
            duration: 4,
            repeat: 0,

            ease: "none",

            duration: 6,
