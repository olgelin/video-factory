      <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, #FFD700, transparent); border-radius:20px 20px 0 0;"></div>

    <!-- Card 4: 更多... -->
    <div id="card-4" style="flex:1; background:rgba(26,26,46,0.75); backdrop-filter:blur(12px); border:1px solid rgba(0,212,255,0.2); border-radius:20px; padding:36px; position:relative; opacity:1; box-shadow:0 8px 40px rgba(0,0,0,0.5);">
      <div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, rgba(0,212,255,0.5), transparent); border-radius:20px 20px 0 0;"></div>
      <div style="position:absolute; top:0; left:0; right:0; height:100px; background:radial-gradient(ellipse at top, rgba(0,212,255,0.06), transparent); border-radius:20px;"></div>
      <div style="font-size:48px; margin-bottom:16px; text-align:center;">✨</div>

    </div>
  </div>

  <!-- Highlight Bar -->
  <div id="highlight-bar" style="position:absolute; top:620px; left:120px; right:120px; height:4px; background:linear-gradient(90deg, #00D4FF, #FF4081, #FFD700, transparent); opacity:1; border-radius:2px;"></div>

  <!-- Tags Area -->
  <div id="tags-area" style="position:absolute; top:660px; left:120px; display:flex; gap:16px; opacity:1;">
    <div id="tag-1" style="padding:10px 24px; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); border-radius:30px; font-size:18px; color:#00D4FF; letter-spacing:2px;">多模态</div>
    <div id="tag-2" style="padding:10px 24px; background:rgba(255,64,129,0.1); border:1px solid rgba(255,64,129,0.3); border-radius:30px; font-size:18px; color:#FF4081; letter-spacing:2px;">全场景</div>
    <div id="tag-3" style="padding:10px 24px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); border-radius:30px; font-size:18px; color:#FFD700; letter-spacing:2px;">封神</div>
    <div id="tag-4" style="padding:10px 24px; background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.2); border-radius:30px; font-size:18px; color:rgba(0,212,255,0.8); letter-spacing:2px;">NO LIMITS</div>

    <div style="font-size:24px; color:rgba(153,153,153,0.8); margin-top:12px; letter-spacing:2px;">多模态能力直接封神，案例多到数不过来</div>
  </div>

  <!-- Data Watermark Numbers -->
  <div id="data-watermark" style="position:absolute; bottom:80px; right:120px; font-size:120px; font-weight:bold; font-family:'JetBrains Mono',monospace; color:rgba(255,215,0,0.06); line-height:1; opacity:1;">∞</div>

  <!-- Progress Bar Bottom -->
  <div id="progress-bar" style="position:absolute; bottom:60px; left:120px; width:400px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; opacity:1;">
    <div style="width:0%; height:100%; background:linear-gradient(90deg, #00D4FF, #FF4081); border-radius:2px;"></div>

<script>
window.__timelines = window.__timelines || {};

const tl = gsap.timeline({paused: true});

// Phase 1: Background decorations
tl.from("#grid-bg", {opacity:0, duration:1.5, ease:"power1.inOut"}, 0);
tl.from("#glow-1", {opacity:0, scale:0.8, duration:1.8, ease:"power1.inOut"}, 0.1);
tl.from("#glow-2", {opacity:0, scale:0.8, duration:1.8, ease:"power1.inOut"}, 0.2);

// Corner decorations
tl.from("#corner-tl", {opacity:0, x:-20, y:-20, duration:0.8, ease:"power2.out"}, 0.3);
tl.from("#corner-tr", {opacity:0, x:20, y:-20, duration:0.8, ease:"power2.out"}, 0.35);
tl.from("#corner-bl", {opacity:0, x:-20, y:20, duration:0.8, ease:"power2.out"}, 0.4);
tl.from("#corner-br", {opacity:0, x:20, y:20, duration:0.8, ease:"power2.out"}, 0.45);

// Phase 2: Ghost text
tl.from("#ghost-1", {opacity:0, x:-100, duration:1.5, ease:"power2.out"}, 0.5);
tl.from("#ghost-2", {opacity:0, x:100, duration:1.5, ease:"power2.out"}, 0.6);

// Phase 3: Main title
tl.from("#main-title", {y:-60, opacity:0, duration:1, ease:"power3.out"}, 0.8);
tl.from("#subtitle", {y:-30, opacity:0, duration:0.8, ease:"power3.out"}, 1.0);

// Phase 4: Cards with stagger
tl.from("#card-1", {y:80, opacity:0, scale:0.9, duration:0.8, ease:"back.out(1.5)"}, 1.2);
tl.from("#card-2", {y:80, opacity:0, scale:0.9, duration:0.8, ease:"back.out(1.5)"}, 1.35);
tl.from("#card-3", {y:80, opacity:0, scale:0.9, duration:0.8, ease:"back.out(1.5)"}, 1.5);
tl.from("#card-4", {y:80, opacity:0, scale:0.9, duration:0.8, ease:"back.out(1.5)"}, 1.65);

// Highlight bar
tl.from("#highlight-bar", {scaleX:0, transformOrigin:"left", duration:1, ease:"power2.inOut"}, 1.8);

// Phase 5: Tags
tl.from("#tags-area", {opacity:0, y:20, duration:0.6, ease:"power2.out"}, 2.2);
tl.from("#tag-1", {x:-30, opacity:0, duration:0.5, ease:"power2.out"}, 2.3);
tl.from("#tag-2", {x:-30, opacity:0, duration:0.5, ease:"power2.out"}, 2.4);
tl.from("#tag-3", {x:-30, opacity:0, duration:0.5, ease:"power2.out"}, 2.5);
tl.from("#tag-4", {x:-30, opacity:0, duration:0.5, ease:"power2.out"}, 2.6);

// Phase 6: Bottom info
tl.from("#bottom-text", {y:30, opacity:0, duration:0.8, ease:"power2.out"}, 2.8);
tl.from("#data-watermark", {opacity:0, scale:0.8, duration:1.2, ease:"power1.inOut"}, 2.9);
tl.from("#progress-bar", {opacity:0, duration:0.6, ease:"power2.out"}, 3.0);

// Particles
tl.from("#particle-1", {opacity:0, duration:0.8, ease:"power1.inOut"}, 0.6);
tl.from("#particle-2", {opacity:0, duration:0.8, ease:"power1.inOut"}, 0.7);
tl.from("#particle-3", {opacity:0, duration:0.8, ease:"power1.inOut"}, 0.8);
tl.from("#particle-4", {opacity:0, duration:0.8, ease:"power1.inOut"}, 0.9);
tl.from("#particle-5", {opacity:0, duration:0.8, ease:"power1.inOut"}, 1.0);

// Scan line animation
tl.from("#scan-line", {opacity:0, duration:0.5}, 0.3);

// Register timeline
window.__timelines["beat-4"] = tl;

// Breathing animations (perpetual)
// Card breathing
gsap.to("#card-1", {scale:1.02, duration:2.5, repeat: 0, yoyo:true, ease:"sine.inOut", delay:2});
gsap.to("#card-2", {scale:1.02, duration:2.5, repeat: 0, yoyo:true, ease:"sine.inOut", delay:2.2});
gsap.to("#card-3", {scale:1.02, duration:2.5, repeat: 0, yoyo:true, ease:"sine.inOut", delay:2.4});
gsap.to("#card-4", {scale:1.02, duration:2.5, repeat: 0, yoyo:true, ease:"sine.inOut", delay:2.6});

// Title glow pulse
gsap.to("#main-title", {textShadow:"0 0 50px rgba(0,212,255,0.8), 0 0 100px rgba(0,212,255,0.4)", duration:2.5, repeat: 0, yoyo:true, ease:"sine.inOut"});

// Tag border pulse
gsap.to("#tag-1", {borderColor:"rgba(0,212,255,0.6)", duration:2, repeat: 0, yoyo:true, ease:"sine.inOut"});
gsap.to("#tag-3", {borderColor:"rgba(255,215,0,0.6)", duration:2, repeat: 0, yoyo:true, ease:"sine.inOut", delay:0.5});

// Particles drift
gsap.to("#particle-1", {y:-30, x:20, duration:8, repeat: 0, yoyo:true, ease:"none"});
gsap.to("#particle-2", {y:25, x:-15, duration:10, repeat: 0, yoyo:true, ease:"none"});
gsap.to("#particle-3", {y:-20, x:30, duration:12, repeat: 0, yoyo:true, ease:"none"});
gsap.to("#particle-4", {y:35, x:-25, duration:9, repeat: 0, yoyo:true, ease:"none"});
gsap.to("#particle-5", {y:-15, x:10, duration:11, repeat: 0, yoyo:true, ease:"none"});

// Scan line move
gsap.to("#scan-line", {top:"1080px", duration:5, repeat: 0, ease:"none"});

// Glow drift
gsap.to("#glow-1", {y:30, x:20, duration:10, repeat: 0, yoyo:true, ease:"sine.inOut"});
gsap.to("#glow-2", {y:-25, x:-15, duration:12, repeat: 0, yoyo:true, ease:"sine.inOut"});
</script>
</body>
