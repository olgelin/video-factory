<!DOCTYPE html>
<html data-composition-id="beat-4" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <title>beat-4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #0a0a0a; }
    </style>
</head>
<body style="margin:0;padding:0;overflow:hidden;background:#1a1a2e;">
<div class="scene" style="background:#1a1a2e;width: 1920px; height: 1080px; position: relative; overflow: hidden; background: #0a0a0a;">

    <!-- Decorative Layers -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 99px, rgba(0, 212, 255, 0.08) 99px, rgba(0, 212, 255, 0.08) 100px), repeating-linear-gradient(90deg, transparent, transparent 99px, rgba(0, 212, 255, 0.08) 99px, rgba(0, 212, 255, 0.08) 100px); opacity: 0;" id="layer-grid"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 900px; height: 900px; background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%); border-radius: 50%; opacity: 0;" id="layer-glow"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 300px; font-weight: bold; color: rgba(255, 255, 255, 0.04); white-space: nowrap; pointer-events: none; opacity: 0;" id="ghost-text">机遇涌现</div>
    <div style="position: absolute; top: -2px; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4), transparent); opacity: 0;" id="scan-line"></div>
    <div style="position: absolute; top: 100px; left: 120px; width: 40px; height: 2px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-tl-h"></div>
    <div style="position: absolute; top: 100px; left: 120px; width: 2px; height: 40px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-tl-v"></div>
    <div style="position: absolute; top: 100px; right: 120px; width: 40px; height: 2px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-tr-h"></div>
    <div style="position: absolute; top: 100px; right: 120px; width: 2px; height: 40px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-tr-v"></div>
    <div style="position: absolute; bottom: 100px; left: 120px; width: 40px; height: 2px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-bl-h"></div>
    <div style="position: absolute; bottom: 100px; left: 120px; width: 2px; height: 40px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-bl-v"></div>
    <div style="position: absolute; bottom: 100px; right: 120px; width: 40px; height: 2px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-br-h"></div>
    <div style="position: absolute; bottom: 100px; right: 120px; width: 2px; height: 40px; background: rgba(0, 212, 255, 0.3); opacity: 0;" id="corner-br-v"></div>
    <div style="position: absolute; width: 6px; height: 6px; background: rgba(0, 212, 255, 0.6); border-radius: 50%; top: 15%; left: 20%; opacity: 0;" id="particle1"></div>
    <div style="position: absolute; width: 4px; height: 4px; background: rgba(255, 64, 129, 0.7); border-radius: 50%; top: 70%; left: 75%; opacity: 0;" id="particle2"></div>
    <div style="position: absolute; width: 5px; height: 5px; background: rgba(255, 215, 0, 0.6); border-radius: 50%; top: 40%; left: 60%; opacity: 0;" id="particle3"></div>
    <div style="position: absolute; width: 3px; height: 3px; background: rgba(0, 212, 255, 0.5); border-radius: 50%; top: 25%; left: 45%; opacity: 0;" id="particle4"></div>
    <div style="position: absolute; width: 4px; height: 4px; background: rgba(255, 64, 129, 0.5); border-radius: 50%; top: 65%; left: 30%; opacity: 0;" id="particle5"></div>

    <!-- Main Content -->
    <div style="position: absolute; top: 80px; left: 100px; right: 100px; height: 80px;">
        <h1 style="font-family: 'Noto Sans SC', 'Inter', sans-serif; font-size: 96px; font-weight: bold; color: #FFFFFF; line-height: 80px; text-shadow: 0 0 30px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.4); opacity: 0;" id="title-main">新兴赛道井喷</h1>
    </div>

    <!-- Central Timeline -->
    <div style="position: absolute; top: 320px; left: 100px; right: 100px; height: 4px; background: linear-gradient(90deg, rgba(0, 212, 255, 0.1), rgba(0, 212, 255, 0.6), rgba(255, 64, 129, 0.6), rgba(255, 64, 129, 0.1)); border-radius: 2px; opacity: 0;" id="timeline-line"></div>

    <!-- Timeline Nodes -->
    <div style="position: absolute; top: 280px; left: 300px; width: 80px; height: 80px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0;" id="node1">
        <div style="width: 60px; height: 60px; background: radial-gradient(circle, rgba(0, 212, 255, 0.3), transparent 70%); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 14px; color: #FFFFFF; font-weight: bold;">数字孪生</span>
        </div>
    </div>
    <div style="position: absolute; top: 280px; left: 820px; width: 80px; height: 80px; background: rgba(255, 64, 129, 0.1); border: 1px solid rgba(255, 64, 129, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0;" id="node2">
        <div style="width: 60px; height: 60px; background: radial-gradient(circle, rgba(255, 64, 129, 0.3), transparent 70%); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 14px; color: #FFFFFF; font-weight: bold;">元宇宙策划</span>
        </div>
    </div>
    <div style="position: absolute; top: 280px; right: 300px; width: 80px; height: 80px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0;" id="node3">
        <div style="width: 60px; height: 60px; background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent 70%); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 14px; color: #FFFFFF; font-weight: bold;">低碳金融</span>
        </div>
    </div>

    <!-- Tech Tree Branches (SVG) -->
    <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible;">
        <path d="M340,360 C340,460 300,500 250,540" stroke="rgba(0, 212, 255, 0.4)" stroke-width="2" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000" id="branch1"></path>
        <path d="M340,360 C340,480 380,520 420,560" stroke="rgba(0, 212, 255, 0.4)" stroke-width="2" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000" id="branch2"></path>
        <path d="M860,360 C860,460 800,500 750,540" stroke="rgba(255, 64, 129, 0.4)" stroke-width="2" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000" id="branch3"></path>
        <path d="M860,360 C860,480 900,520 940,560" stroke="rgba(255, 64, 129, 0.4)" stroke-width="2" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000" id="branch4"></path>
        <path d="M1320,360 C1320,460 1260,500 1210,540" stroke="rgba(255, 215, 0, 0.4)" stroke-width="2" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000" id="branch5"></path>
        <path d="M1320,360 C1320,480 1360,520 1400,560" stroke="rgba(255, 215, 0, 0.4)" stroke-width="2" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000" id="branch6"></path>
    </svg>

    <!-- Data Cards -->
    <div style="position: absolute; top: 580px; left: 180px; width: 280px; padding: 30px; background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;" id="card1">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent); border-radius: 16px 16px 0 0;"></div>
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 14px; color: #999999; margin-bottom: 10px;">数字孪生</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: bold; color: #FFD700; line-height: 1; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);">47%</div>
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 16px; color: #FFFFFF; margin-top: 10px;">年均增长率</div>
    </div>
    <div style="position: absolute; top: 580px; left: 520px; width: 280px; padding: 30px; background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 64, 129, 0.3); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;" id="card2">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #FF4081, transparent); border-radius: 16px 16px 0 0;"></div>
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 14px; color: #999999; margin-bottom: 10px;">元宇宙策划</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: bold; color: #FFD700; line-height: 1; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);">62%</div>
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 16px; color: #FFFFFF; margin-top: 10px;">人才缺口</div>
    </div>
    <div style="position: absolute; top: 580px; right: 180px; width: 280px; padding: 30px; background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;" id="card3">
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #FFD700, transparent); border-radius: 16px 16px 0 0;"></div>
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 14px; color: #999999; margin-bottom: 10px;">低碳金融</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: bold; color: #FFD700; line-height: 1; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);">85%</div>
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 16px; color: #FFFFFF; margin-top: 10px;">政策驱动</div>
    </div>

    <!-- Comparison Textboxes -->
    <div style="position: absolute; top: 200px; left: 100px; padding: 15px 20px; background: rgba(26, 26, 46, 0.6); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; opacity: 0;" id="compare-old">
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 18px; color: #999999;">十年前</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #FFFFFF; margin-top: 5px;">概念未生</div>
    </div>
    <div style="position: absolute; top: 200px; right: 100px; padding: 15px 20px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 12px; opacity: 0;" id="compare-new">
        <div style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 18px; color: #00D4FF;">现在</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #FFD700; margin-top: 5px;">香饽饽</div>
    </div>

    <!-- Bottom Info -->
    <div style="position: absolute; bottom: 120px; left: 100px; right: 100px; display: flex; justify-content: space-between; align-items: center; opacity: 0;" id="bottom-info">
        <div style="display: flex; gap: 20px;">
            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 18px; color: #666; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;">#高需求赛道</span>
            <span style="font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 18px; color: #666; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;">#缺口巨大</span>
        </div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #666;">2026.04.15</div>
    </div>

</div>

<script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({paused: true});

    // Decorative Layers Animation
    tl.from("#layer-grid", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
    tl.from("#layer-glow", {opacity: 0, scale: 0.9, duration: 1.2, ease: "power1.inOut"}, 0.15);
    tl.from("#ghost-text", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.3);
    tl.from("#scan-line", {opacity: 0, top: "-2px", duration: 4, ease: "none", repeat: 0}, 0.45);
    tl.from("#corner-tl-h, #corner-tl-v, #corner-tr-h, #corner-tr-v, #corner-bl-h, #corner-bl-v, #corner-br-h, #corner-br-v", {opacity: 0, duration: 0.8, ease: "power1.inOut", stagger: 0.1}, 0.6);
    tl.from("#particle1", {opacity: 0, x: -20, y: 20, duration: 6, ease: "none", repeat: 0}, 0.75);
    tl.from("#particle2", {opacity: 0, x: 20, y: -20, duration: 8, ease: "none", repeat: 0}, 0.9);
    tl.from("#particle3", {opacity: 0, x: -15, y: -15, duration: 10, ease: "none", repeat: 0}, 1.05);
    tl.from("#particle4", {opacity: 0, x: 10, y: 15, duration: 7, ease: "none", repeat: 0}, 1.2);
    tl.from("#particle5", {opacity: 0, x: -25, y: 10, duration: 9, ease: "none", repeat: 0}, 1.35);

    // Main Title
    tl.from("#title-main", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.5);

    // Timeline and Nodes
    tl.from("#timeline-line", {scaleX: 0, transformOrigin: "left", opacity: 0, duration: 1, ease: "power2.inOut"}, 0.7);
    tl.from("#node1", {scale: 0, opacity: 0, duration: 0.5, ease: "back.out(1.7)"}, 1.0);
    tl.from("#node2", {scale: 0, opacity: 0, duration: 0.5, ease: "back.out(1.7)"}, 1.15);
    tl.from("#node3", {scale: 0, opacity: 0, duration: 0.5, ease: "back.out(1.7)"}, 1.3);

    // Tech Tree Branches
    tl.to("#branch1, #branch2", {strokeDashoffset: 0, duration: 1.5, ease: "power2.out"}, 1.4);
    tl.to("#branch3, #branch4", {strokeDashoffset: 0, duration: 1.5, ease: "power2.out"}, 1.55);
    tl.to("#branch5, #branch6", {strokeDashoffset: 0, duration: 1.5, ease: "power2.out"}, 1.7);

    // Data Cards
    tl.from("#card1", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.9);
    tl.from("#card2", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.05);
    tl.from("#card3", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 2.2);

    // Comparison Textboxes
    tl.from("#compare-old", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 2.4);
    tl.from("#compare-new", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 2.55);

    // Bottom Info
    tl.from("#bottom-info", {opacity: 0, y: 20, duration: 0.6, ease: "power2.out"}, 2.7);

    // Register timeline
    window.__timelines["beat-4"] = tl;

    // Breathing Animations
    gsap.to("#card1", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut"});
    gsap.to("#card2", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 0.5});
    gsap.to("#card3", {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: "sine.inOut", delay: 1});
    gsap.to("#title-main", {textShadow: "0 0 40px rgba(0, 212, 255, 1), 0 0 80px rgba(0, 212, 255, 0.6)", duration: 2.5, repeat: 0, yoyo: true});
    gsap.to("#layer-glow", {x: 20, y: -15, duration: 10, repeat: 0, yoyo: true, ease: "none"});
    gsap.to("#compare-new", {borderColor: "rgba(0, 212, 255, 0.8)", duration: 2, repeat: 0, yoyo: true});

    // Play timeline
    tl.play();
</script>
</body>
</html>
