<!DOCTYPE html>
<html data-composition-id="beat-4" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; font-family: 'Inter','Noto Sans SC',sans-serif;">
    <div class="scene" style="background:#1a1a2e;position: relative; width: 1920px; height: 1080px; background: #1a1a2e; overflow: hidden;">
        <!-- Background Grid -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 100px, rgba(0,212,255,0.05) 100px, rgba(0,212,255,0.05) 101px), repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(0,212,255,0.05) 100px, rgba(0,212,255,0.05) 101px); opacity: 0.4;"></div>
        
        <!-- Radial Glow -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1200px; height: 1200px; background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, rgba(0,212,255,0.02) 50%, transparent 70%); border-radius: 50%; pointer-events: none;"></div>
        
        <!-- Ghost Text Background -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 300px; font-weight: bold; color: rgba(255,255,255,0.03); pointer-events: none; user-select: none;">DATA</div>
        
        <!-- Scan Line -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent); opacity: 0.6;"></div>
        
        <!-- Corner Decorations -->
        <div style="position: absolute; top: 80px; left: 80px; width: 60px; height: 2px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; top: 80px; left: 80px; width: 2px; height: 60px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; top: 80px; right: 80px; width: 60px; height: 2px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; top: 80px; right: 80px; width: 2px; height: 60px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; bottom: 80px; left: 80px; width: 60px; height: 2px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; bottom: 80px; left: 80px; width: 2px; height: 60px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; bottom: 80px; right: 80px; width: 60px; height: 2px; background: rgba(0,212,255,0.3);"></div>
        <div style="position: absolute; bottom: 80px; right: 80px; width: 2px; height: 60px; background: rgba(0,212,255,0.3);"></div>
        
        <!-- Title Section -->
        <div style="position: absolute; top: 80px; left: 100px; right: 100px; text-align: center;">
            <h1 style="font-size: 96px; font-weight: bold; color: #00D4FF; text-shadow: 0 0 30px rgba(0,212,255,0.6); margin: 0; line-height: 1.2;">利率下行，资金搬家</h1>
            <p style="font-size: 32px; color: rgba(255,255,255,0.7); margin: 20px 0 0;">存款利率一降再降，资金流向何处？</p>
        </div>
        
        <!-- Main Balance Visualization -->
        <div style="position: absolute; top: 240px; left: 100px; right: 100px; height: 500px; display: flex; align-items: center; justify-content: center;">
            <!-- Balance Beam -->
            <div style="position: absolute; top: 200px; left: 50%; transform: translateX(-50%); width: 1400px; height: 4px; background: linear-gradient(90deg, rgba(255,215,0,0.8), rgba(255,64,129,0.8)); border-radius: 2px; box-shadow: 0 0 20px rgba(0,212,255,0.3);"></div>
            
            <!-- Fulcrum -->
            <div style="position: absolute; top: 180px; left: 50%; transform: translateX(-50%); width: 60px; height: 80px; background: linear-gradient(180deg, #00D4FF, rgba(0,212,255,0.3)); clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%); box-shadow: 0 0 30px rgba(0,212,255,0.5);"></div>
            
            <!-- Left Side - Savings -->
            <div style="position: absolute; left: 200px; top: 100px; width: 300px; height: 400px;">
                <!-- Savings Cube -->
                <div style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 200px; background: linear-gradient(135deg, #FFD700, #FFA000); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(255,215,0,0.3); transform: translateX(-50%) rotate(5deg);">
                    <div style="font-size: 48px; font-weight: bold; color: #1a1a2e; font-family: 'JetBrains Mono', monospace;">1.5%</div>
                </div>
                <!-- Label -->
                <div style="position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #FFD700; text-align: center; width: 200px;">银行存款</div>
            </div>
            
            <!-- Right Side - Investments -->
            <div style="position: absolute; right: 200px; top: 100px; width: 400px; height: 400px;">
                <!-- Investment Cubes Group -->
                <div style="position: absolute; bottom: 0; left: 20%; width: 120px; height: 120px; background: linear-gradient(135deg, #FF4081, #C2185B); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(255,64,129,0.4);">
                    <div style="font-size: 28px; font-weight: bold; color: #ffffff; font-family: 'JetBrains Mono', monospace;">3.2%</div>
                </div>
                <div style="position: absolute; bottom: 0; left: 50%; width: 140px; height: 140px; background: linear-gradient(135deg, #00D4FF, #0091EA); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(0,212,255,0.4);">
                    <div style="font-size: 32px; font-weight: bold; color: #ffffff; font-family: 'JetBrains Mono', monospace;">3.8%</div>
                </div>
                <div style="position: absolute; bottom: 0; right: 20%; width: 100px; height: 100px; background: linear-gradient(135deg, #FFD700, #FF6D00); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(255,215,0,0.4);">
                    <div style="font-size: 24px; font-weight: bold; color: #1a1a2e; font-family: 'JetBrains Mono', monospace;">4.1%</div>
                </div>
                <!-- Labels -->
                <div style="position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #00D4FF; text-align: center; width: 400px;">理财/债市</div>
                <div style="position: absolute; bottom: -120px; left: 50%; transform: translateX(-50%); font-size: 20px; color: rgba(255,255,255,0.7); text-align: center; width: 400px;">银行理财 · 国债 · 其他</div>
            </div>
            
            <!-- Floating Particles -->
            <div class="particle" style="position: absolute; top: 300px; left: 400px; width: 8px; height: 8px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px #FFD700;"></div>
            <div class="particle" style="position: absolute; top: 250px; left: 450px; width: 6px; height: 6px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px #FFD700;"></div>
            <div class="particle" style="position: absolute; top: 350px; left: 380px; width: 10px; height: 10px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px #FFD700;"></div>
            <div class="particle" style="position: absolute; top: 280px; left: 420px; width: 5px; height: 5px; background:#1a1a2e; border-radius: 50%; box-shadow: 0 0 10px #FFD700;"></div>
            
            <!-- Arrow Indicators -->
            <div style="position: absolute; top: 300px; left: 600px; width: 300px; height: 4px; background: linear-gradient(90deg, rgba(255,215,0,0.8), rgba(0,212,255,0.8)); transform: rotate(-5deg); opacity: 0.7;"></div>
            <div style="position: absolute; top: 280px; left: 850px; font-size: 20px; color: rgba(0,212,255,0.9); font-weight: bold;">资金流向 →</div>
        </div>
        
        <!-- Data Cards -->
        <div style="position: absolute; top: 780px; left: 100px; right: 100px; display: flex; gap: 40px;">
            <!-- Card 1 - Savings Decrease -->
            <div class="card" style="flex: 1; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255,215,0,0.3); padding: 40px; position: relative; overflow: hidden;">
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #FFD700, transparent);"></div>
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top, rgba(255,215,0,0.08) 0%, transparent 70%);"></div>
                <div style="font-size: 20px; color: rgba(255,255,255,0.7); margin-bottom: 20px;">存款利率</div>
                <div style="font-size: 80px; font-weight: bold; color: #FFD700; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px;">1.5%</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="font-size: 24px; color: rgba(255,64,129,0.9);">▼ 持续下降</div>
                    <div style="font-size: 18px; color: rgba(255,255,255,0.5);">近10年最低</div>
                </div>
            </div>
            
            <!-- Card 2 - Investment Returns -->
            <div class="card" style="flex: 1; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(0,212,255,0.3); padding: 40px; position: relative; overflow: hidden;">
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #00D4FF, transparent);"></div>
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top, rgba(0,212,255,0.08) 0%, transparent 70%);"></div>
                <div style="font-size: 20px; color: rgba(255,255,255,0.7); margin-bottom: 20px;">理财/债市收益</div>
                <div style="font-size: 80px; font-weight: bold; color: #00D4FF; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px;">3.8%</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="font-size: 24px; color: rgba(0,212,255,0.9);">▲ 相对更高</div>
                    <div style="font-size: 18px; color: rgba(255,255,255,0.5);">吸引力更强</div>
                </div>
            </div>
            
            <!-- Card 3 - Fund Transfer -->
            <div class="card" style="flex: 1; background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255,64,129,0.3); padding: 40px; position: relative; overflow: hidden;">
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #FF4081, transparent);"></div>
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top, rgba(255,64,129,0.08) 0%, transparent 70%);"></div>
                <div style="font-size: 20px; color: rgba(255,255,255,0.7); margin-bottom: 20px;">资金转移规模</div>
                <div style="font-size: 80px; font-weight: bold; color: #FF4081; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px;">2.1万亿</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="font-size: 24px; color: rgba(255,64,129,0.9);">短期大额</div>
                    <div style="font-size: 18px; color: rgba(255,255,255,0.5);">近10年首次</div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Tags -->
        <div style="position: absolute; bottom: 100px; left: 100px; right: 100px; display: flex; justify-content: center; gap: 30px;">
            <div class="tag" style="padding: 15px 30px; border: 1px solid rgba(0,212,255,0.5); border-radius: 50px; color: #00D4FF; font-size: 20px; font-weight: bold; background: rgba(0,212,255,0.1);">收益更高</div>
            <div class="tag" style="padding: 15px 30px; border: 1px solid rgba(255,215,0,0.5); border-radius: 50px; color: #FFD700; font-size: 20px; font-weight: bold; background: rgba(255,215,0,0.1);">避险需求</div>
            <div class="tag" style="padding: 15px 30px; border: 1px solid rgba(255,64,129,0.5); border-radius: 50px; color: #FF4081; font-size: 20px; font-weight: bold; background: rgba(255,64,129,0.1);">利率下行</div>
            <div class="tag" style="padding: 15px 30px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; color: rgba(255,255,255,0.8); font-size: 20px; font-weight: bold; background: rgba(255,255,255,0.05);">资产配置</div>
        </div>
        
        <!-- Timeline Indicator -->
        <div style="position: absolute; bottom: 60px; left: 100px; right: 100px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
            <div style="position: absolute; top: 0; left: 0; height: 100%; width: 70%; background: linear-gradient(90deg, #00D4FF, #FF4081); border-radius: 2px;"></div>
            <div style="position: absolute; top: -10px; left: 65%; width: 24px; height: 24px; background:#1a1a2e; border: 3px solid #ffffff; border-radius: 50%; box-shadow: 0 0 15px rgba(255,64,129,0.8);"></div>
        </div>
        <div style="position: absolute; bottom: 30px; left: 100px; font-size: 16px; color: rgba(255,255,255,0.5);">2023年1月 - 2023年2月</div>
        <div style="position: absolute; bottom: 30px; right: 100px; font-size: 16px; color: rgba(255,255,255,0.5); text-align: right;">数据来源：中国人民银行</div>
    </div>

    <script>
        // Initialize timeline
        window.__timelines = window.__timelines || {};
        window.__timelines["beat-4"] = gsap.timeline({paused: true});
        
        // Entrance animations with stagger
        const tl = window.__timelines["beat-4"];
        
        // Background decorations first
        tl.from(".scene > div:first-child", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0);
        
        // Ghost text
        tl.from(".scene > div:nth-child(2)", {opacity: 0, duration: 1.2, ease: "power1.inOut"}, 0.15);
        
        // Title
        tl.from("h1", {y: -50, opacity: 0, duration: 0.8, ease: "power3.out"}, 0.3);
        tl.from("h1 + p", {y: -30, opacity: 0, duration: 0.7, ease: "power3.out"}, 0.45);
        
        // Balance visualization
        tl.from(".scene > div:nth-child(7) > div:first-child", {scaleX: 0, transformOrigin: "center", duration: 1, ease: "power2.inOut"}, 0.6);
        tl.from(".scene > div:nth-child(7) > div:nth-child(2)", {opacity: 0, scale: 0.5, duration: 0.8, ease: "back.out(1.7)"}, 0.75);
        
        // Savings cube
        tl.from(".scene > div:nth-child(7) > div:nth-child(3) > div:first-child", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 0.9);
        tl.from(".scene > div:nth-child(7) > div:nth-child(3) > div:nth-child(2)", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.05);
        
        // Investment cubes
        tl.from(".scene > div:nth-child(7) > div:nth-child(4) > div:first-child", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.2);
        tl.from(".scene > div:nth-child(7) > div:nth-child(4) > div:nth-child(2)", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.35);
        tl.from(".scene > div:nth-child(7) > div:nth-child(4) > div:nth-child(3)", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)"}, 1.5);
        tl.from(".scene > div:nth-child(7) > div:nth-child(4) > div:nth-child(4)", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.65);
        tl.from(".scene > div:nth-child(7) > div:nth-child(4) > div:nth-child(5)", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 1.8);
        
        // Particles
        tl.from(".particle", {opacity: 0, duration: 1, ease: "power1.inOut"}, 1.95);
        
        // Arrow indicators
        tl.from(".scene > div:nth-child(7) > div:nth-child(6)", {scaleX: 0, transformOrigin: "left", duration: 1, ease: "power2.inOut"}, 2.1);
        tl.from(".scene > div:nth-child(7) > div:nth-child(7)", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 2.25);
        
        // Data cards
        tl.from(".card", {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.7)", stagger: 0.15}, 2.4);
        
        // Tags
        tl.from(".tag", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.15}, 3.1);
        
        // Timeline indicator
        tl.from(".scene > div:nth-child(11)", {scaleX: 0, transformOrigin: "left", duration: 1.2, ease: "power2.inOut"}, 3.55);
        tl.from(".scene > div:nth-child(11) > div:nth-child(2)", {scale: 0, duration: 0.5, ease: "back.out(1.7)"}, 3.85);
        tl.from(".scene > div:nth-child(12)", {x: -30, opacity: 0, duration: 0.5, ease: "power2.out"}, 4.0);
        tl.from(".scene > div:nth-child(13)", {x: 30, opacity: 0, duration: 0.5, ease: "power2.out"}, 4.15);
        
        // Breathing animations for key elements
        gsap.to(".card", {
            scale: 1.015,
            duration: 3,
            repeat: 0,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        gsap.to("h1", {
            textShadow: "0 0 40px rgba(0,212,255,0.8)",
            opacity: 0.9,
            duration: 2.5,
            repeat: 0,
            yoyo: true
        });
        
        // Particle drift animation
        gsap.to(".particle", {
            x: 150,
            y: -200,
            duration: 6,
            repeat: 0,
            yoyo: true,
            ease: "none",
            stagger: {
                each: 1.5,
                from: "random"
            }
        });
        
        // Scan line animation
        gsap.to(".scene > div:nth-child(5)", {
            y: 1080,
            duration: 5,
            repeat: 0,
            ease: "none"
        });
        
        // Tag border color pulse
        gsap.to(".tag", {
            borderColor: "rgba(0,212,255,0.8)",
            duration: 2,
            repeat: 0,
            yoyo: true,
            stagger: {
                each: 0.5,
                from: "random"
            }
        });
        
        // Start the timeline
        window.__timelines["beat-4"].play();
    </script>
</body>
</html>
