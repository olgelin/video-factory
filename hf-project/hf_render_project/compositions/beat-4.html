<!DOCTYPE html>
<html lang="zh-CN" data-composition-id="beat-4" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>Cyber Tech Contrast - Beat 4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body style="margin:0; padding:0; overflow:hidden; background:#0a0a0a; font-family:'Inter','Noto Sans SC',sans-serif; color:#FFFFFF;">

<div class="scene" style="background:#1a1a2e;" style="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0a0a0a;">

    <!-- Background Layer 1: Radial Glow -->
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 40% 50%, rgba(0, 212, 255, 0.15) 0%, transparent 50%), radial-gradient(circle at 60% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%); opacity:0; pointer-events:none;" id="bg-glow"></div>

    <!-- Background Layer 2: Data Grid -->
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px); background-size: 60px 60px; opacity:0; pointer-events:none;" id="bg-grid"></div>

    <!-- Background Layer 3: Scanline -->
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 212, 255, 0.03) 2px, rgba(0, 212, 255, 0.03) 4px); opacity:0; pointer-events:none;" id="bg-scanline"></div>

    <!-- Ghost Text Watermark -->
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(-15deg); font-family:'JetBrains Mono',monospace; font-size:150px; font-weight:bold; color:rgba(255, 255, 255, 0.03); white-space:nowrap; opacity:0; pointer-events:none; user-select:none;" id="ghost-text">DUTY SACRIFICE HERO</div>

    <!-- Main Content Container -->
    <div style="position:absolute; top:80px; left:80px; right:80px; bottom:80px; display:flex; flex-direction:column; align-items:center; justify-content:center;">

        <!-- Central Title - SLAMS DOWN -->
        <h1 style="font-family:'Noto Sans SC',sans-serif; font-size:96px; font-weight:bold; color:#FFFFFF; text-shadow: 0 0 20px #00D4FF, 0 0 40px #00D4FF; margin:0 0 40px 0; opacity:0; transform:translateY(-100px);" id="title">生的希望 vs 沉重的代价</h1>

        <!-- Central Neon Divider Line -->
        <div style="width:4px; height:70%; background:linear-gradient(180deg, transparent, #00D4FF, #FF4081, transparent); box-shadow: 0 0 20px #00D4FF, 0 0 40px #FF4081; margin:0 auto; opacity:0; transform:scaleY(0); position:absolute; top:15%; z-index:10;" id="divider-line"></div>

        <!-- Left Panel: Hope -->
        <div style="position:absolute; left:0; top:15%; width:48%; height:70%; display:flex; flex-direction:column; justify-content:space-between; padding:40px; opacity:0; transform:translateX(-100%);" id="panel-left">
            <div style="background:rgba(0, 212, 255, 0.08); border:1px solid rgba(0, 212, 255, 0.4); border-radius:24px; padding:30px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);">
                <div style="font-family:'JetBrains Mono',monospace; font-size:64px; font-weight:bold; color:#00D4FF; text-shadow: 0 0 10px #00D4FF;">97%</div>
                <div style="font-size:28px; color:#999999; margin-top:10px;">存活希望指数</div>
                <div style="width:100%; height:12px; background:rgba(0, 212, 255, 0.2); border-radius:6px; margin-top:20px; overflow:hidden;">
                    <div style="width:97%; height:100%; background:linear-gradient(90deg, #00D4FF, #0099FF); border-radius:6px; box-shadow: 0 0 10px #00D4FF;"></div>
                </div>
            </div>

            <div style="display:flex; gap:20px; align-items:center;">
                <div style="background:rgba(0, 212, 255, 0.15); border:1px solid #00D4FF; border-radius:50px; padding:15px 30px; font-size:24px; color:#00D4FF;">生还者轮廓</div>
                <div style="font-size:28px; color:#FFFFFF;">模糊的获救者身影，闪烁的数据流象征生命的延续。</div>
            </div>
        </div>

        <!-- Right Panel: Cost -->
        <div style="position:absolute; right:0; top:15%; width:48%; height:70%; display:flex; flex-direction:column; justify-content:space-between; padding:40px; opacity:0; transform:translateX(100%);" id="panel-right">
            <div style="background:rgba(255, 215, 0, 0.08); border:1px solid rgba(255, 215, 0, 0.4); border-radius:24px; padding:30px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); transform:scale(1.0);">
                <div style="font-family:'JetBrains Mono',monospace; font-size:64px; font-weight:bold; color:#FFD700; text-shadow: 0 0 10px #FFD700;">44</div>
                <div style="font-size:28px; color:#999999; margin-top:10px;">英雄的年轮（岁）</div>
                <div style="width:100%; height:12px; background:rgba(255, 215, 0, 0.2); border-radius:6px; margin-top:20px; overflow:hidden;">
                    <div style="width:100%; height:100%; background:linear-gradient(90deg, #FFD700, #FF9900); border-radius:6px; box-shadow: 0 0 10px #FFD700;"></div>
                </div>
            </div>

            <div style="display:flex; gap:20px; align-items:center; flex-direction:row-reverse;">
                <div style="background:rgba(255, 64, 129, 0.15); border:1px solid #FF4081; border-radius:50px; padding:15px 30px; font-size:24px; color:#FF4081;">英雄剪影</div>
                <div style="font-size:28px; color:#FFFFFF; text-align:right;">沉重的数据块，英雄坚定的背影，天平倾向他人。</div>
            </div>
        </div>

    </div>

    <!-- Foreground Layer: Particle Drift -->
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; opacity:0;" id="particles-container">
        <!-- Light Motes (Left) -->
        <div style="position:absolute; left:10%; top:30%; width:8px; height:8px; background:#00D4FF; border-radius:50%; box-shadow: 0 0 10px #00D4FF; opacity:0.8;"></div>
        <div style="position:absolute; left:15%; top:60%; width:6px; height:6px; background:#00D4FF; border-radius:50%; box-shadow: 0 0 8px #00D4FF; opacity:0.6;"></div>
        <div style="position:absolute; left:8%; top:70%; width:10px; height:10px; background:#00D4FF; border-radius:50%; box-shadow: 0 0 12px #00D4FF; opacity:0.7;"></div>
        <!-- Sparks (Right) -->
        <div style="position:absolute; right:10%; top:40%; width:4px; height:4px; background:#1a1a2e; box-shadow: 0 0 8px #FFD700; transform:rotate(45deg); opacity:0.9;"></div>
        <div style="position:absolute; right:15%; top:55%; width:3px; height:3px; background:#1a1a2e; box-shadow: 0 0 6px #FFD700; transform:rotate(45deg); opacity:0.8;"></div>
        <div style="position:absolute; right:20%; top:65%; width:5px; height:5px; background:#1a1a2e; box-shadow: 0 0 10px #FFD700; transform:rotate(45deg); opacity:0.7;"></div>
    </div>

</div>

<script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({paused: true});
    window.__timelines["beat-4"] = tl;

    // Background layers fade in
    tl.to("#bg-glow", {opacity: 1, duration: 0.8, ease: "power2.out"}, 0);
    tl.to("#bg-grid", {opacity: 1, duration: 1, ease: "power2.out"}, 0.1);
    tl.to("#bg-scanline", {opacity: 1, duration: 1.2, ease: "power2.out"}, 0.15);
    tl.to("#ghost-text", {opacity: 1, duration: 2, ease: "power2.out"}, 0.2);

    // Central title SLAMS DOWN
    tl.to("#title", {opacity: 1, y: 0, duration: 0.6, ease: "expo.out"}, 0.3);

    // Divider line appears and pulses
    tl.to("#divider-line", {opacity: 1, scaleY: 1, duration: 0.8, ease: "expo.out"}, 0.5);
    tl.to("#divider-line", {boxShadow: "0 0 30px #00D4FF, 0 0 60px #FF4081", duration: 1.5, ease: "power1.inOut", yoyo: true, repeat: 0}, 1.3);

    // Left panel SPLITS APART to left
    tl.to("#panel-left", {opacity: 1, x: 0, duration: 0.9, ease: "expo.out"}, 0.7);

    // Right panel SPLITS APART to right
    tl.to("#panel-right", {opacity: 1, x: 0, duration: 0.9, ease: "expo.out"}, 0.8);

    // Inner elements stagger in
    tl.from("#panel-left > div", {opacity: 0, y: 30, duration: 0.6, stagger: 0.15, ease: "power3.out"}, 1.0);
    tl.from("#panel-right > div", {opacity: 0, y: 30, duration: 0.6, stagger: 0.15, ease: "power3.out"}, 1.1);

    // Particles container appears
    tl.to("#particles-container", {opacity: 1, duration: 0.5}, 1.2);

    // Right card breathing animation (scale pulse)
    tl.to("#panel-right > div:first-child", {scale: 1.02, duration: 2.5, ease: "sine.inOut", yoyo: true, repeat: 0}, 1.5);

    // Final data elements float/morph slightly for atmosphere
    tl.to("#panel-left > div:first-child", {y: -5, duration: 3, ease: "sine.inOut", yoyo: true, repeat: 0}, 2.0);
    tl.to("#panel-right > div:first-child", {y: -3, duration: 2.5, ease: "sine.inOut", yoyo: true, repeat: 0}, 2.1);

    // Start the timeline
    tl.play();
</script>

</body>
</html>
