<!DOCTYPE html>
<html data-composition-id="beat-4" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background: #1a1a2e; font-family: 'Inter','Noto Sans SC',sans-serif; overflow: hidden;">
    <div class="scene" style="background:#1a1a2e; width: 100vw; height: 100vh; position: relative; padding: 80px;">
        <!-- Background Grid -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.03;">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(90deg, #00D4FF 0px, transparent 1px, transparent 80px);"></div>
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, #00D4FF 0px, transparent 1px, transparent 80px);"></div>
        </div>
        
        <!-- Neon Glow Background -->
        <div style="position: absolute; top: 50%; left: 50%; width: 600px; height: 600px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, rgba(255,64,129,0.05) 50%, transparent 70%); border-radius: 50%;"></div>
        
        <!-- Scan Lines -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px); pointer-events: none;"></div>
        
        <!-- Ghost Text -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 200px; font-weight: bold; color: rgba(255,255,255,0.03); letter-spacing: 20px;">DIVERSION</div>
        
        <!-- Title -->
        <div id="title" style="position: absolute; top: 40px; left: 80px; font-size: 80px; font-weight: bold; color: #FFFFFF; text-shadow: 0 0 20px rgba(0,212,255,0.8), 0 0 40px rgba(0,212,255,0.4);">
            <span style="color: #FFD700;">第二</span>去向
        </div>
        
        <!-- Deposit Pool -->
        <div id="deposit-pool" style="position: absolute; left: 200px; top: 300px; width: 200px; height: 200px; background: rgba(255,215,0,0.1); border: 2px solid #FFD700; border-radius: 24px; display: flex; align-items: center; justify-content: center;">
            <div style="font-size: 36px; font-weight: bold; color: #FFD700;">存款池</div>
            <div style="position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #999999;">2万亿</div>
        </div>
        
        <!-- Main Flow Path -->
        <svg id="main-flow" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
            <path d="M 400 400 Q 600 400 700 350" stroke="url(#gold-gradient)" stroke-width="8" fill="none" stroke-dasharray="1000" stroke-dashoffset="1000"/>
            <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#FFD700"/>
                <stop offset="100%" style="stop-color:#FF4081"/>
            </linearGradient>
        </svg>
        
        <!-- Diversion Point -->
        <div id="diversion-point" style="position: absolute; left: 680px; top: 330px; width: 60px; height: 60px; background: rgba(255,64,129,0.2); border: 2px solid #FF4081; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <div style="font-size: 24px; color: #FF4081;">分流</div>
        </div>
        
        <!-- Rainbow Flow to Financial Products -->
        <svg id="rainbow-flow" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
            <path d="M 740 360 Q 900 300 1000 350" stroke="url(#rainbow-gradient)" stroke-width="6" fill="none" stroke-dasharray="800" stroke-dashoffset="800"/>
            <linearGradient id="rainbow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#FF4081"/>
                <stop offset="25%" style="stop-color:#FFD700"/>
                <stop offset="50%" style="stop-color:#00D4FF"/>
                <stop offset="75%" style="stop-color:#FF4081"/>
                <stop offset="100%" style="stop-color:#FFD700"/>
            </linearGradient>
        </svg>
        
        <!-- Blue Flow to Bond Market -->
        <svg id="blue-flow" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
            <path d="M 740 380 Q 850 450 950 420" stroke="#00D4FF" stroke-width="6" fill="none" stroke-dasharray="600" stroke-dashoffset="600"/>
        </svg>
        
        <!-- Financial Products Matrix -->
        <div id="financial-products" style="position: absolute; right: 200px; top: 200px; width: 300px; height: 300px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 20px;">
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(255,64,129,0.2); border: 1px solid #FF4081; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(0deg);">
                <div style="font-size: 24px; color: #FF4081;">¥</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(255,215,0,0.2); border: 1px solid #FFD700; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(45deg);">
                <div style="font-size: 24px; color: #FFD700;">$</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(0,212,255,0.2); border: 1px solid #00D4FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(90deg);">
                <div style="font-size: 24px; color: #00D4FF;">€</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(255,64,129,0.2); border: 1px solid #FF4081; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(135deg);">
                <div style="font-size: 24px; color: #FF4081;">£</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(255,215,0,0.2); border: 1px solid #FFD700; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(180deg);">
                <div style="font-size: 24px; color: #FFD700;">¥</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(0,212,255,0.2); border: 1px solid #00D4FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(225deg);">
                <div style="font-size: 24px; color: #00D4FF;">$</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(255,64,129,0.2); border: 1px solid #FF4081; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(270deg);">
                <div style="font-size: 24px; color: #FF4081;">€</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(255,215,0,0.2); border: 1px solid #FFD700; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(315deg);">
                <div style="font-size: 24px; color: #FFD700;">£</div>
            </div>
            <div class="product-icon" style="width: 70px; height: 70px; background: rgba(0,212,255,0.2); border: 1px solid #00D4FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; transform: rotate(360deg);">
                <div style="font-size: 24px; color: #00D4FF;">¥</div>
            </div>
        </div>
        
        <!-- Financial Products Label -->
        <div id="financial-label" style="position: absolute; right: 280px; top: 520px; font-size: 36px; font-weight: bold; color: #FF4081; text-shadow: 0 0 10px rgba(255,64,129,0.5);">银行理财</div>
        
        <!-- Bond Market Chart -->
        <div id="bond-chart" style="position: absolute; right: 200px; bottom: 200px; width: 300px; height: 200px; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.3); border-radius: 24px; padding: 20px; overflow: hidden;">
            <svg viewBox="0 0 260 160" style="width: 100%; height: 100%;">
                <path d="M 10 150 Q 30 140 50 130 T 90 110 T 130 90 T 170 70 T 210 50 T 250 30" stroke="#00D4FF" stroke-width="3" fill="none"/>
                <path d="M 10 150 Q 30 140 50 130 T 90 110 T 130 90 T 170 70 T 210 50 T 250 30 V 160 H 10 Z" fill="url(#bond-gradient)" opacity="0.3"/>
                <linearGradient id="bond-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.4"/>
                    <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0"/>
                </linearGradient>
            </svg>
        </div>
        
        <!-- Bond Market Label -->
        <div id="bond-label" style="position: absolute; right: 280px; bottom: 160px; font-size: 36px; font-weight: bold; color: #00D4FF; text-shadow: 0 0 10px rgba(0,212,255,0.5);">债券市场</div>
        
        <!-- Interest Rate Down Arrow -->
        <div id="rate-arrow" style="position: absolute; left: 100px; top: 550px; display: flex; flex-direction: column; align-items: center;">
            <div style="font-size: 24px; color: #FF4081; margin-bottom: 10px;">存款利率下降</div>
            <svg width="60" height="80" viewBox="0 0 60 80">
                <path d="M 30 5 L 55 60 L 5 60 Z" fill="#FF4081"/>
            </svg>
            <div style="font-size: 36px; font-weight: bold; font-family: 'JetBrains Mono', monospace; color: #FF4081; margin-top: 10px;">2.5%</div>
            <div style="font-size: 20px; color: #999999; margin-top: 5px;">→ 1.5%</div>
        </div>
        
        <!-- Data Card 1 -->
        <div id="data-card-1" style="position: absolute; left: 80px; bottom: 200px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; width: 300px;">
            <div style="font-size: 28px; color: #999999; margin-bottom: 15px;">口播内容</div>
            <div style="font-size: 32px; color: #FFFFFF; line-height: 1.5;">钱在往"理财"和"债市"里搬家</div>
        </div>
        
        <!-- Data Card 2 -->
        <div id="data-card-2" style="position: absolute; left: 80px; bottom: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; width: 300px;">
            <div style="font-size: 28px; color: #999999; margin-bottom: 15px;">目标</div>
            <div style="font-size: 32px; color: #FFFFFF; line-height: 1.5;">找比存款利息高一点、风险又不太大的地方</div>
        </div>
        
        <!-- Particles Container -->
        <div id="particles" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
    </div>

    <script>
        // Register timeline
        if (!window.__timelines) window.__timelines = {};
        window.__timelines["beat-4"] = gsap.timeline({paused: true});
        
        // Create particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.borderRadius = '50%';
            particle.style.background = 0.5 > 0.5 ? '#FFD700' : '#00D4FF';
            particle.style.left = '400px';
            particle.style.top = '400px';
            particle.style.opacity = '0';
            particlesContainer.appendChild(particle);
        }
        
        // Timeline animations
        const tl = window.__timelines["beat-4"];
        
        // Title animation
        tl.from("#title", {duration: 1, y: -50, opacity: 0, ease: "expo.out"});
        
        // Deposit pool animation
        tl.from("#deposit-pool", {duration: 1, scale: 0.5, opacity: 0, ease: "expo.out"}, "-=0.85");
        
        // Main flow animation
        tl.from("#main-flow path", {duration: 1.5, strokeDashoffset: 0, ease: "power4.in"}, "-=0.7");
        
        // Diversion point animation
        tl.from("#diversion-point", {duration: 0.8, scale: 0, opacity: 0, ease: "expo.out"}, "-=1.3");
        
        // Rainbow flow animation
        tl.from("#rainbow-flow path", {duration: 1.2, strokeDashoffset: 0, ease: "power4.in"}, "-=0.5");
        
        // Blue flow animation
        tl.from("#blue-flow path", {duration: 1.2, strokeDashoffset: 0, ease: "power4.in"}, "-=1.2");
        
        // Financial products animation
        tl.from(".product-icon", {duration: 0.8, scale: 0, rotation: 0, opacity: 0, stagger: 0.15, ease: "expo.out"}, "-=0.8");
        
        // Financial label animation
        tl.from("#financial-label", {duration: 0.8, x: 50, opacity: 0, ease: "expo.out"}, "-=0.6");
        
        // Bond chart animation
        tl.from("#bond-chart", {duration: 1, scaleY: 0, opacity: 0, transformOrigin: "bottom", ease: "expo.out"}, "-=0.4");
        
        // Bond label animation
        tl.from("#bond-label", {duration: 0.8, x: 50, opacity: 0, ease: "expo.out"}, "-=0.6");
        
        // Rate arrow animation
        tl.from("#rate-arrow", {duration: 1, y: -30, opacity: 0, ease: "expo.out"}, "-=0.8");
        
        // Data cards animation
        tl.from("#data-card-1", {duration: 0.8, y: 50, opacity: 0, ease: "expo.out"}, "-=0.6");
        tl.from("#data-card-2", {duration: 0.8, y: 50, opacity: 0, ease: "expo.out"}, "-=0.65");
        
        // Particles animation
        tl.from("#particles div", {duration: 0.5, opacity: 0, scale: 0, stagger: 0.05, ease: "expo.out"}, "-=0.5");
        
        // Card breathing animation (repeat: 0)
        gsap.to("#data-card-1", {duration: 2.5, scale: 1.02, repeat: 0, yoyo: true, ease: "power1.inOut"});
        gsap.to("#data-card-2", {duration: 2.5, scale: 1.02, repeat: 0, yoyo: true, ease: "power1.inOut", delay: 0.3});
        
        // Product icons rotation animation (repeat: 0)
        gsap.to(".product-icon", {duration: 8, rotation: "+=360", repeat: 0, ease: "none", stagger: 0.2});
        
        // Particles drift animation
        gsap.to("#particles div", {
            duration: 15.3,
            x: "random(-200, 200)",
            y: "random(-100, 100)",
            opacity: 0.7,
            repeat: 0,
            yoyo: true,
            ease: "power1.inOut",
            stagger: 0.3
        });
    </script>
</body>
</html>
