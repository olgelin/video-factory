<!DOCTYPE html>
<html lang="zh-CN" data-composition-id="beat-4" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
    <meta charset="UTF-8">
    <title>科技心脏：硬实力在说话</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="margin:0;padding:0;overflow:hidden;background:#1a1a2e;font-family:'Inter','Noto Sans SC',sans-serif;color:#FFFFFF;">
    <div class="scene" style="position:relative;width:1920px;height:1080px;overflow:hidden;background:#1a1a2e;">
        
        <!-- Decorative Layers -->
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 99px,rgba(0,212,255,0.1) 99px,rgba(0,212,255,0.1) 100px),repeating-linear-gradient(90deg,transparent,transparent 99px,rgba(0,212,255,0.1) 99px,rgba(0,212,255,0.1) 100px);opacity:1;"></div>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(0,212,255,0.15) 0%,transparent 70%);opacity:1;"></div>
        <div style="position:absolute;top:100px;left:100px;width:1720px;height:880px;border:1px solid rgba(0,212,255,0.3);border-radius:24px;opacity:1;"></div>
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(0,212,255,0.1),transparent);opacity:1;transform:translateY(-100%);"></div>
        
        <!-- Ghost Text -->
        <div style="position:absolute;top:300px;left:200px;font-family:'JetBrains Mono',monospace;font-size:250px;font-weight:bold;color:rgba(255,255,255,0.04);opacity:1;">TECH</div>
        <div style="position:absolute;top:500px;left:600px;font-family:'JetBrains Mono',monospace;font-size:200px;font-weight:bold;color:rgba(255,255,255,0.03);opacity:1;">HEART</div>
        
        <!-- Main Title -->
        <div style="position:absolute;top:80px;left:100px;width:1720px;text-align:center;font-size:90px;font-weight:bold;color:#00D4FF;text-shadow:0 0 30px rgba(0,212,255,0.8),0 0 60px rgba(0,212,255,0.4);opacity:1;">科技心脏：硬实力在说话</div>
        
        <!-- Chip Heart Visual -->
        <div style="position:absolute;top:250px;left:150px;width:300px;height:300px;display:flex;justify-content:center;align-items:center;opacity:1;">
            <div style="width:200px;height:200px;background:radial-gradient(circle,rgba(0,212,255,0.8),rgba(255,64,129,0.6));border-radius:50%;box-shadow:0 0 40px rgba(0,212,255,0.6),0 0 80px rgba(0,212,255,0.3);animation: pulse 3s ease-in-out 3;"></div>
        </div>
        
        <!-- Bar Chart Area -->
        <div style="position:absolute;top:250px;left:500px;width:800px;height:400px;opacity:1;">
            <div style="position:absolute;bottom:0;left:100px;width:80px;height:300px;background:linear-gradient(to top,#FF4081,#FFD700);border-radius:8px 8px 0 0;transform-origin:bottom;transform:scaleY(0);"></div>
            <div style="position:absolute;bottom:0;left:300px;width:80px;height:200px;background:linear-gradient(to top,rgba(0,212,255,0.5),rgba(0,212,255,0.2));border-radius:8px 8px 0 0;transform-origin:bottom;transform:scaleY(0);"></div>
            <div style="position:absolute;bottom:0;left:500px;width:80px;height:150px;background:linear-gradient(to top,rgba(255,255,255,0.3),rgba(255,255,255,0.1));border-radius:8px 8px 0 0;transform-origin:bottom;transform:scaleY(0);"></div>
            <div style="position:absolute;bottom:-40px;left:100px;font-size:20px;color:#999;font-family:'JetBrains Mono',monospace;">科技产品</div>
            <div style="position:absolute;bottom:-40px;left:300px;font-size:20px;color:#999;font-family:'JetBrains Mono',monospace;">整体外贸</div>
            <div style="position:absolute;bottom:-40px;left:500px;font-size:20px;color:#999;font-family:'JetBrains Mono',monospace;">其他品类</div>
        </div>
        
        <!-- Data Cards -->
        <div style="position:absolute;top:200px;right:150px;width:350px;padding:30px;background:rgba(26,26,46,0.7);backdrop-filter:blur(10px);border:1px solid rgba(0,212,255,0.3);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:1;">
            <div style="font-size:16px;color:#999;margin-bottom:10px;">高科技产品出口</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:bold;color:#FFD700;">4.2万亿</div>
            <div style="font-size:24px;color:#00D4FF;margin-top:10px;">+25% ↑ 最快增长</div>
        </div>
        <div style="position:absolute;top:450px;right:150px;width:350px;padding:30px;background:rgba(26,26,46,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,64,129,0.3);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.4);opacity:1;">
            <div style="font-size:16px;color:#999;margin-bottom:10px;">关键产品</div>
            <div style="display:flex;gap:20px;margin-top:20px;">
                <div style="width:60px;height:60px;background:rgba(0,212,255,0.2);border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:28px;">芯片</div>
                <div style="width:60px;height:60px;background:rgba(255,64,129,0.2);border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:28px;">汽车</div>
                <div style="width:60px;height:60px;background:rgba(255,215,0,0.2);border-radius:12px;display:flex;justify-content:center;align-items:center;font-size:28px;">设备</div>
            </div>
        </div>
        
        <!-- Labels and Tags -->
        <div style="position:absolute;top:650px;right:200px;padding:10px 20px;background:rgba(0,212,255,0.2);border:1px solid #00D4FF;border-radius:20px;font-size:24px;color:#00D4FF;opacity:1;">硬实力</div>
        <div style="position:absolute;top:700px;right:300px;padding:10px 20px;background:rgba(255,64,129,0.2);border:1px solid #FF4081;border-radius:20px;font-size:24px;color:#FF4081;opacity:1;">科技心脏</div>
        
        <!-- Bottom Info - Voiceover -->
        <div style="position:absolute;bottom:100px;left:100px;width:1720px;text-align:center;font-size:30px;color:#FFFFFF;line-height:1.5;opacity:1;">
            细品数据，高科技产品出口涨得最猛，芯片、新能源车、智能设备，这些才是外贸的‘科技心脏’。作为科技迷，你懂的，这才是硬实力在说话。
        </div>
        
        <!-- Corner Decorations -->
        <div style="position:absolute;top:100px;left:100px;width:50px;height:50px;border-top:2px solid rgba(0,212,255,0.3);border-left:2px solid rgba(0,212,255,0.3);opacity:1;"></div>
        <div style="position:absolute;top:100px;right:100px;width:50px;height:50px;border-top:2px solid rgba(0,212,255,0.3);border-right:2px solid rgba(0,212,255,0.3);opacity:1;"></div>
        <div style="position:absolute;bottom:100px;left:100px;width:50px;height:50px;border-bottom:2px solid rgba(0,212,255,0.3);border-left:2px solid rgba(0,212,255,0.3);opacity:1;"></div>
        <div style="position:absolute;bottom:100px;right:100px;width:50px;height:50px;border-bottom:2px solid rgba(0,212,255,0.3);border-right:2px solid rgba(0,212,255,0.3);opacity:1;"></div>
        
    </div>

    <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({paused: true});
        window.__timelines["beat-4"] = tl;

        // Background Decorations
        tl.from('.scene > div:nth-child(1)', {opacity: 0, duration: 1.2, ease: 'power1.inOut'}, 0);
        tl.from('.scene > div:nth-child(2)', {opacity: 0, duration: 1.2, ease: 'power1.inOut'}, 0.15);
        tl.from('.scene > div:nth-child(3)', {opacity: 0, duration: 1.2, ease: 'power1.inOut'}, 0.3);
        tl.from('.scene > div:nth-child(4)', {opacity: 0, y: '-100%', duration: 4, ease: 'none', repeat: 0}, 0.45);

        // Ghost Text
        tl.from('.scene > div:nth-child(5)', {opacity: 0, duration: 1, ease: 'power2.inOut'}, 0.6);
        tl.from('.scene > div:nth-child(6)', {opacity: 0, duration: 1, ease: 'power2.inOut'}, 0.75);

        // Main Title
        tl.from('.scene > div:nth-child(7)', {y: -50, opacity: 0, duration: 0.8, ease: 'power3.out'}, 0.9);

        // Chip Heart
        tl.from('.scene > div:nth-child(8)', {scale: 0.5, opacity: 0, duration: 0.7, ease: 'back.out(1.7)'}, 1.05);

        // Bar Chart Bars
        tl.from('.scene > div:nth-child(9) > div:nth-child(1)', {scaleY: 0, duration: 1, ease: 'power2.inOut'}, 1.2);
        tl.from('.scene > div:nth-child(9) > div:nth-child(2)', {scaleY: 0, duration: 1, ease: 'power2.inOut'}, 1.35);
        tl.from('.scene > div:nth-child(9) > div:nth-child(3)', {scaleY: 0, duration: 1, ease: 'power2.inOut'}, 1.5);
        tl.from('.scene > div:nth-child(9) > div:nth-child(4)', {opacity: 0, duration: 0.5, ease: 'power2.out'}, 1.65);
        tl.from('.scene > div:nth-child(9) > div:nth-child(5)', {opacity: 0, duration: 0.5, ease: 'power2.out'}, 1.8);
        tl.from('.scene > div:nth-child(9) > div:nth-child(6)', {opacity: 0, duration: 0.5, ease: 'power2.out'}, 1.95);

        // Data Cards
        tl.from('.scene > div:nth-child(10)', {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: 'back.out(1.7)'}, 2.1);
        tl.from('.scene > div:nth-child(11)', {y: 60, opacity: 0, scale: 0.9, duration: 0.7, ease: 'back.out(1.7)'}, 2.25);

        // Labels
        tl.from('.scene > div:nth-child(12)', {x: -30, opacity: 0, duration: 0.5, ease: 'power2.out'}, 2.4);
        tl.from('.scene > div:nth-child(13)', {x: -30, opacity: 0, duration: 0.5, ease: 'power2.out'}, 2.55);

        // Bottom Info
        tl.from('.scene > div:nth-child(14)', {opacity: 0, y: 20, duration: 0.8, ease: 'power2.out'}, 2.7);

        // Corner Decorations
        tl.from('.scene > div:nth-child(15)', {opacity: 0, duration: 0.5, ease: 'power2.inOut'}, 2.85);
        tl.from('.scene > div:nth-child(16)', {opacity: 0, duration: 0.5, ease: 'power2.inOut'}, 2.9);
        tl.from('.scene > div:nth-child(17)', {opacity: 0, duration: 0.5, ease: 'power2.inOut'}, 2.95);
        tl.from('.scene > div:nth-child(18)', {opacity: 0, duration: 0.5, ease: 'power2.inOut'}, 3.0);

        // Breathing Animations
        gsap.to('.scene > div:nth-child(10)', {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: 'sine.inOut'});
        gsap.to('.scene > div:nth-child(11)', {scale: 1.015, duration: 3, repeat: 0, yoyo: true, ease: 'sine.inOut'});
        gsap.to('.scene > div:nth-child(7)', {textShadow: '0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.2)', duration: 2.5, repeat: 0, yoyo: true, ease: 'sine.inOut'});
        gsap.to('.scene > div:nth-child(12)', {borderColor: '#FFD700', duration: 2, repeat: 0, yoyo: true, ease: 'sine.inOut'});
        gsap.to('.scene > div:nth-child(13)', {borderColor: '#00D4FF', duration: 2, repeat: 0, yoyo: true, ease: 'sine.inOut'});
        gsap.to('.scene > div:nth-child(2)', {x: 20, y: 20, duration: 8, repeat: 0, ease: 'none'});

        tl.play();
    </script>
</body>
</html>
