<!DOCTYPE html>
<html lang="en" data-composition-id="beat-8" data-width="1920" data-height="1080" style="background:#1a1a2e;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat 8 - Cyberpunk Tribute</title>
</head>
<body style="margin:0; padding:0; background-color:#1a1a2e; overflow:hidden;">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<div class="scene" style="background:#1a1a2e;" style="width:1920px; height:1080px; position:relative; overflow:hidden; background-color:#1a1a2e; font-family:'Inter','Noto Sans SC',sans-serif;">
<!-- Background Grid -->
<div id="grid" style="position:absolute; top:0; left:0; width:100%; height:100%; background-image: linear-gradient(rgba(0,212,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.1) 1px, transparent 1px); background-size:40px 40px; opacity:0.3;"></div>
<!-- Ghost Text Watermark -->
<div id="ghost" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:120px; font-weight:bold; color:#FFFFFF; opacity:0.03; white-space:nowrap; pointer-events:none;">守护</div>
<!-- Radial Glow Background -->
<div id="glow" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:800px; height:800px; background:radial-gradient(circle, rgba(0,212,255,0.2) 0%, rgba(26,26,46,0) 70%); border-radius:50%;"></div>
<!-- Left Path Container -->
<div id="leftPath" style="position:absolute; top:200px; left:100px; width:800px; height:600px; overflow:hidden;">
<!-- Code Stream -->
<div id="codeStream" style="position:absolute; top:0; left:0; width:100%; height:100%; font-family:'JetBrains Mono', monospace; font-size:14px; color:#00D4FF; opacity:0.8; white-space:nowrap; overflow:hidden;"></div>
<!-- Left Path Label -->
<div style="position:absolute; top:20px; left:20px; font-size:28px; color:#00D4FF; font-weight:bold;">代码与工具</div>
<!-- Arrow Symbol Left -->
<div style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); font-size:48px; color:#00D4FF;">→</div>
</div>
<!-- Right Path Container -->
<div id="rightPath" style="position:absolute; top:200px; right:100px; width:800px; height:600px; overflow:hidden;">
<!-- Particles -->
<div id="particles" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
<!-- Right Path Label -->
<div style="position:absolute; top:20px; right:20px; font-size:28px; color:#FFD700; font-weight:bold; text-align:right;">责任与守护</div>
<!-- Arrow Symbol Right -->
<div style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); font-size:48px; color:#FFD700;">←</div>
</div>
<!-- Future Point -->
<div id="futurePoint" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; background:#1a1a2e; border-radius:50%; box-shadow:0 0 20px #FFD700, 0 0 40px #FFD700;"></div>
<!-- Hero Silhouette -->
<div id="heroSilhouette" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); width:80px; height:150px; background:#1a1a2e; clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); opacity:0.9;"></div>
<!-- Title Split Left -->
<div id="titleLeft" style="position:absolute; top:80px; left:100px; font-size:80px; font-weight:bold; color:#FFFFFF; text-shadow:0 0 10px #00D4FF; opacity:0;">未来不是选择更聪明的</div>
<!-- Title Split Right -->
<div id="titleRight" style="position:absolute; top:80px; right:100px; font-size:80px; font-weight:bold; color:#FFFFFF; text-shadow:0 0 10px #00D4FF; opacity:0;">工具，而是选择更值得</div>
<!-- Title Merge -->
<div id="titleMerge" style="position:absolute; top:80px; left:50%; transform:translateX(-50%); font-size:80px; font-weight:bold; color:#FFFFFF; text-shadow:0 0 10px #00D4FF; opacity:0; white-space:nowrap;">信任的方向。</div>
<!-- Subtitle -->
<div id="subtitle" style="position:absolute; top:50%; left:50%; transform:translate(-50%,80px); font-size:36px; color:#999999; text-align:center; opacity:0;">致敬每一位守护者，愿我们都能传递这份责任。</div>
<!-- Data Card with Breathing Animation -->
<div id="dataCard" style="position:absolute; bottom:100px; left:50%; transform:translateX(-50%); padding:20px 40px; background:rgba(0,212,255,0.1); border:2px solid #00D4FF; border-radius:16px; font-family:'JetBrains Mono', monospace; font-size:48px; color:#00D4FF; text-align:center; opacity:0;">
守护之光
</div>
<!-- Scanline Effect -->
<div id="scanline" style="position:absolute; top:0; left:0; width:100%; height:4px; background:linear-gradient(90deg, transparent, rgba(0,212,255,0.5), transparent); opacity:0.6;"></div>
</div>
<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({paused:true});
window.__timelines["beat-8"] = tl;

// Populate Code Stream
var codeStream = document.getElementById('codeStream');
var codeText = '01010101 11010010 10101010 01110011 11001010 ';
var codeContent = '';
for (var i = 0; i < 20; i++) {
    codeContent += codeText;
}
codeStream.textContent = codeContent;

// Populate Particles
var particles = document.getElementById('particles');
for (var j = 0; j < 50; j++) {
    var particle = document.createElement('div');
    particle.style.position = 'absolute';
    particle.style.width = '4px';
    particle.style.height = '4px';
    particle.style.background = '#FFD700';
    particle.style.borderRadius = '50%';
    particle.style.boxShadow = '0 0 6px #FFD700';
    particle.style.left = 0.5 * 100 + '%';
    particle.style.top = 0.5 * 100 + '%';
    particle.style.opacity = '0';
    particles.appendChild(particle);
    tl.from(particle, {x: -100, opacity: 0, duration: 1, ease: 'expo.out'}, j * 0.02);
}

// Define Elements for Animation
var elements = [
    {id: '#grid', from: {opacity: 0}},
    {id: '#ghost', from: {opacity: 0.03}},
    {id: '#glow', from: {scale: 0.8, opacity: 0}},
    {id: '#leftPath', from: {x: -200, opacity: 0}},
    {id: '#rightPath', from: {x: 200, opacity: 0}},
    {id: '#futurePoint', from: {scale: 0, opacity: 0}},
    {id: '#heroSilhouette', from: {y: -100, opacity: 0}},
    {id: '#titleLeft', from: {x: -300, opacity: 0}},
    {id: '#titleRight', from: {x: 300, opacity: 0}},
    {id: '#titleMerge', from: {y: 50, opacity: 0}},
    {id: '#subtitle', from: {y: 30, opacity: 0}},
    {id: '#dataCard', from: {scale: 0.9, opacity: 0}},
    {id: '#scanline', from: {y: -100, opacity: 0}}
];

// Add Entrance Animations with Stagger
elements.forEach(function(el, index) {
    tl.from(el.id, {
        ...el.from,
        duration: 1.2,
        ease: 'expo.out'
    }, index * 0.15);
});

// Code Stream Scroll Animation
tl.to('#codeStream', {x: -1000, duration: 8, ease: 'linear'}, 0);

// Breathing Animation for Data Card
tl.to('#dataCard', {
    scale: 1.02,
    duration: 1.25,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: 0
}, 0);

// Scanline Animation
tl.to('#scanline', {y: 1080, duration: 3, ease: 'linear', repeat: 0}, 0);

// Play Timeline
tl.play();
</script>
</body>
</html>
