name: Release to Xiaping

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          zip -r video-factory-${{ steps.version.outputs.VERSION }}.zip . \
            -x ".git/*" -x ".github/*" -x "__pycache__/*" -x "*.pyc"

      - name: Publish to Xiaping
        env:
          XIAPING_KEY: ${{ secrets.XIAPING_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os
          
          key = os.environ.get("XIAPING_KEY", "")
          version = os.environ.get("VERSION", "3.0.0")
          zip_file = f"video-factory-{version}.zip"
          
          with open(zip_file, "rb") as f:
              r = requests.post(
                  "https://xiaping.coze.com/api/skills",
                  headers={"Authorization": f"Bearer {key}"},
                  data={
                      "name": "video-factory",
                      "description": "15-skill autonomous video production pipeline: topic research, script generation, voice cloning with VoxCPM2, BGM composition with ACE-Step, HyperFrames HTML rendering, and final MP4 synthesis. Powered by Xiaomi MiMo LLM.",
                      "trigger": json.dumps(["video factory", "短视频制作", "视频生产线"]),
                      "category": json.dumps(["自媒体"]),
                      "tags": json.dumps(["video", "pipeline", "automation"]),
                      "version": version,
                      "requires_api_key": "true",
                      "pledge": json.dumps({"agreed": True}),
                      "eval_strategy": "auto",
                  },
                  files={"file": (zip_file, f, "application/zip")},
              )
          
          print(f"Status: {r.status_code}")
          print(r.text[:1000])
          
          if r.status_code in [200, 201]:
              print("✅ Published to Xiaping!")
          else:
              print(f"⚠️ Xiaping publish issue (non-blocking)")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-factory-${{ steps.version.outputs.VERSION }}
          path: video-factory-${{ steps.version.outputs.VERSION }}.zip
